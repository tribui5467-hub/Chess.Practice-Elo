 <!DOCTYPE html>
<html lang="en-AU">
<head>
    <meta charset="UTF-8">
    <title>Equinox Games | Chess Pro</title>
    <script src="https://cdnjs.cloudflare.com"></script>
    <style>
        :root { 
            --n-blue: #00f2ff; --n-green: #81b64c; --n-red: #fa412d; 
            --n-orange: #f4943c; --n-yellow: #f1c40f;
            --t1-color: #00f2ff; --t2-color: #ff00ff;
            --smooth: cubic-bezier(0.4, 0, 0.2, 1);
        }
        body, html { margin: 0; padding: 0; background: #000; color: white; font-family: 'Segoe UI', Tahoma, sans-serif; overflow: hidden; height: 100vh; width: 100vw; }
        #bg-3d { position: fixed; inset: 0; z-index: 1; }

        /* --- 1. CINEMATIC BOOT (SOLARIS STYLE) --- */
        #boot { position: fixed; inset: 0; background: black; z-index: 40000; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: 1.5s; cursor: pointer; }
        .logo-burst { font-size: 100px; position: relative; opacity: 0; animation: logo-flare 3s var(--smooth) forwards; }
        .ring { position: absolute; border: 2px solid var(--n-blue); border-radius: 50%; opacity: 0; animation: ring-out 2s infinite; }
        .boot-text { font-size: 38px; letter-spacing: 15px; font-weight: 200; margin-top: 40px; clip-path: inset(0 100% 0 0); animation: wipe-text 2s forwards 1.5s; }
        @keyframes logo-flare { 0% { opacity: 0; transform: scale(0.5) rotate(-45deg); } 50% { opacity: 1; transform: scale(1.1) rotate(0deg); filter: drop-shadow(0 0 30px var(--n-blue)); } 100% { opacity: 1; transform: scale(1); } }
        @keyframes ring-out { 0% { width: 50px; height: 50px; opacity: 0.8; } 100% { width: 400px; height: 400px; opacity: 0; } }
        @keyframes wipe-text { to { clip-path: inset(0 0 0 0); } }

        /* --- 2. PROFILE --- */
        #profile-bar { position: fixed; top: 15px; right: 20px; background: rgba(5,6,8,0.9); border: 1px solid var(--n-blue); padding: 12px 25px; border-radius: 30px; z-index: 1000; display: flex; align-items: center; gap: 20px; box-shadow: 0 0 15px rgba(0,242,255,0.2); }
        .elo-tag { color: var(--n-yellow); font-weight: bold; font-family: monospace; }

        /* --- 3. GAME & BOARD --- */
        #game { display: none; width: 100vw; height: 100vh; justify-content: center; align-items: center; z-index: 5; position: relative; flex-direction: column; }
        .board { width: 560px; height: 560px; display: grid; grid-template: repeat(8, 1fr) / repeat(8, 1fr); border: 5px solid #111; background: #000; position: relative; box-shadow: 0 0 60px rgba(0,0,0,1); }
        .sq { width: 70px; height: 70px; display: flex; justify-content: center; align-items: center; cursor: pointer; position: relative; }
        .w { background: rgba(235, 236, 208, 0.04); } .b { background: rgba(119, 149, 86, 0.04); }
        .chess-piece { font-size: 52px; z-index: 15; user-select: none; cursor: grab; }
        .p-t1 { color: var(--t1-color); text-shadow: 0 0 12px var(--t1-color); }
        .p-t2 { color: var(--t2-color); text-shadow: 0 0 12px var(--t2-color); }

        /* --- 4. SETTINGS & PLAY COMPOSITE --- */
        #settings-panel { position: fixed; right: 20px; top: 5vh; width: 340px; background: rgba(5,6,8,0.98); border: 1px solid var(--n-blue); padding: 25px; transform: translateX(120%); transition: 0.6s var(--smooth); z-index: 5000; border-radius: 15px; }
        #settings-panel.active { transform: translateX(0); }
        .play-composite { position: relative; width: 100%; height: 55px; display: flex; border: 1px solid var(--n-green); background: rgba(129, 182, 76, 0.1); border-radius: 28px; margin-top: 30px; overflow: hidden; }
        .play-main { flex: 1; display: flex; align-items: center; justify-content: center; color: var(--n-green); font-weight: bold; letter-spacing: 4px; cursor: pointer; font-size: 13px; }
        .play-main.active { color: var(--n-red); border-color: var(--n-red); background: rgba(250, 65, 45, 0.1); }
        .play-dots { width: 55px; border-left: 1px solid var(--n-green); display: flex; align-items: center; justify-content: center; color: var(--n-green); font-size: 24px; cursor: pointer; }
        .dots-menu { position: absolute; bottom: 65px; right: 0; width: 180px; background: #0a0a0a; border: 1px solid #333; border-radius: 10px; display: none; flex-direction: column; overflow: hidden; }
        .dots-menu.active { display: flex; }
        .dots-menu button { background: none; border: none; color: #ccc; padding: 15px; text-align: left; cursor: pointer; font-size: 12px; border-bottom: 1px solid #222; }

        /* --- 5. NEON ENDINGS --- */
        #end-overlay { position: fixed; inset: 0; background: radial-gradient(circle, rgba(0,242,255,0.2) 0%, rgba(0,0,0,0.95) 80%); z-index: 20000; display: none; flex-direction: column; align-items: center; justify-content: center; animation: neon-glow-in 0.8s forwards; }
        .neon-title { font-size: 90px; color: #fff; text-shadow: 0 0 20px var(--n-blue), 0 0 40px var(--n-blue); letter-spacing: 20px; font-weight: 900; }
        @keyframes neon-glow-in { from { opacity: 0; backdrop-filter: blur(0px); } to { opacity: 1; backdrop-filter: blur(10px); } }

        #gear-btn { position: fixed; bottom: 25px; right: 25px; width: 50px; height: 50px; background: none; border: none; color: var(--n-blue); font-size: 35px; cursor: pointer; z-index: 100; transition: 0.3s; }
    </style>
</head>
<body>
    <div id="bg-3d"></div>

    <!-- CINEMATIC STARTUP -->
    <div id="boot" onclick="beginSimulation()">
        <div class="ring"></div>
        <div class="logo-burst">🎮</div>
        <div class="boot-text">EQUINOX GAMES</div>
        <p style="color:#444; margin-top:30px; letter-spacing:4px; font-size:10px;">CLICK TO AUTHORIZE ENGINE</p>
    </div>

    <div id="profile-bar">
        <span>EQUINOX_USER_PRO</span>
        <span class="elo-tag">ELO: <span id="elo-val">0</span></span>
    </div>

    <div id="game">
        <div id="board" class="board"></div>
        <button id="gear-btn" onclick="toggleSettings()">⚙️</button>
    </div>

    <div id="settings-panel">
        <h3 style="color:var(--n-blue); margin-top:0; font-size:12px; letter-spacing:3px;">MEDIA INTERFACE</h3>
        <iframe style="border-radius:12px; margin-bottom:20px;" src="https://open.spotify.com" width="100%" height="80" frameBorder="0" allow="autoplay; encrypted-media;"></iframe>
        
        <h3 style="color:var(--n-blue); font-size:12px; letter-spacing:3px;">CALIBRATION</h3>
        <div style="display:flex; gap:10px; margin-bottom:10px;">
            <button onclick="selT(1)" style="flex:1; background:#111; border:1px solid var(--n-blue); color:white; padding:8px; cursor:pointer;">Team 1</button>
            <button onclick="selT(2)" style="flex:1; background:#111; border:1px solid #333; color:#888; padding:8px; cursor:pointer;">Team 2</button>
        </div>
        <input type="range" style="width:100%; accent-color:var(--n-blue)" min="0" max="360" oninput="updC(this.value)">

        <div class="play-composite">
            <div class="play-main" id="p-btn" onclick="toggleEng()">START SIMULATION</div>
            <div class="play-dots" onclick="toggleDots(event)">⋮</div>
            <div class="dots-menu" id="d-menu">
                <button onclick="toggleHelp()">Archived Help</button>
                <button onclick="triggerEnd()">Resign Match</button>
                <button onclick="location.reload()">Reboot Engine</button>
            </div>
        </div>
    </div>

    <div id="end-overlay">
        <div class="neon-title">RESOLUTION</div>
        <p style="color:var(--n-yellow); margin-top:20px; letter-spacing:5px;">ELO GAINED: +25</p>
        <button onclick="location.reload()" style="margin-top:50px; padding:15px 40px; background:none; border:1px solid #fff; color:#fff; cursor:pointer; border-radius:50px; font-weight:bold;">NEW PROTOCOL</button>
    </div>

    <script>
        // --- 3D AMBIENCE ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('bg-3d').appendChild(renderer.domElement);

        const frags = [];
        for(let i=0; i<80; i++) {
            const geo = new THREE.BoxGeometry(Math.random()*0.5, Math.random()*0.5, 0.05);
            const mat = new THREE.MeshBasicMaterial({ color: Math.random()>0.5?0x00f2ff:0x333333, transparent:true, opacity:0.3 });
            const m = new THREE.Mesh(geo, mat);
            m.position.set((Math.random()-0.5)*20, (Math.random()-0.5)*20, (Math.random()-0.5)*10);
            scene.add(m);
            frags.push({m, v: (Math.random()-0.5)*0.015});
        }
        camera.position.z = 8;
        function animate() {
            requestAnimationFrame(animate);
            frags.forEach(f => { f.m.rotation.x += 0.01; f.m.position.y += f.v; if(f.m.position.y > 10) f.m.position.y = -10; });
            renderer.render(scene, camera);
        }
        animate();

        // --- SYSTEM ENGINE ---
        let currentElo = 0, teamSel = 1, turn = 1;
        const layout = [
            ['♜','♞','♝','♛','♚','♝','♞','♜'], ['♟','♟','♟','♟','♟','♟','♟','♟'],
            [],[],[],[],
            ['♙','♙','♙','♙','♙','♙','♙','♙'], ['♖','♘','♗','♕','♔','♗','♘','♖']
        ];

        function beginSimulation() {
            document.getElementById('boot').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('boot').style.display = 'none';
                document.getElementById('game').style.display = 'flex';
                createBoard();
            }, 1000);
        }

        function createBoard() {
            const b = document.getElementById('board');
            b.innerHTML = '';
            for(let i=0; i<64; i++) {
                const sq = document.createElement('div');
                const r = Math.floor(i/8), c = i % 8;
                sq.className = `sq ${(r+c)%2===0?'w':'b'}`;
                sq.dataset.idx = i;
                const char = (layout[r] && layout[r][c]) || '';
                if(char) {
                    const p = document.createElement('span');
                    p.className = `chess-piece ${r<2?'p-t2':'p-t1'}`;
                    p.innerText = char; p.draggable = true; p.dataset.team = r<2?2:1;
                    p.ondragstart = (e) => { if(parseInt(p.dataset.team)!==turn) return e.preventDefault(); e.dataTransfer.setData("text", i); };
                    sq.appendChild(p);
                }
                sq.ondragover = (e) => e.preventDefault();
                sq.ondrop = drop;
                b.appendChild(sq);
            }
        }

        function drop(e) {
            e.preventDefault();
            const from = e.dataTransfer.getData("text");
            const target = e.target.closest('.sq');
            const p = document.querySelector(`.sq[data-idx="${from}"] .chess-piece`);
            if(p && target) {
                const ex = target.querySelector('.chess-piece');
                if(ex) { if(ex.dataset.team == turn) return; target.removeChild(ex); burst(target); }
                target.appendChild(p); turn = turn === 1 ? 2 : 1;
            }
        }

        function burst(sq) {
            for(let i=0; i<15; i++) {
                const d = document.createElement('div');
                d.style.cssText = `position:absolute;width:4px;height:4px;background:#fff;border-radius:50%;left:50%;top:50%;z-index:200;`;
                sq.appendChild(d);
                d.animate([{transform:'translate(0,0)',opacity:1},{transform:`translate(${(Math.random()-0.5)*80}px, ${(Math.random()-0.5)*80}px)`,opacity:0}],700).onfinish=()=>d.remove();
            }
        }

        function toggleEng() { 
            const b = document.getElementById('p-btn'); 
            b.classList.toggle('active'); 
            b.innerText = b.classList.contains('active') ? "ENGINE ACTIVE" : "START SIMULATION"; 
        }
        function toggleSettings() { document.getElementById('settings-panel').classList.toggle('active'); }
        function toggleDots(e) { e.stopPropagation(); document.getElementById('d-menu').classList.toggle('active'); }
        function triggerEnd() { document.getElementById('end-overlay').style.display = 'flex'; currentElo+=25; document.getElementById('elo-val').innerText = currentElo; }
        function selT(n) { teamSel = n; }
        function updC(v) { document.documentElement.style.setProperty(`--t${teamSel}-color`, `hsl(${v}, 100%, 50%)`); }
    </script>
</body>
</html>
