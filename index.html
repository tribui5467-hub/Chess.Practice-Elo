<!DOCTYPE html>
<html lang="en-AU">
<head>
    <meta charset="UTF-8">
    <title>Equinox Games | Solaris HUD</title>
    <!-- Use a reliable HTTPS CDN for Chess.js -->
    <script src="https://cdnjs.cloudflare.com"></script>
    <style>
        :root { 
            --n-blue: #00f2ff; --n-green: #00ff00;
        }
        body, html { margin: 0; padding: 0; background: #000; color: white; overflow: hidden; height: 100vh; width: 100vw; }

        /* 1. BOOT SCREEN: SOLARIS REVEAL */
        #boot { 
            position: fixed; inset: 0; background: black; z-index: 30000; 
            display: flex; justify-content: center; align-items: center; 
            transition: opacity 1s ease-in-out; 
        }
        
        .equinox-text { 
            font-size: 32px; letter-spacing: 12px; font-weight: 200; color: #fff; 
            position: relative; clip-path: inset(0 100% 0 0); 
            animation: solaris-reveal 2.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }
        /* The Shine Effect */
        .equinox-text::after {
            content: "EQUINOX GAMES"; position: absolute; inset: 0;
            color: var(--n-blue); filter: blur(12px); clip-path: inset(0 100% 0 0);
            animation: solaris-shine 2.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        .divider { 
            width: 2px; height: 40px; background: white; margin: 0 25px; 
            transform: scaleY(0); 
            animation: pop-divider 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards 2s; 
        }

        /* CIRCULAR AURA & BASELINE CONTROLLER */
        .controller-box {
            position: relative; width: 80px; height: 80px;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden; /* Baseline effect */
        }

        .aura-circle {
            position: absolute; width: 60px; height: 60px;
            border-radius: 50%; border: 3px solid var(--n-blue);
            opacity: 0;
            box-shadow: 0 0 25px var(--n-blue), inset 0 0 15px var(--n-blue);
            animation: aura-glow 1s forwards 3s, aura-color-pulse 3s infinite alternate 4s;
        }

        .controller-icon { 
            font-size: 42px; z-index: 2; transform: translateX(-150%);
            animation: baseline-slide 0.8s ease-out forwards 2.5s; 
        }

        @keyframes solaris-reveal { to { clip-path: inset(0 0 0 0); } }
        @keyframes solaris-shine { 
            0% { clip-path: inset(0 100% 0 0); }
            50% { clip-path: inset(0 0 0 0); opacity: 1; }
            100% { clip-path: inset(0 0 0 100%); opacity: 0; }
        }
        @keyframes pop-divider { to { transform: scaleY(1); } }
        @keyframes baseline-slide { to { transform: translateX(0); } }
        @keyframes aura-glow { from { opacity: 0; transform: scale(0.4); } to { opacity: 1; transform: scale(1); } }
        @keyframes aura-color-pulse {
            0% { border-color: var(--n-blue); box-shadow: 0 0 20px var(--n-blue); }
            100% { border-color: var(--n-green); box-shadow: 0 0 45px var(--n-green); transform: scale(1.1); }
        }

        /* LOADING & GAME PLACEHOLDERS */
        #assets, #game { position: fixed; inset: 0; display: none; opacity: 0; transition: 1s; }
    </style>
</head>
<body>

    <div id="boot">
        <div class="equinox-text">EQUINOX GAMES</div>
        <div class="divider"></div>
        <div class="controller-box">
            <div class="aura-circle"></div>
            <div class="controller-icon">🎮</div>
        </div>
    </div>

    <div id="assets" style="background:#050608; color:white; display:flex; justify-content:center; align-items:center;">
        <h1>LOADING TACTICAL ASSETS...</h1>
    </div>

    <script>
        // Use DOMContentLoaded to ensure elements exist before script runs
        document.addEventListener('DOMContentLoaded', function() {
            setTimeout(() => {
                const boot = document.getElementById('boot');
                boot.style.opacity = '0';
                setTimeout(() => {
                    boot.style.display = 'none';
                    const assets = document.getElementById('assets');
                    assets.style.display = 'flex';
                    setTimeout(() => assets.style.opacity = '1', 50);
                }, 1000);
            }, 7500); // Wait for full Solaris + Aura cycle
        });
    </script>
</body>
</html>
