<!DOCTYPE html>
<html lang="en-AU">
<head>
    <meta charset="UTF-8">
    <title>Equinox Games | Chess Practice</title>
    <style>
        :root { 
            --n-blue: #00f2ff; --n-green: #39FF14; --n-red: #fa412d; 
            --n-orange: #f4943c; --n-yellow: #f1c40f; 
            --smooth: cubic-bezier(0.4, 0, 0.2, 1);
        }
        body, html { margin: 0; padding: 0; background: #000; color: white; font-family: 'Segoe UI', Tahoma, sans-serif; overflow: hidden; height: 100vh; width: 100vw; }

        /* --- 1. BOOT SEQUENCE --- */
        #boot { position: fixed; inset: 0; background: black; z-index: 100000; display: flex; justify-content: center; align-items: center; transition: 1s; }
        .equinox-text { font-size: 32px; letter-spacing: 12px; font-weight: 200; color: #fff; clip-path: inset(0 100% 0 0); animation: reveal 2s forwards; }
        @keyframes reveal { to { clip-path: inset(0 0 0 0); } }

        /* --- 2. SLIDING SETTINGS MENU & SYNCED GEAR --- */
        #settings-panel {
            position: fixed; top: 0; right: -400px; width: 400px; height: 100vh;
            background: #050505; border-left: 2px solid var(--n-blue);
            z-index: 45000; transition: right 0.6s var(--smooth);
            display: flex; flex-direction: column; padding: 60px 30px; box-sizing: border-box;
            box-shadow: -10px 0 30px rgba(0,0,0,0.5);
        }
        #settings-panel.open { right: 0; }

        #gear-handle {
            position: absolute; left: -70px; top: 50%; transform: translateY(-50%);
            width: 70px; height: 70px; display: flex; align-items: center; justify-content: center;
            cursor: pointer; z-index: 46000; background: #050505; border: 2px solid var(--n-blue);
            border-right: none; border-radius: 15px 0 0 15px; transition: color 0.4s;
        }
        #gear-icon { font-size: 45px; color: var(--n-blue); transition: transform 0.6s var(--smooth); }
        #settings-panel.open #gear-icon { transform: rotate(180deg); color: var(--n-green); }

        /* --- 3. CHESS BOARD --- */
        #game { display: flex; width: 100vw; height: 100vh; justify-content: center; align-items: center; background: radial-gradient(circle, #0d0d0d 0%, #000 100%); transition: filter 0.5s; }
        .board { width: 600px; height: 600px; display: grid; grid-template: repeat(8, 1fr) / repeat(8, 1fr); border: 4px solid #1a1a1a; background: #000; position: relative; }
        .sq { width: 75px; height: 75px; display: flex; justify-content: center; align-items: center; cursor: pointer; position: relative; }
        .w { background: #2a2a2e; } .b { background: #1a1a1c; }
        
        .hl-king, .hl-queen { box-shadow: inset 0 0 20px var(--n-red) !important; border: 1px solid var(--n-red) !important; }
        .hl-rook, .hl-bishop { box-shadow: inset 0 0 20px var(--n-orange) !important; border: 1px solid var(--n-orange) !important; }
        .hl-knight { box-shadow: inset 0 0 20px var(--n-yellow) !important; border: 1px solid var(--n-yellow) !important; }
        .hl-pawn { box-shadow: inset 0 0 20px var(--n-green) !important; border: 1px solid var(--n-green) !important; }
        .hl-pawn-blue { box-shadow: inset 0 0 20px var(--n-blue) !important; border: 1px solid var(--n-blue) !important; }
        .selected { background: rgba(0, 242, 255, 0.2) !important; outline: 2px solid var(--n-blue); }
        .ctrl-dot::after { content: ''; position: absolute; width: 15px; height: 15px; border: 2px solid var(--n-blue); border-radius: 50%; box-shadow: 0 0 10px var(--n-blue); pointer-events: none; }

        .piece { font-size: 50px; user-select: none; z-index: 10; pointer-events: none; transition: 0.2s; }
        .white-p { color: #fff; text-shadow: 0 0 10px #fff; }
        .black-p { color: #666; text-shadow: 0 0 10px #000; }

        /* --- 4. HELP MENU & EXPANSION --- */
        #help-menu { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(15px); z-index: 55000; display: none; align-items: center; justify-content: center; padding: 40px; }
        #help-container { width: 900px; height: 700px; background: #050505; border: 2px solid var(--n-green); border-radius: 20px; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 0 50px rgba(57, 255, 20, 0.2); }
        
        .help-header { display: flex; justify-content: space-between; padding: 25px; border-bottom: 1px solid #222; background: #000; }
        .tab-btn { background: none; border: 1px solid #333; color: #555; padding: 10px 20px; cursor: pointer; border-radius: 6px; margin-right: 10px; font-weight: bold; text-transform: uppercase; font-size: 11px; }
        .tab-btn.active { border-color: var(--n-green); color: var(--n-green); background: rgba(57, 255, 20, 0.05); }
        .help-content { flex: 1; overflow-y: auto; padding: 30px; }

        .asset-card { border-left: 3px solid var(--n-blue); background: #0f0f0f; padding: 20px; margin-bottom: 15px; cursor: pointer; transition: 0.3s; border-radius: 0 10px 10px 0; }
        .asset-card:hover { transform: scale(1.02); background: #151515; box-shadow: 0 0 20px rgba(0,242,255,0.1); }
        .asset-card b { color: var(--n-yellow); display: block; margin-bottom: 8px; font-size: 16px; }

        /* FULL SCREEN CARD EXPANSION */
        #expansion-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(20px); z-index: 70000; display: none; align-items: center; justify-content: center; }
        #expansion-box { width: 80%; max-width: 1000px; background: #050505; border: 3px solid var(--n-blue); border-radius: 30px; padding: 60px; position: relative; box-shadow: 0 0 80px var(--n-blue); }
        .close-btn { position: absolute; top: 30px; right: 30px; font-size: 40px; color: var(--n-red); background: none; border: none; cursor: pointer; }
        #expansion-text { font-size: 22px; line-height: 1.8; color: #eee; }

        /* UI Misc */
        #play-btn { background: var(--n-green); color: #000; border: none; padding: 15px; font-weight: 900; cursor: pointer; border-radius: 10px; width: 100%; text-transform: uppercase; margin-bottom: 20px; transition: 0.3s; }
        #play-btn.ongoing { background: transparent; border: 2px solid var(--n-blue); color: var(--n-blue); box-shadow: 0 0 15px var(--n-blue); }
        #turn-info { position: fixed; top: 40px; left: 50%; transform: translateX(-50%); letter-spacing: 5px; color: var(--n-blue); font-weight: bold; border: 2px solid var(--n-blue); padding: 10px 35px; border-radius: 30px; z-index: 100; }
    </style>
</head>
<body>

    <div id="boot"><div class="equinox-text">EQUINOX SYSTEM</div></div>
    <div id="turn-info">WHITE'S TURN</div>

    <!-- SLIDING SETTINGS -->
    <div id="settings-panel">
        <div id="gear-handle" onclick="toggleSettings()">
            <span id="gear-icon">⚙</span>
        </div>
        <h2 style="color: var(--n-blue); margin-top: 0; letter-spacing: 5px;">SETTINGS</h2>
        <button id="play-btn">PLAY</button>
        <div style="color: #666; font-size: 13px; cursor: pointer; text-align: center; border: 1px solid #333; padding: 15px; border-radius: 10px;" onclick="openHelp()">
            ARCHIVED HELP SYSTEM
        </div>
    </div>

    <!-- HELP SYSTEM -->
    <div id="help-menu">
        <div id="help-container">
            <div class="help-header">
                <div id="tabs">
                    <button class="tab-btn active" onclick="showTab('pieces', this)">Pieces</button>
                    <button class="tab-btn" onclick="showTab('icons', this)">Icons</button>
                    <button class="tab-btn" onclick="showTab('mechanics', this)">Mechanics</button>
                </div>
                <button onclick="closeHelp()" style="background:none; border:none; color:var(--n-red); cursor:pointer; font-size: 24px;">✕</button>
            </div>
            <div id="help-text" class="help-content"></div>
        </div>
    </div>

    <!-- FULL SCREEN DEFINITION EXPANSION -->
    <div id="expansion-overlay">
        <button class="close-btn" onclick="closeExpansion()">✕</button>
        <div id="expansion-box">
            <div id="expansion-text"></div>
        </div>
    </div>

    <div id="game"><div class="board" id="board"></div></div>

<script>
    const boardEl = document.getElementById('board');
    const playBtn = document.getElementById('play-btn');
    const settingsPanel = document.getElementById('settings-panel');
    const expansionOverlay = document.getElementById('expansion-overlay');
    const expansionText = document.getElementById('expansion-text');
    let boardState = Array(64).fill(null);
    let currentTurn = 'W'; 
    let selectedSq = null;

    const glyphs = { 'r':'♜','n':'♞','b':'♝','q':'♛','k':'♚','p':'♟','R':'♖','N':'♘','B':'♗','Q':'♕','K':'♔','P':'♙' };

    const helpData = {
        pieces: `
            <div class="asset-card" onclick="expandDefinition(this)"><b>The Pawn</b> The fundamental infantry unit of chess. It possesses a restricted forward movement of one square, yet captures diagonally. Upon its initial move, it may advance two squares. Reaching the terminal rank allows for promotion into a Queen, Rook, Bishop, or Knight, granting the piece immense late-game utility.</div>
            <div class="asset-card" onclick="expandDefinition(this)"><b>The Knight</b> A specialized tactical unit that navigates the board in a unique 'L' pattern—two squares in one cardinal direction followed by one square perpendicular. It maintains the singular ability to leap over intervening pieces, making it an invaluable asset in congested board states where other pieces are obstructed.</div>
            <div class="asset-card" onclick="expandDefinition(this)"><b>The Bishop</b> A sophisticated long-range operative that slides any distance along diagonal trajectories. Each Bishop is permanently confined to the square colour it begins on, requiring them to work in coordinated pairs to control both light and dark regions of the board effectively throughout the middle and end game.</div>
            <div class="asset-card" onclick="expandDefinition(this)"><b>The Rook</b> A formidable heavy piece moving in straight horizontal or vertical lines across any number of unoccupied squares. It plays a critical role in king safety through the castling maneuver and is often the primary force behind powerful ladder checkmates during the final stages of the match.</div>
            <div class="asset-card" onclick="expandDefinition(this)"><b>The Queen</b> The most versatile and powerful asset on the board. She combines the movement capabilities of both the Rook and the Bishop, sliding any distance in any straight or diagonal direction. Her presence dictates the tempo and pressure of the match, serving as both a primary attacker and a central defender.</div>
            <div class="asset-card" onclick="expandDefinition(this)"><b>The King</b> The pivotal figure around which the entire game revolves. While moving only one square in any direction, his preservation is absolute. If the King is placed under attack and cannot find a safe square, the match concludes immediately, rendering his protection the player's ultimate strategic priority.</div>
        `,
        icons: `
            <div class="asset-card" onclick="expandDefinition(this)"><b>The Best Move (Star)</b> This designation signifies the absolute strongest continuation identified by the engine analysis. Playing this move optimizes your winning probability and represents the highest level of technical accuracy possible in the current position, often finding the only path to a victory.</div>
            <div class="asset-card" onclick="expandDefinition(this)"><b>Good Move (Tick)</b> Indicates a solid, fundamentally sound choice that maintains the current evaluation of the position. While it may not be the engine's primary preference, it adheres to sound chess principles and ensures the player does not concede any unnecessary tactical advantages.</div>
            <div class="asset-card" onclick="expandDefinition(this)"><b>Inaccuracy (Exclamation)</b> Marks a sub-optimal move that noticeably weakens your standing. It suggests a missed opportunity to apply pressure or a minor positional concession that allows the opponent to improve their pieces more easily than the optimal continuation would have permitted.</div>
            <div class="asset-card" onclick="expandDefinition(this)"><b>Blunder (Exclamation Double)</b> A catastrophic error that tangibly reduces your advantage or directly allows the opponent to achieve a winning position. This usually results from an overlooked tactical sequence or a serious misunderstanding of the immediate requirements of the board position.</div>
            <div class="asset-card" onclick="expandDefinition(this)"><b>Fatal Blunder (Death)</b> Reserved for moves that lead to an immediate loss of the game or the loss of a major piece without compensation. This classification represents a total collapse of strategy and typically shifts the game evaluation into a forced win for the opponent.</div>
        `,
        mechanics: `
            <div class="asset-card" onclick="expandDefinition(this)"><b>Capturing Methodology</b> To capture an opponent's unit, you must move your piece onto the square it currently occupies. The displaced piece is permanently removed from the field. You cannot capture your own units or occupy a square already held by your own color, requiring careful navigation of space.</div>
            <div class="asset-card" onclick="expandDefinition(this)"><b>En Passant</b> A specialized pawn capture occurring when an opponent moves their pawn two squares forward from its starting position and lands adjacent to your pawn. You may capture that pawn as if it had only moved one square, provided you do so on the very next turn.</div>
            <div class="asset-card" onclick="expandDefinition(this)"><b>Checkmate (Absolute Victory)</b> The definitive conclusion of a chess match. This occurs when a King is under direct threat of capture and possesses no legal moves to relocate, block the line of attack, or eliminate the attacking piece entirely. The game ends immediately in a win for the attacker.</div>
            <div class="asset-card" onclick="expandDefinition(this)"><b>Stalemate (Technical Draw)</b> A unique situation where the player whose turn it is has no legal moves remaining, yet their King is not currently in check. Because the player cannot move but is not defeated, the game ends in a draw, often occurring as a defensive 'swindle'.</div>
        `
    };

    function toggleSettings() { settingsPanel.classList.toggle('open'); }
    function openHelp() { document.getElementById('help-menu').style.display = 'flex'; showTab('pieces', document.querySelector('.tab-btn')); }
    function closeHelp() { document.getElementById('help-menu').style.display = 'none'; }
    function showTab(t, b) {
        document.querySelectorAll('.tab-btn').forEach(x => x.classList.remove('active'));
        b.classList.add('active');
        document.getElementById('help-text').innerHTML = helpData[t];
    }

    function expandDefinition(card) {
        expansionText.innerHTML = card.innerHTML;
        expansionOverlay.style.display = 'flex';
    }
    function closeExpansion() { expansionOverlay.style.display = 'none'; }

    // --- GAME LOGIC ---
    function initBoard() {
        const map = "rnbqkbnrpppppppp................................PPPPPPPPRNBQKBNR";
        for(let i=0; i<64; i++) boardState[i] = map[i] === '.' ? null : map[i];
        render();
    }

    function render() {
        boardEl.innerHTML = '';
        for (let i = 0; i < 64; i++) {
            const sq = document.createElement('div');
            sq.className = `sq ${(Math.floor(i/8) + i%8) % 2 === 0 ? 'w' : 'b'}`;
            sq.dataset.idx = i;
            if (boardState[i]) {
                const p = document.createElement('div');
                const isW = boardState[i] === boardState[i].toUpperCase();
                p.className = `piece ${isW ? 'white-p' : 'black-p'}`;
                p.innerHTML = glyphs[boardState[i].toLowerCase()];
                sq.appendChild(p);
            }
            sq.onclick = () => handleSquare(i);
            boardEl.appendChild(sq);
        }
    }

    function isPathClear(f, t) {
        const r1 = Math.floor(f/8), c1 = f%8, r2 = Math.floor(t/8), c2 = t%8;
        const dr = Math.sign(r2 - r1), dc = Math.sign(c2 - c1);
        let cr = r1 + dr, cc = c1 + dc;
        while (cr !== r2 || cc !== c2) {
            if (boardState[cr * 8 + cc]) return false;
            cr += dr; cc += dc;
        }
        return true;
    }

    function isValid(f, t) {
        const p = boardState[f]; const tar = boardState[t];
        if (tar && (p === p.toUpperCase()) === (tar === tar.toUpperCase())) return false;
        const r1 = Math.floor(f/8), c1 = f%8, r2 = Math.floor(t/8), c2 = t%8;
        const dr = Math.abs(r2-r1), dc = Math.abs(c2-c1), type = p.toLowerCase();
        switch (type) {
            case 'p': const d = p === 'P' ? -1 : 1; return dc === 0 && r2-r1 === d && !tar || dc === 1 && r2-r1 === d && tar;
            case 'r': return (r1 === r2 || c1 === c2) && isPathClear(f, t);
            case 'n': return dr*dc === 2;
            case 'b': return dr === dc && isPathClear(f, t);
            case 'q': return (r1 === r2 || c1 === c2 || dr === dc) && isPathClear(f, t);
            case 'k': return dr <= 1 && dc <= 1;
        }
        return false;
    }

    function handleSquare(i) {
        const piece = boardState[i];
        const isW = piece ? piece === piece.toUpperCase() : null;
        if (selectedSq === null) {
            if (piece && ((currentTurn === 'W' && isW) || (currentTurn === 'B' && !isW))) {
                selectedSq = i;
                render();
                document.querySelector(`[data-idx="${i}"]`).classList.add('selected');
            }
        } else {
            if (isValid(selectedSq, i)) {
                boardState[i] = boardState[selectedSq];
                boardState[selectedSq] = null;
                currentTurn = currentTurn === 'W' ? 'B' : 'W';
                playBtn.innerText = "GAME ONGOING";
                playBtn.classList.add('ongoing');
                document.getElementById('turn-info').innerText = currentTurn === 'W' ? "WHITE'S TURN" : "BLACK'S TURN";
            }
            selectedSq = null;
            render();
        }
    }

    setTimeout(() => { document.getElementById('boot').style.display='none'; }, 2000);
    initBoard();
</script>
</body>
</html>
