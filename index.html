<!DOCTYPE html>
<html lang="en-AU">
<head>
    <meta charset="UTF-8">
    <title>Equinox Games | Chess</title>
    <script src="https://cdnjs.cloudflare.com"></script>
    <style>
        :root { 
            --n-blue: #00f2ff; --bg: #030406;
        }
        body, html { margin: 0; padding: 0; background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; height: 100vh; }

        /* SOLARIS 0.6 SHINE APPEARANCE */
        #solaris-boot {
            position: fixed; inset: 0; background: black; z-index: 30000;
            display: flex; justify-content: center; align-items: center;
            transition: opacity 1s ease-out;
        }

        .container { display: flex; align-items: center; position: relative; }

        /* THE SHINE WIPE EFFECT */
        .equinox-text {
            font-size: 32px; letter-spacing: 12px; font-weight: 200;
            color: #ffffff; position: relative;
            /* The Mask Wipe */
            clip-path: inset(0 100% 0 0);
            animation: solaris-reveal 2s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        /* The Moving Shine Highlight */
        .equinox-text::after {
            content: "EQUINOX GAMES";
            position: absolute; top: 0; left: 0; width: 100%;
            color: var(--n-blue);
            filter: blur(8px);
            clip-path: inset(0 100% 0 0);
            animation: solaris-shine 2s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        @keyframes solaris-reveal {
            0% { clip-path: inset(0 100% 0 0); opacity: 0; }
            100% { clip-path: inset(0 0 0 0); opacity: 1; }
        }

        @keyframes solaris-shine {
            0% { clip-path: inset(0 100% 0 0); }
            50% { clip-path: inset(0 0 0 0); opacity: 1; }
            100% { clip-path: inset(0 0 0 100%); opacity: 0; }
        }

        /* THE | POP */
        .divider { 
            width: 2px; height: 40px; background: white; margin: 0 15px; 
            transform: scaleY(0); opacity: 0;
            animation: divider-pop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards 1.8s;
        }

        /* THE 🎮 EMERGE */
        .controller-wrapper { overflow: hidden; display: flex; align-items: center; }
        .controller-icon {
            font-size: 40px; transform: translateX(-100%);
            animation: controller-slide 0.8s cubic-bezier(0.22, 1, 0.36, 1) forwards 2.2s;
        }

        @keyframes divider-pop { to { transform: scaleY(1); opacity: 1; } }
        @keyframes controller-slide { to { transform: translateX(0); } }

        /* ASSET LOADING & PHYSICS (Hidden initially) */
        #asset-loading { position: fixed; inset: 0; background: #030406; z-index: 20000; display: none; }
        #physics-canvas { position: absolute; inset: 0; }
        .loading-hud { position: absolute; bottom: 80px; left: 50%; transform: translateX(-50%); text-align: center; width: 300px; }
        .bar { width: 100%; height: 4px; background: rgba(255,255,255,0.1); border-radius: 10px; overflow: hidden; }
        .fill { width: 0%; height: 100%; background: var(--n-blue); transition: width 0.1s linear; }
    </style>
</head>
<body>

    <div id="solaris-boot">
        <div class="container">
            <div class="equinox-text">EQUINOX GAMES</div>
            <div class="divider"></div>
            <div class="controller-wrapper"><div class="controller-icon">🎮</div></div>
        </div>
    </div>

    <div id="asset-loading">
        <canvas id="physics-canvas"></canvas>
        <div class="loading-hud">
            <div style="font-size: 10px; letter-spacing: 2px; color: #444; margin-bottom: 8px;">LOADING ASSETS</div>
            <div class="bar"><div id="progress" class="fill"></div></div>
        </div>
    </div>

    <script>
        window.onload = () => {
            // Sequence: Solaris Shine -> Wait -> Transition to Assets
            setTimeout(() => {
                const boot = document.getElementById('solaris-boot');
                boot.style.opacity = '0';
                setTimeout(() => {
                    boot.style.display = 'none';
                    startAssets();
                }, 1000);
            }, 5000); // Allow time for full shine + emerge sequence
        };

        function startAssets() {
            document.getElementById('asset-loading').style.display = 'block';
            initPhysics();
            let p = 0;
            const itv = setInterval(() => {
                p += Math.random() * 3;
                if (p > 100) p = 100;
                document.getElementById('progress').style.width = p + '%';
                if (p >= 100) clearInterval(itv);
            }, 100);
        }

        function initPhysics() {
            const canvas = document.getElementById('physics-canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            const parts = Array(30).fill().map(() => ({
                x: Math.random()*canvas.width, y: Math.random()*canvas.height,
                vx: (Math.random()-0.5)*2, vy: (Math.random()-0.5)*2,
                s: 20+Math.random()*30, c: ['♜','♞','♟'][Math.floor(Math.random()*3)]
            }));
            function loop() {
                ctx.clearRect(0,0,canvas.width,canvas.height);
                ctx.fillStyle = "rgba(255,255,255,0.1)";
                parts.forEach(p => {
                    p.x += p.vx; p.y += p.vy;
                    if(p.x<0 || p.x>canvas.width) p.vx*=-1;
                    if(p.y<0 || p.y>canvas.height) p.vy*=-1;
                    ctx.font = p.s+"px serif";
                    ctx.fillText(p.c, p.x, p.y);
                });
                requestAnimationFrame(loop);
            }
            loop();
        }
    </script>
</body>
</html>
