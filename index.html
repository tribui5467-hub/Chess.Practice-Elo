<!DOCTYPE html>
<html lang="en-AU">
<head>
    <meta charset="UTF-8">
    <title>Equinox Games | Chess</title>
    <script src="https://cdnjs.cloudflare.com"></script>
    <style>
        :root { --n-blue: #00f2ff; --bg: #030406; }
        body, html { margin: 0; padding: 0; background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; height: 100vh; }

        /* 1. SOLARIS 0.6 REPLICATED SHINE */
        #solaris-boot {
            position: fixed; inset: 0; background: black; z-index: 30000;
            display: flex; justify-content: center; align-items: center;
            transition: opacity 1s cubic-bezier(0.7, 0, 0.3, 1);
        }
        .container { display: flex; align-items: center; }

        .equinox-text {
            font-size: 32px; letter-spacing: 12px; font-weight: 200; color: #fff;
            position: relative; clip-path: inset(0 100% 0 0);
            animation: solaris-reveal 2s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        /* Shine Glow Overlay */
        .equinox-text::after {
            content: "EQUINOX GAMES"; position: absolute; top: 0; left: 0; width: 100%;
            color: var(--n-blue); filter: blur(8px); clip-path: inset(0 100% 0 0);
            animation: solaris-shine 2s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        @keyframes solaris-reveal { 0% { clip-path: inset(0 100% 0 0); opacity: 0; } 100% { clip-path: inset(0 0 0 0); opacity: 1; } }
        @keyframes solaris-shine { 0% { clip-path: inset(0 100% 0 0); } 50% { clip-path: inset(0 0 0 0); } 100% { clip-path: inset(0 0 0 100%); } }

        /* | POP & 🎮 EMERGE */
        .divider { width: 2px; height: 40px; background: #fff; margin: 0 15px; transform: scaleY(0); animation: pop 0.5s forwards 1.8s; }
        .controller-icon { font-size: 40px; transform: translateX(-100%); opacity: 0; animation: slide 0.8s forwards 2.2s; }
        
        @keyframes pop { to { transform: scaleY(1); opacity: 1; } }
        @keyframes slide { to { transform: translateX(0); opacity: 1; } }

        /* 2. ASSET LOADING (Broken Pieces & Particles) */
        #asset-loading {
            position: fixed; inset: 0; background: #030406; z-index: 25000;
            display: none; overflow: hidden; opacity: 0; transition: opacity 0.8s;
        }
        .loading-hud { position: absolute; bottom: 80px; left: 50%; transform: translateX(-50%); width: 300px; text-align: center; z-index: 100; }
        .bar { width: 100%; height: 4px; background: rgba(255,255,255,0.1); border-radius: 10px; overflow: hidden; }
        .fill { width: 0%; height: 100%; background: var(--n-blue); transition: width 0.1s linear; }

        /* 3. STORY & GAME */
        #story-screen { position: fixed; inset: 0; background: var(--bg); z-index: 10000; display: none; flex-direction: column; justify-content: center; align-items: center; }
        .top-left-x { position: absolute; top: 40px; left: 40px; width: 50px; height: 50px; border-radius: 50%; border: 2px solid var(--n-blue); color: var(--n-blue); display: none; align-items: center; justify-content: center; cursor: pointer; }
    </style>
</head>
<body>
    <!-- SOLARIS BOOT -->
    <div id="solaris-boot">
        <div class="container">
            <div class="equinox-text">EQUINOX GAMES</div>
            <div class="divider"></div>
            <div style="overflow:hidden"><div class="controller-icon">🎮</div></div>
        </div>
    </div>

    <!-- ASSET LOADING -->
    <div id="asset-loading">
        <canvas id="physics-canvas" style="position:absolute; inset:0"></canvas>
        <div class="loading-hud">
            <div style="font-size: 10px; letter-spacing: 2px; color: #444; margin-bottom: 8px;">LOADING ASSETS</div>
            <div class="bar"><div id="progress" class="fill"></div></div>
        </div>
    </div>

    <div id="story-screen">
        <div id="enter-x" class="top-left-x" onclick="enterGame()">✕</div>
        <h1 id="title" style="color:var(--n-blue); opacity:0;">Chess Practice | Elo</h1>
        <div id="line" style="height:2px; background:var(--n-blue); width:0; margin:20px 0"></div>
    </div>

    <script>
        window.onload = () => {
            // Sequence starts: Shine (2s) + Divider (0.5s) + Controller (0.8s) = ~3.5s total animation
            setTimeout(() => {
                const boot = document.getElementById('solaris-boot');
                boot.style.opacity = '0'; // Start fade out
                
                // Wait for fade transition (1s) before showing assets
                boot.addEventListener('transitionend', () => {
                    boot.style.display = 'none';
                    startAssets();
                }, { once: true });
            }, 4500); 
        };

        function startAssets() {
            const screen = document.getElementById('asset-loading');
            screen.style.display = 'block';
            setTimeout(() => screen.style.opacity = '1', 10); // Trigger opacity separately for safety
            
            initPhysics();
            let p = 0;
            const itv = setInterval(() => {
                p += Math.random() * 3;
                document.getElementById('progress').style.width = Math.min(p, 100) + '%';
                if (p >= 100) {
                    clearInterval(itv);
                    setTimeout(finishLoading, 800);
                }
            }, 60);
        }

        function initPhysics() {
            const canvas = document.getElementById('physics-canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            const items = Array(35).fill().map(() => ({
                x: Math.random()*canvas.width, y: Math.random()*canvas.height,
                vx: (Math.random()-0.5)*3, vy: (Math.random()-0.5)*3,
                char: ['♜','♞','▰','▲'][Math.floor(Math.random()*4)],
                size: 20+Math.random()*30, rot: Math.random()*6, rv: (Math.random()-0.5)*0.1
            }));
            function loop() {
                ctx.clearRect(0,0,canvas.width,canvas.height);
                ctx.fillStyle = "rgba(255,255,255,0.15)";
                items.forEach(p => {
                    p.x+=p.vx; p.y+=p.vy; p.rot+=p.rv;
                    if(p.x<0 || p.x>canvas.width) p.vx*=-1; if(p.y<0 || p.y>canvas.height) p.vy*=-1;
                    ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.rot); ctx.font = p.size+"px serif";
                    ctx.fillText(p.char, 0, 0); ctx.restore();
                });
                requestAnimationFrame(loop);
            }
            loop();
        }

        function finishLoading() {
            document.getElementById('asset-loading').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('asset-loading').style.display = 'none';
                document.getElementById('story-screen').style.display = 'flex';
                // Trigger title/line animations
                setTimeout(() => document.getElementById('title').style.opacity = "1", 200);
                setTimeout(() => document.getElementById('line').style.width = "400px", 600);
                setTimeout(() => document.getElementById('enter-x').style.display = "flex", 1500);
            }, 1000);
        }
    </script>
</body>
</html>
