<!DOCTYPE html>
<html lang="en-AU">
<head>
    <meta charset="UTF-8">
    <title>Equinox Games | Chess</title>
    <style>
        :root { 
            --n-blue: #00f2ff; --n-green: #81b64c; --n-red: #fa412d; 
            --n-orange: #f4943c; --n-yellow: #f1c40f; --n-pink: #ff00ff;
            --n-brilliant: #26ceaa; --n-great: #1baca6;
        }
        body, html { margin: 0; padding: 0; background: #000; color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; height: 100vh; width: 100vw; }
        canvas { position: fixed; inset: 0; z-index: 1; pointer-events: none; }

        /* --- 1. BOOT SCREEN --- */
        #boot { position: fixed; inset: 0; background: black; z-index: 30000; display: flex; justify-content: center; align-items: center; transition: 1s; }
        .equinox-text { font-size: 32px; letter-spacing: 12px; font-weight: 200; color: #fff; clip-path: inset(0 100% 0 0); animation: reveal 2s forwards; text-shadow: 0 0 15px var(--n-blue); }
        .divider { width: 2px; height: 40px; background: white; margin: 0 25px; transform: scaleY(0); animation: pop-divider 0.6s forwards 2s; }
        .controller-box { position: relative; width: 80px; height: 80px; display: flex; align-items: center; justify-content: center; }
        .aura-circle { position: absolute; width: 60px; height: 60px; border-radius: 50%; border: 3px solid var(--n-blue); opacity: 0; box-shadow: 0 0 25px var(--n-blue); animation: aura-glow 1s forwards 3s, aura-color-pulse 3s infinite alternate 4s; }
        .controller-icon { font-size: 42px; transform: translateX(-180%); animation: slide-in 0.8s forwards 2.5s; opacity: 1; }

        @keyframes reveal { to { clip-path: inset(0 0 0 0); } }
        @keyframes pop-divider { to { transform: scaleY(1); opacity: 1; } }
        @keyframes slide-in { to { transform: translateX(0); opacity: 1; } }
        @keyframes aura-glow { from { opacity: 0; transform: scale(0.4); } to { opacity: 1; transform: scale(1); } }
        @keyframes aura-color-pulse { 0% { border-color: var(--n-blue); } 100% { border-color: var(--n-pink); transform: scale(1.1); } }

        /* --- 2. LOADING SCREEN --- */
        #assets { position: fixed; inset: 0; background: #050608; z-index: 20000; display: none; opacity: 0; transition: 1s; flex-direction: column; align-items: center; justify-content: center; }
        .rainbow-container { padding: 3px; border-radius: 10px; margin: 20px; background: linear-gradient(90deg, #ff0000, #ffff00, #00ff00, #00ffff, #0000ff, #ff00ff, #ff0000); background-size: 400%; animation: rainbow-flow 3s linear infinite; }
        .bar { width: 400px; height: 24px; background: #000; border-radius: 12px; overflow: hidden; position: relative; display: flex; align-items: center; justify-content: center; }
        #fill { position: absolute; left: 0; width: 0%; height: 100%; background: var(--n-blue); box-shadow: 0 0 15px var(--n-blue); }
        #perc { position: relative; z-index: 2; font-weight: bold; font-size: 12px; mix-blend-mode: difference; color: white; }
        @keyframes rainbow-flow { to { background-position: 400%; } }

        /* --- 3. GAME HUD --- */
        #game { display: none; width: 100vw; height: 100vh; justify-content: center; align-items: center; opacity: 0; transition: 1.5s; z-index: 5; }
        .board { width: 560px; height: 560px; display: grid; grid-template: repeat(8, 1fr) / repeat(8, 1fr); border: 4px solid #111; background: rgba(0,0,0,0.85); transition: 1s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .sq { width: 70px; height: 70px; display: flex; justify-content: center; align-items: center; cursor: pointer; position: relative; }
        .w { background: rgba(45, 45, 55, 0.8); } .b { background: rgba(20, 20, 25, 0.8); }
        
        .piece { font-size: 48px; user-select: none; z-index: 2; transition: 0.8s cubic-bezier(0.2, 0.8, 0.2, 1.1); }
        .piece.locked { filter: brightness(0.2); pointer-events: none; }
        .piece.fly-in { transform: translateY(100vh) rotate(45deg); opacity: 0; }

        /* Centered Spining Gear */
        #gear-btn { position: fixed; bottom: 20px; right: 20px; width: 50px; height: 50px; background: none; border: none; color: var(--n-blue); font-size: 35px; cursor: pointer; z-index: 100; transition: 0.4s; display: flex; align-items: center; justify-content: center; }
        #gear-btn:hover:not(.active) { color: var(--n-green); transform: scale(1.3) rotate(20deg); }
        #gear-btn.active { color: var(--n-green); animation: gear-spin 3s linear infinite; }
        @keyframes gear-spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* EVAL ICONS & DEATH */
        @keyframes icon-reveal { 0% { transform: scale(0) rotate(0deg); opacity: 0; } 100% { transform: scale(1) rotate(360deg); opacity: 1; } }
        .eval-icon { position: absolute; top: -5px; right: -5px; width: 24px; height: 24px; z-index: 100; animation: icon-reveal 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        .death-skull { position: absolute; font-size: 35px; pointer-events: none; z-index: 1000; animation: death-pop 1s forwards; }
        @keyframes death-pop { 0% { transform: scale(0.5) translateY(0); opacity: 1; } 100% { transform: scale(1.5) translateY(-80px); opacity: 0; } }

        /* --- 4. SIDEBAR & HELP --- */
        #settings-panel { position: fixed; right: 20px; top: 5vh; bottom: 5vh; width: 25vw; background: rgba(5,6,8,0.98); border: 1px solid var(--n-blue); border-radius: 15px; transform: translateX(120%); transition: 0.5s; z-index: 25000; padding: 25px; display: flex; flex-direction: column; gap: 10px; }
        #settings-panel.open { transform: translateX(0); }
        #help-menu { position: fixed; left: 50%; bottom: -120%; transform: translateX(-50%); width: 600px; background: #000; border: 2px solid var(--n-blue); border-radius: 12px; z-index: 26000; padding: 25px; transition: 0.6s; box-shadow: 0 0 30px var(--n-blue); }
        #help-menu.active { bottom: 10%; }
        .asset-card { border-left: 3px solid var(--n-blue); background: rgba(255,255,255,0.05); padding: 15px; margin-bottom: 12px; font-size: 13px; line-height: 1.6; }
        .tab-btn { background: #111; border: 1px solid #333; color: #fff; padding: 10px; cursor: pointer; flex: 1; }
    </style>
</head>
<body>

    <canvas id="particle-canvas"></canvas>

    <div id="boot">
        <div class="equinox-text">EQUINOX GAMES</div>
        <div class="divider"></div>
        <div class="controller-box"><div class="aura-circle"></div><div class="controller-icon">🎮</div></div>
    </div>

    <div id="assets">
        <div id="loading-board" style="width:240px; height:240px; display:grid; grid-template:repeat(8,1fr)/repeat(8,1fr); gap:2px; margin-bottom:20px;"></div>
        <div class="rainbow-container"><div class="bar"><div id="fill"></div><div id="perc">0%</div></div></div>
        <button class="tab-btn" onclick="launch()" style="border-radius:5px; padding:5px 20px;">SKIP</button>
    </div>

    <div id="game">
        <div id="board" class="board"></div>
        <button id="gear-btn" onclick="toggleSettings()">⚙</button>
    </div>

    <div id="settings-panel">
        <h3 style="color:var(--n-blue); margin:0;">COMMAND HUB</h3>
        <input type="range" style="width:100%; accent-color:var(--n-blue);" min="0" max="100" value="70">
        <iframe src="https://open.spotify.com" width="100%" height="152" frameBorder="0" allow="autoplay; encrypted-media" style="border-radius:12px"></iframe>
        <button class="tab-btn" onclick="location.reload()">RESTART SIM</button>
        <button class="tab-btn" style="color:var(--n-green); border-color:var(--n-green)" onclick="unlockPieces()">▶ START SIMULATION</button>
        <button style="width:55px; height:55px; border-radius:50%; border:2px solid var(--n-blue); background:none; color:var(--n-blue); align-self:center; margin-top:auto; cursor:pointer; font-size:24px;" onclick="toggleHelp()">?</button>
    </div>

    <div id="help-menu">
        <div style="display:flex; gap:10px; margin-bottom:15px;"><button class="tab-btn">ASSET BEHAVIOR</button><button class="tab-btn">MOVE LOGIC</button></div>
        <div style="max-height:400px; overflow-y:auto;">
            <div class="asset-card">
                <strong>♔ KING (Royal)</strong><br>
                The <strong>absolute core</strong> of the simulation. Survival is the primary <strong>win condition</strong>.
                <div style="font-style:italic; color:#777; margin-top:5px;">Example: Moving King to escape check.</div>
                Importance: <span style="color:var(--n-red)">Critical</span>
            </div>
            <div class="asset-card">
                <strong>!! BRILLIANT</strong><br>
                Rare move involving a <strong>calculated sacrifice</strong> that improves the state.
                Importance: <span style="color:var(--n-brilliant)">Brilliant</span>
            </div>
        </div>
    </div>

    <script>
        const pCanvas = document.getElementById('particle-canvas'), pCtx = pCanvas.getContext('2d');
        let parts = [], floating = [], debris = [], isUnlocked = false, selected = null, hasFlippedIn = false;
        let state = [['r','n','b','q','k','b','n','r'],['p','p','p','p','p','p','p','p'],['','','','','','','',''],['','','','','','','',''],['','','','','','','',''],['','','','','','','',''],['P','P','P','P','P','P','P','P'],['R','N','B','Q','K','B','N','R']];
        const icons = { 'r':'♜','n':'♞','b':'♝','q':'♛','k':'♚','p':'♙','R':'♖','N':'♘','B':'♗','Q':'♕','K':'♔','P':'♙' };

        function initBG() {
            pCanvas.width = window.innerWidth; pCanvas.height = window.innerHeight;
            for(let i=0; i<100; i++) parts.push({ x:Math.random()*pCanvas.width, y:Math.random()*pCanvas.height, s:Math.random()*2, v:Math.random()*0.5 });
        }
        function draw() {
            pCtx.clearRect(0,0,pCanvas.width,pCanvas.height);
            pCtx.fillStyle = 'rgba(255,255,255,0.3)';
            parts.forEach(p => { p.y -= p.v; if(p.y<0) p.y=pCanvas.height; pCtx.fillRect(p.x,p.y,p.s,p.s); });
            debris.forEach((d,i) => { d.x+=d.vx; d.y+=d.vy; d.life-=0.02; if(d.life<=0) debris.splice(i,1); pCtx.fillStyle=`rgba(255,77,77,${d.life})`; pCtx.fillRect(d.x,d.y,d.s,d.s); });
            requestAnimationFrame(draw);
        }

        function render() {
            const el = document.getElementById('board'); el.innerHTML = '';
            state.forEach((row,r)=>row.forEach((p,c)=>{
                const sq = document.createElement('div'); sq.className = `sq ${(r+c)%2===0?'w':'b'}`;
                sq.dataset.r = r; sq.dataset.c = c;
                if(p) {
                    const span = document.createElement('span'); span.className='piece'; 
                    if(!hasFlippedIn) span.classList.add('fly-in');
                    if(!isUnlocked) span.classList.add('locked');
                    span.innerText=icons[p]; span.style.color = p===p.toUpperCase()?'#fff':'var(--n-blue)';
                    sq.appendChild(span);
                    if(!hasFlippedIn) setTimeout(()=>span.classList.remove('fly-in'), 100 + (r*40));
                }
                sq.onclick = ()=>handleClick(r,c); el.appendChild(sq);
            }));
            hasFlippedIn = true;
        }

        function handleClick(r,c) {
            if(!isUnlocked) return;
            if(selected) {
                const [sr,sc] = selected;
                if(state[r][c]) triggerDeath(r,c);
                state[r][c]=state[sr][sc]; state[sr][sc]=''; selected=null; render();
            } else if(state[r][c]) { selected=[r,c]; render(); document.querySelector(`[data-r="${r}"][data-c="${c}"]`).style.background="rgba(0,242,255,0.3)"; }
        }

        function triggerDeath(r,c) {
            const rect = document.querySelector(`[data-r="${r}"][data-c="${c}"]`).getBoundingClientRect();
            const skull = document.createElement('div'); skull.className = 'death-skull'; skull.innerText = '💀';
            skull.style.left = `${rect.left + 15}px`; skull.style.top = `${rect.top}px`;
            document.body.appendChild(skull); setTimeout(()=>skull.remove(),1000);
            for(let i=0;i<20;i++) debris.push({x:rect.left+35, y:rect.top+35, vx:(Math.random()-0.5)*15, vy:(Math.random()-0.5)*15, life:1, s:Math.random()*4});
        }

        function unlockPieces() { isUnlocked = true; toggleSettings(); render(); }
        function toggleSettings() { document.getElementById('settings-panel').classList.toggle('open'); document.getElementById('gear-btn').classList.toggle('active'); }
        function toggleHelp() { document.getElementById('help-menu').classList.toggle('active'); }

        window.onload = () => {
            initBG(); draw();
            const lb = document.getElementById('loading-board');
            for(let i=0; i<64; i++){ let d=document.createElement('div'); d.style.background=(Math.floor(i/8)+i)%2===0?'#111':'#080808'; lb.appendChild(d); }
            setTimeout(() => {
                document.getElementById('boot').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('boot').style.display='none';
                    document.getElementById('assets').style.display='flex'; document.getElementById('assets').style.opacity='1';
                    let p=0; let iv=setInterval(()=>{
                        p+=1.2; document.getElementById('fill').style.width=p+'%'; document.getElementById('perc').innerText=Math.floor(p)+'%';
                        if(p>=100){ clearInterval(iv); setTimeout(launch,500); }
                    },40);
                }, 1000);
            }, 5000);
        };
        function launch() { 
            document.getElementById('assets').style.display='none';
            document.getElementById('game').style.display='flex';
            setTimeout(()=> { document.getElementById('game').style.opacity='1'; render(); }, 100);
        }
    </script>
</body>
</html>
