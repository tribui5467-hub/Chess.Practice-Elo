<!DOCTYPE html>
<html lang="en-AU">
<head>
    <meta charset="UTF-8">
    <title>Equinox Games | Chess</title>
    <style>
        :root { 
            --n-blue: #00f2ff; --n-green: #81b64c; --n-red: #fa412d; 
            --n-orange: #f4943c; --n-yellow: #f1c40f; 
            --smooth: cubic-bezier(0.4, 0, 0.2, 1); /* Liquid-smooth easing */
        }
        body, html { margin: 0; padding: 0; background: #000; color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; height: 100vh; width: 100vw; }

        /* --- 1. SMOOTHED GEAR BUTTON --- */
        #gear-btn { 
            position: fixed; bottom: 20px; right: 20px; width: 50px; height: 50px; 
            background: none; border: none; color: var(--n-blue); font-size: 35px; 
            cursor: pointer; z-index: 100; display: flex; align-items: center; justify-content: center;
            transition: color 0.5s var(--smooth), transform 0.6s var(--smooth);
        }
        #gear-btn:hover { color: var(--n-green); transform: scale(1.2) rotate(45deg); }
        #gear-btn.active { color: var(--n-green); animation: gear-spin 4s linear infinite; }
        @keyframes gear-spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* --- 2. THREE-DOT ACTION MENU --- */
        .action-menu { position: relative; display: inline-block; align-self: flex-start; margin-bottom: 10px; }
        .dots-btn { background: none; border: none; color: #555; cursor: pointer; font-size: 24px; padding: 5px; transition: 0.3s; }
        .dots-btn:hover { color: var(--n-blue); }
        .dropdown-content { 
            position: absolute; left: 0; top: 100%; background: #111; border: 1px solid #333;
            min-width: 120px; border-radius: 8px; opacity: 0; transform: translateY(-10px);
            pointer-events: none; transition: 0.4s var(--smooth); z-index: 26000;
        }
        .dropdown-content.show { opacity: 1; transform: translateY(5px); pointer-events: auto; }
        .dropdown-content button { 
            width: 100%; background: none; border: none; color: #ccc; padding: 10px; 
            text-align: left; cursor: pointer; font-size: 12px; transition: 0.2s;
        }
        .dropdown-content button:hover { background: #222; color: var(--n-blue); }

        /* --- 3. REFINED SIDEBAR --- */
        #settings-panel { 
            position: fixed; right: 20px; top: 5vh; bottom: 5vh; width: 25vw; 
            background: rgba(5,6,8,0.98); border: 1px solid var(--n-blue); border-radius: 15px;
            transform: translateX(120%); transition: 0.7s var(--smooth); z-index: 25000; 
            padding: 25px; display: flex; flex-direction: column; gap: 15px; box-shadow: -10px 0 30px rgba(0,242,255,0.1);
        }
        #settings-panel.open { transform: translateX(0); }

        /* Compact Start Button */
        .start-btn { 
            height: 35px; /* Reduced height */
            color: var(--n-green); border: 1px solid var(--n-green); 
            background: rgba(129, 182, 76, 0.1); cursor: pointer; font-size: 11px;
            letter-spacing: 1px; transition: 0.3s;
        }
        .start-btn:hover { background: var(--n-green); color: black; }

        /* Existing Board/Piece styles here... */
    </style>
</head>
<body>

    <div id="game">
        <div id="board" class="board"></div>
        <button id="gear-btn" onclick="toggleSettings()">⚙</button>
    </div>

    <!-- REFINED SIDEBAR -->
    <div id="settings-panel">
        <div class="action-menu">
            <button class="dots-btn" onclick="toggleDropdown()">⋮</button>
            <div id="dots-dropdown" class="dropdown-content">
                <button onclick="surrender()">Surrender</button>
                <button onclick="location.reload()">Reboot</button>
            </div>
        </div>

        <h3 style="color:var(--n-blue); margin: 0 0 10px 0; font-size: 16px;">COMMAND HUB</h3>
        
        <div style="flex-grow: 1; border-top: 1px solid #222; padding-top: 15px;">
            <!-- Spotify Embed & Volume Slider Here -->
        </div>

        <button class="start-btn" onclick="unlockPieces()">▶ START SIMULATION</button>
        <button style="width:40px; height:40px; border-radius:50%; border:1px solid var(--n-blue); background:none; color:var(--n-blue); align-self:center; cursor:pointer;" onclick="toggleHelp()">?</button>
    </div>

    <script>
        // TOGGLE SETTINGS (Fixed logic)
        function toggleSettings() {
            const panel = document.getElementById('settings-panel');
            const gear = document.getElementById('gear-btn');
            panel.classList.toggle('open');
            gear.classList.toggle('active');
            // Close dropdown if sidebar is toggled
            document.getElementById('dots-dropdown').classList.remove('show');
        }

        // THREE-DOT DROPDOWN
        function toggleDropdown() {
            document.getElementById('dots-dropdown').classList.toggle('show');
        }

        // SURRENDER ACTION
        function surrender() {
            alert("SYSTEM OVERRIDE: SIMULATION TERMINATED.");
            location.reload();
        }

        // PIECE UNLOCK (Smoothly transition pieces)
        function unlockPieces() {
            isUnlocked = true;
            document.querySelectorAll('.piece').forEach(p => {
                p.classList.add('unlocked');
                p.style.transition = "filter 1.2s var(--smooth)"; // Super smooth reveal
            });
            toggleSettings();
            render();
        }

        // Close dropdown when clicking outside
        window.onclick = (event) => {
            if (!event.target.matches('.dots-btn')) {
                document.getElementById('dots-dropdown').classList.remove('show');
            }
        };

        // ... rest of your chess engine logic (render, handleMove, initBG)
    </script>
</body>
</html>
