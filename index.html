<!DOCTYPE html>
<html lang="en-AU">
<head>
    <meta charset="UTF-8">
    <title>Chess-Practice | Elo</title>
    <!-- INTERNAL CHESS ENGINE -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <style>
        :root { 
            --n-blue: #00f2ff; --n-green: #00ff00; --n-red: #ff4757; 
            --bg: #0a0b10; --neon-glow: 0 0 15px var(--n-blue);
        }
        body { margin: 0; background: var(--bg); overflow: hidden; font-family: 'Segoe UI', sans-serif; color: white; user-select: none; display: flex; justify-content: center; align-items: center; height: 100vh; }

        /* 1. BOOT SCREEN */
        #boot-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 5000; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: 0.8s cubic-bezier(0.19, 1, 0.22, 1); }
        #boot-screen.loaded { transform: scale(0.78); border: 2px solid var(--n-blue); border-radius: 15px; box-shadow: 0 0 35px rgba(0, 242, 255, 0.2); background: rgba(10, 11, 16, 0.98); }
        #boot-screen.panic { transform: scale(0.78, 0) translateY(1200px); opacity: 0; }
        .progress-bar { width: 250px; height: 2px; background: rgba(255,255,255,0.1); margin-top: 20px; position: relative; }
        .progress-fill { height: 100%; background: var(--n-blue); width: 0%; transition: width 2s linear; box-shadow: 0 0 10px var(--n-blue); }

        /* 2. GAME UI */
        #game-layer { display: none; width: 100vw; height: 100vh; opacity: 0; transition: opacity 1s ease-in-out; }
        #game-layer.visible { display: flex; opacity: 1; }
        #board-area { flex: 1; display: flex; justify-content: center; align-items: center; position: relative; }
        .board { width: 560px; height: 560px; display: grid; grid-template: repeat(8, 1fr) / repeat(8, 1fr); border: 4px solid rgba(0, 242, 255, 0.2); background: rgba(10, 11, 16, 0.8); box-shadow: var(--neon-glow); }
        .sq { width: 70px; height: 70px; display: flex; justify-content: center; align-items: center; position: relative; transition: 0.3s; }
        .w { background: rgba(255, 255, 255, 0.04); } .b { background: rgba(0, 0, 0, 0.3); }

        /* EFFECTS */
        .board.focus .sq:not(.valid-move):not(.selected) { opacity: 0.2; filter: grayscale(1); }
        .sq.selected { box-shadow: inset 0 0 20px var(--n-blue); background: rgba(0, 242, 255, 0.1) !important; }
        .sq.valid-move::after { content: ''; width: 18px; height: 18px; background: var(--n-blue); border-radius: 50%; box-shadow: 0 0 10px var(--n-blue); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 0.4; } 50% { opacity: 1; } 100% { opacity: 0.4; } }
        .sq.death-zone { background: rgba(255, 71, 87, 0.2) !important; }
        .sq.death-zone::after { content: '☠'; font-size: 30px; color: var(--n-red); text-shadow: 0 0 10px var(--n-red); }

        /* PIECES */
        .piece { font-size: 55px; z-index: 10; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); cursor: pointer; }
        .piece:hover { transform: scale(1.2); }
        .white-p { color: #fff; filter: drop-shadow(0 0 8px #fff); }
        .black-p { color: #555; filter: drop-shadow(0 0 8px #000); }

        /* HELP & SIDEBAR */
        #help-menu { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: var(--bg); border: 2px solid var(--n-green); padding: 30px; z-index: 6000; box-shadow: 0 0 30px rgba(0, 255, 0, 0.2); border-radius: 10px; text-align: center; }
        #sidebar { width: 250px; background: rgba(10, 11, 16, 0.98); border-left: 2px solid var(--n-green); padding: 40px; display: flex; flex-direction: column; }
        .btn-e { background: none; border: 2px solid var(--n-blue); color: var(--n-blue); font-weight: bold; padding: 15px; cursor: pointer; transition: 0.4s; border-radius: 5px; margin-bottom: 20px; }
        .btn-e:hover { background: var(--n-blue); color: black; box-shadow: var(--neon-glow); }
        #particle-canvas { position: fixed; top: 0; left: 0; z-index: -1; pointer-events: none; }
    </style>
</head>
<body>
    <canvas id="particle-canvas"></canvas>

    <!-- HELP OVERLAY -->
    <div id="help-menu">
        <h2 style="color: var(--n-green)">TACTICAL HUD GUIDE</h2>
        <p style="color:#ccc;">• Click piece to view valid trajectories.<br>• Move to target to execute command.<br>• Hold <b>CTRL</b> for focus mode.</p>
        <button class="btn-e" style="border-color: var(--n-green); color: var(--n-green);" onclick="toggleHelp()">DISMISS</button>
    </div>

    <!-- BOOT SCREEN -->
    <div id="boot-screen">
        <div id="boot-content" style="text-align:center;">
            <div style="letter-spacing: 5px; color: var(--n-blue);">INITIALIZING TACTICAL HUD...</div>
            <div class="progress-bar"><div id="bar" class="progress-fill"></div></div>
        </div>
        <div id="hud-container" style="display:none; text-align:center;">
            <h1 style="letter-spacing:5px;">ELO.SYSTEM</h1>
            <button class="btn-e" onclick="handleLaunch()">START ENGINE</button>
        </div>
    </div>

    <!-- GAME LAYER -->
    <div id="game-layer">
        <div id="board-area"><div class="board" id="chess-board"></div></div>
        <div id="sidebar">
            <h2 style="color:var(--n-green); border-bottom:1px solid var(--n-green); padding-bottom:10px;">SYSTEM</h2>
            <button class="btn-e" onclick="toggleHelp()">HELP</button>
            <button class="btn-e" id="play-btn" onclick="resetEngine()">RESET</button>
            <div style="font-size:12px; color:#666; margin-top:auto;">Tactical HUD v1.0.4</div>
        </div>
    </div>

    <script>
        const game = new Chess();
        const pChars = { 'r':'♜','n':'♞','b':'♝','q':'♛','k':'♚','p':'♟','R':'♖','N':'♘','B':'♗','Q':'♕','K':'♔','P':'♙' };
        let sourceSq = null;
        let ctrlDown = false;

        window.onload = () => {
            const bar = document.getElementById('bar');
            // Fixed Loading: requestAnimationFrame ensures the 0% start is registered
            requestAnimationFrame(() => { bar.style.width = '100%'; });
            
            setTimeout(() => {
                document.getElementById('boot-screen').classList.add('loaded');
                document.getElementById('boot-content').style.display = 'none';
                document.getElementById('hud-container').style.display = 'block';
                initParticles(); 
                renderBoard();
            }, 2200);
        };

        function handleLaunch() {
            document.getElementById('boot-screen').classList.add('panic');
            setTimeout(() => {
                document.getElementById('boot-screen').style.display = 'none';
                document.getElementById('game-layer').style.display = 'flex';
                setTimeout(() => document.getElementById('game-layer').classList.add('visible'), 50);
            }, 600);
        }

        function toggleHelp() {
            const menu = document.getElementById('help-menu');
            menu.style.display = (menu.style.display === 'block') ? 'none' : 'block';
        }

        function resetEngine() {
            game.reset();
            renderBoard();
        }

        // CTRL HUD FOCUS
        window.addEventListener('keydown', e => { if(e.ctrlKey) { ctrlDown = true; updateFocus(); } });
        window.addEventListener('keyup', e => { if(!e.ctrlKey) { ctrlDown = false; updateFocus(); } });
        function updateFocus() {
            const board = document.getElementById('chess-board');
            if(ctrlDown && sourceSq) board.classList.add('focus');
            else board.classList.remove('focus');
        }

        function renderBoard() {
            const boardEl = document.getElementById('chess-board');
            boardEl.innerHTML = '';
            const inCheckmate = game.in_checkmate();

            game.board().forEach((row, rIdx) => {
                row.forEach((piece, cIdx) => {
                    const sqId = String.fromCharCode(97 + cIdx) + (8 - rIdx);
                    const sq = document.createElement('div');
                    sq.className = `sq ${(rIdx + cIdx) % 2 === 0 ? 'w' : 'b'}`;
                    sq.id = sqId;
                    sq.onclick = () => handleSquareClick(sqId);

                    if(inCheckmate && piece && piece.type === 'k' && piece.color === game.turn()) {
                        sq.classList.add('death-zone');
                    }

                    if (piece) {
                        const charKey = piece.color === 'w' ? piece.type.toUpperCase() : piece.type.toLowerCase();
                        const pEl = document.createElement('div');
                        pEl.className = `piece ${piece.color === 'w' ? 'white-p' : 'black-p'}`;
                        pEl.innerHTML = pChars[charKey];
                        sq.appendChild(pEl);
                    }
                    boardEl.appendChild(sq);
                });
            });
        }

        function handleSquareClick(sqId) {
            const moves = game.moves({ square: sqId, verbose: true });
            if (sourceSq) {
                const move = game.move({ from: sourceSq, to: sqId, promotion: 'q' });
                if (move) { sourceSq = null; renderBoard(); return; }
            }
            document.querySelectorAll('.sq').forEach(s => s.classList.remove('selected', 'valid-move'));
            if (moves.length > 0) {
                sourceSq = sqId;
                document.getElementById(sqId).classList.add('selected');
                moves.forEach(m => document.getElementById(m.to).classList.add('valid-move'));
            } else { sourceSq = null; }
            updateFocus();
        }

        function initParticles() {
            const canvas = document.getElementById('particle-canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            let p = Array(35).fill().map(() => ({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, v: Math.random()*0.5+0.1 }));
            function draw() {
                ctx.clearRect(0,0,canvas.width,canvas.height);
                ctx.fillStyle = "rgba(0, 242, 255, 0.15)";
                p.forEach(i => { i.y -= i.v; if(i.y<0) i.y=canvas.height; ctx.beginPath(); ctx.arc(i.x, i.y, 1, 0, Math.PI*2); ctx.fill(); });
                requestAnimationFrame(draw);
            }
            draw();
        }
    </script>
</body>
</html>
