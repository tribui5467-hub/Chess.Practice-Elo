<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess Practice | Elo</title>
    <link id="favicon" rel="icon" type="image/webp" href="noFilter.webp">
    <link href="https://fonts.googleapis.com/css2?family=Chewy&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
   
    <style>
        :root { --primary: #a855f7; --accent: #22c55e; --bg: #020617; --text: #ffffff; --card: rgba(30, 41, 59, 0.5); }
        body {
            background-color: var(--bg); color: var(--text); font-family: 'Chewy', cursive;
            min-height: 100vh; background-size: cover; background-position: center;
        }
        .game-card {
            position: relative; aspect-ratio: 1/1; overflow: hidden; border-radius: 1.2rem;
            border: 2px solid transparent; transition: all 0.3s;
            background: var(--card); cursor: pointer;
        }
        .game-card:hover { border-color: var(--primary); transform: scale(1.03); box-shadow: 0 0 15px var(--primary); }
        .game-card img { width: 100%; height: 100%; object-fit: cover; }

        .card-title {
            position: absolute; bottom: -100%; left: 0; width: 100%;
            background: linear-gradient(transparent, rgba(0,0,0,0.9));
            padding: 20px 12px 10px; transition: bottom 0.3s; font-size: 0.85rem;
            display: flex; justify-content: space-between; align-items: center;
        }
        .game-card:hover .card-title { bottom: 0; }

        .more-btn {
            opacity: 0; transition: 0.3s; background: rgba(0,0,0,0.7);
            width: 28px; height: 28px; border-radius: 50%; display: flex;
            align-items: center; justify-content: center; font-size: 1.2rem;
        }
        .game-card:hover .more-btn { opacity: 1; }

        .category-tabs { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin: 25px 0 35px; }
        .cat-tab {
            padding: 8px 20px; border-radius: 9999px; background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1); cursor: pointer;
        }
        .cat-tab.active { background: var(--primary); color: black; }
    </style>
</head>
<body class="p-4">

    <canvas id="particle-canvas" class="fixed top-0 left-0 z-[-1] pointer-events-none"></canvas>

    <!-- Download Popup -->
    <div id="downloadPopup" class="fixed inset-0 bg-black/80 backdrop-blur-md z-[300] hidden flex items-center justify-center">
        <div class="bg-slate-900 border border-white/10 p-8 rounded-3xl max-w-md text-center">
            <h2 class="text-2xl mb-4">Algebra Practise Downloadable File</h2>
            <p class="mb-6">Download it <span class="text-blue-400 underline cursor-pointer" onclick="downloadFile()">here</span>.</p>
            <button onclick="closePopup()" class="bg-white/10 px-8 py-2 rounded-full">Close</button>
        </div>
    </div>

    <div class="main-logo-container text-center mb-4">
        <img id="mainLogoImg" src="" alt="Logo" class="inline-block w-80" onclick="location.reload()">
    </div>

    <header class="island-header mx-auto flex items-center gap-4 bg-white/5 backdrop-blur-md px-6 py-3 rounded-full w-fit">
        <img id="penguinHeadImg" src="" class="h-9 cursor-pointer" onclick="location.reload()">
        <i class="fas fa-gamepad nav-icon text-xl" onclick="renderGames('games')"></i>
        <i class="fas fa-th-large nav-icon text-xl" onclick="renderGames('apps')"></i>
        <i class="fas fa-dice nav-icon text-xl" onclick="openRandomGame()"></i>
        <i class="fas fa-link nav-icon text-xl" onclick="renderGames('backups')"></i>
        <i class="fas fa-circle-info nav-icon text-xl" onclick="toggleInfo()"></i>
        
        <div class="relative ml-4">
            <input type="text" id="searchInput" placeholder="Search games or genres..." 
                   class="bg-white/10 border border-white/20 pl-10 py-2 rounded-full w-64 focus:outline-none">
        </div>
        <i class="fas fa-sliders nav-icon text-xl" onclick="toggleSettings()"></i>
    </header>

    <main class="max-w-7xl mx-auto">
        <div id="categoryTabs" class="category-tabs"></div>
        <div id="gameGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-5"></div>
    </main>

    <!-- Details Modal -->
    <div id="gameDetailsModal" class="fixed inset-0 bg-black/90 hidden flex items-center justify-center z-[200]">
        <div class="bg-slate-900 p-8 rounded-3xl max-w-md w-full">
            <h2 id="detailsTitle" class="text-2xl mb-4 text-purple-400"></h2>
            <img id="detailsThumb" class="w-full rounded-2xl mb-4">
            <p><strong>Genre:</strong> <span id="detailsGenre"></span></p>
            <p id="detailsDesc" class="mt-3 text-gray-300"></p>
            <div class="mt-6 flex gap-3">
                <button onclick="playFromDetails()" class="flex-1 bg-green-500 text-black py-3 rounded-2xl font-bold">▶ Play</button>
                <button onclick="closeDetailsModal()" class="flex-1 bg-white/10 py-3 rounded-2xl">Close</button>
            </div>
        </div>
    </div>

<script>
// ==================== YOUR ORIGINAL CODE + FIXES ====================
const repoOwner = "hazzatazza";
const repoName = "algebruh-practise";
const cdnBase = `https://cdn.jsdelivr.net/gh/${repoOwner}/${repoName}@main/`;

let games = [], backups = [], currentFilter = 'games', currentCategory = 'All';

async function loadData() {
    try {
        document.getElementById('mainLogoImg').src = cdnBase + 'logo.png';
        document.getElementById('penguinHeadImg').src = cdnBase + 'penguinhead.png';

        const shaRes = await fetch(`https://api.github.com/repos/${repoOwner}/${repoName}/commits?t=${Date.now()}`);
        const sha = (await shaRes.json())[0].sha;

        games = await (await fetch(`https://cdn.jsdelivr.net/gh/${repoOwner}/${repoName}@${sha}/games.json`)).json();
        backups = await (await fetch(`https://cdn.jsdelivr.net/gh/${repoOwner}/${repoName}@${sha}/links.json`)).json();

        renderCategoryTabs();
        renderGames('games');
    } catch(e) { console.error(e); }
}

function renderCategoryTabs() {
    const cont = document.getElementById('categoryTabs');
    cont.innerHTML = '';
    const cats = ['All', ...new Set(games.map(g => g.category || 'Uncategorized'))];
    cats.forEach(cat => {
        const el = document.createElement('div');
        el.className = `cat-tab px-5 py-2 ${cat === currentCategory ? 'active' : ''}`;
        el.textContent = cat;
        el.onclick = () => { currentCategory = cat; renderCategoryTabs(); renderGames(currentFilter); };
        cont.appendChild(el);
    });
}

function renderGames(filter = 'games', search = '') {
    currentFilter = filter;
    const grid = document.getElementById('gameGrid');
    grid.innerHTML = '';

    let items = filter === 'backups' ? backups : games.filter(item => {
        if (search) {
            const s = search.toLowerCase();
            return item.title.toLowerCase().includes(s) || (item.genre||'').toLowerCase().includes(s);
        }
        if (currentCategory !== 'All' && (item.category || 'Uncategorized') !== currentCategory) return false;
        return true;
    });

    if (filter === 'backups') {
        // backup cards...
        return;
    }

    if (currentCategory === 'All') {
        const grouped = {};
        items.forEach(g => {
            const c = g.category || 'Uncategorized';
            grouped[c] = grouped[c] || [];
            grouped[c].push(g);
        });
        Object.keys(grouped).sort().forEach(cat => {
            const h = document.createElement('div');
            h.className = "col-span-full text-purple-400 text-2xl mt-8 mb-3";
            h.textContent = cat.toUpperCase();
            grid.appendChild(h);
            grouped[cat].forEach(game => createCard(game, grid));
        });
    } else {
        items.forEach(game => createCard(game, grid));
    }
}

function createCard(game, grid) {
    const card = document.createElement('div');
    card.className = 'game-card';
    card.innerHTML = `
        <img src="${cdnBase}${game.thumb}" loading="lazy">
        <div class="card-title">
            <span>${game.title}</span>
            <span onclick="event.stopImmediatePropagation(); showGameDetails('${game.id}')" class="more-btn">⋯</span>
        </div>
    `;
    card.onclick = (e) => {
        if (!e.target.closest('.more-btn')) openGame(game.id);
    };
    grid.appendChild(card);
}

function openGame(id) {
    const game = games.find(g => g.id === id);
    if (!game) return;
    // Your original game modal code here
    alert("Opening: " + game.title); // temporary - replace with your real modal code
}

function showGameDetails(id) {
    const game = games.find(g => g.id === id);
    if (!game) return;
    document.getElementById('detailsTitle').textContent = game.title;
    document.getElementById('detailsThumb').src = cdnBase + game.thumb;
    document.getElementById('detailsGenre').textContent = game.genre || "Unknown";
    document.getElementById('detailsDesc').textContent = game.description || "No description.";
    document.getElementById('gameDetailsModal').classList.remove('hidden');
}

function playFromDetails() {
    closeDetailsModal();
    // Add real openGame logic here if needed
}

function closeDetailsModal() {
    document.getElementById('gameDetailsModal').classList.add('hidden');
}

function closePopup() {
    document.getElementById('downloadPopup').classList.add('hidden');
}

// Load everything
window.onload = () => {
    if (localStorage.getItem('hideDownloadPopup') !== 'true') {
        document.getElementById('downloadPopup').classList.remove('hidden');
    }
    loadData();
};

document.getElementById('searchInput').oninput = (e) => renderGames(currentFilter, e.target.value);
</script>
</body>
</html>
