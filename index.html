<!DOCTYPE html>
<html lang="en-AU">
<head>
    <meta charset="UTF-8">
    <title>Equinox Games | Chess</title>
    <style>
        :root { 
            --n-blue: #00f2ff; --n-green: #81b64c; --n-red: #fa412d; 
            --n-orange: #f4943c; --n-yellow: #f1c40f; --n-pink: #ff00ff;
        }
        body, html { margin: 0; padding: 0; background: #000; color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; height: 100vh; width: 100vw; }
        canvas { position: fixed; inset: 0; z-index: 1; pointer-events: none; }

        /* --- 1. BOOT SCREEN --- */
        #boot { position: fixed; inset: 0; background: black; z-index: 30000; display: flex; justify-content: center; align-items: center; transition: 1s; }
        .equinox-text { font-size: 32px; letter-spacing: 12px; font-weight: 200; color: #fff; clip-path: inset(0 100% 0 0); animation: reveal 2s forwards; text-shadow: 0 0 15px var(--n-blue); }
        @keyframes reveal { to { clip-path: inset(0 0 0 0); } }

        /* --- 2. LOADING SCREEN --- */
        #assets { position: fixed; inset: 0; background: #050608; z-index: 20000; display: none; opacity: 0; transition: 1s; flex-direction: column; align-items: center; justify-content: center; }
        .rainbow-container { padding: 3px; border-radius: 10px; margin: 20px; background: linear-gradient(90deg, #ff0000, #ffff00, #00ff00, #00ffff, #0000ff, #ff00ff, #ff0000); background-size: 400%; animation: rainbow-flow 3s linear infinite; }
        .bar { width: 400px; height: 10px; background: #000; border-radius: 5px; overflow: hidden; }
        #fill { width: 0%; height: 100%; background: var(--n-blue); box-shadow: 0 0 15px var(--n-blue); }
        @keyframes rainbow-flow { to { background-position: 400%; } }

        /* --- 3. GAME ENGINE & GEAR --- */
        #game { display: none; width: 100vw; height: 100vh; justify-content: center; align-items: center; opacity: 0; transition: 1.5s; z-index: 5; }
        .board { width: 560px; height: 560px; display: grid; grid-template: repeat(8, 1fr) / repeat(8, 1fr); border: 4px solid #111; background: rgba(0,0,0,0.85); transition: 1s; }
        .sq { width: 70px; height: 70px; display: flex; justify-content: center; align-items: center; cursor: pointer; position: relative; }
        .w { background: rgba(45, 45, 55, 0.8); } .b { background: rgba(20, 20, 25, 0.8); }
        
        .piece { font-size: 48px; user-select: none; z-index: 2; transition: 0.8s; filter: brightness(0.2); pointer-events: none; }
        .piece.unlocked { filter: brightness(1); pointer-events: auto; }

        #gear-btn { position: fixed; bottom: 20px; right: 20px; width: 50px; height: 50px; background: none; border: none; color: var(--n-blue); font-size: 35px; cursor: pointer; z-index: 100; transition: 0.4s; }
        #gear-btn:hover:not(.active) { color: var(--n-green); transform: scale(1.3) rotate(20deg); }
        #gear-btn.active { color: var(--n-green); animation: gear-spin 3s linear infinite; }
        @keyframes gear-spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* --- 4. SIDEBAR --- */
        #settings-panel { position: fixed; right: 20px; top: 5vh; bottom: 5vh; width: 25vw; background: rgba(5,6,8,0.98); border: 1px solid var(--n-blue); border-radius: 15px; transform: translateX(120%); transition: 0.5s; z-index: 25000; padding: 25px; display: flex; flex-direction: column; gap: 15px; }
        #settings-panel.open { transform: translateX(0); }
        .tab-btn { background: #111; border: 1px solid #333; color: #fff; padding: 10px; cursor: pointer; }
        
        /* Volume Slider Styling */
        .vol-slider { width: 100%; height: 5px; background: #333; border-radius: 5px; outline: none; appearance: none; }
        .vol-slider::-webkit-slider-thumb { appearance: none; width: 15px; height: 15px; background: var(--n-blue); border-radius: 50%; cursor: pointer; }

        #help-menu { position: fixed; left: 50%; bottom: -110%; transform: translateX(-50%); width: 600px; background: #000; border: 2px solid var(--n-blue); border-radius: 12px; z-index: 26000; padding: 25px; transition: 0.6s; }
        #help-menu.active { bottom: 10%; }
        .asset-card { border-left: 3px solid var(--n-blue); background: rgba(255,255,255,0.05); padding: 15px; margin-bottom: 15px; font-size: 13px; line-height: 1.6; }
    </style>
</head>
<body>

    <canvas id="particle-canvas"></canvas>

    <div id="boot"><div class="equinox-text">EQUINOX GAMES</div></div>

    <div id="assets">
        <h1 style="color:var(--n-blue); letter-spacing:5px;">INITIALISING SOLARIS</h1>
        <div id="loading-board" style="width:280px; height:280px; display:grid; grid-template:repeat(8,1fr)/repeat(8,1fr); gap:2px; transition: 1s;"></div>
        <div class="rainbow-container"><div class="bar"><div id="fill"></div></div></div>
        <p id="perc">0%</p>
        <button class="skip-btn" onclick="launch()" style="margin-top:15px; background:none; border:1px solid #333; color:#555; padding:5px 25px; cursor:pointer;">SKIP</button>
    </div>

    <div id="game">
        <div id="board" class="board"></div>
        <button id="gear-btn" onclick="toggleSettings()">⚙</button>
    </div>

    <div id="settings-panel">
        <h3 style="color:var(--n-blue)">COMMAND HUB</h3>
        
        <!-- AUDIO CONTROLS -->
        <div style="font-size:12px; color:#777; margin-bottom:5px;">SYSTEM VOLUME</div>
        <input type="range" class="vol-slider" min="0" max="100" value="50">

        <!-- SPOTIFY EMBED -->
        <div style="font-size:12px; color:#777; margin-top:10px; margin-bottom:5px;">ATMOSPHERIC FREQUENCY</div>
        <iframe style="border-radius:12px" src="https://open.spotify.com" width="100%" height="152" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>

        <button class="tab-btn" onclick="location.reload()">RESTART SIM</button>
        <button class="tab-btn" style="color:var(--n-green); border-color:var(--n-green)" onclick="unlockPieces()">▶ START SIMULATION</button>
        <button style="width:50px; height:50px; border-radius:50%; border:1px solid var(--n-blue); background:none; color:var(--n-blue); align-self:center; margin-top:auto; cursor:pointer;" onclick="toggleHelp()">?</button>
    </div>

    <div id="help-menu">
        <div class="asset-card">
            <strong>♔ KING (Royal)</strong><br>
            The King is the <strong>absolute core</strong> of the simulation. Survival is the primary <strong>win condition</strong>.
            <div style="background:rgba(0,0,0,0.3); padding:8px; margin-top:8px;"><em>Example: Escaping check by moving to a safe diagonal square.</em></div>
            Importance: <span style="color:var(--n-red)">Critical</span>
        </div>
    </div>

    <script>
        const pCanvas = document.getElementById('particle-canvas');
        const pCtx = pCanvas.getContext('2d');
        let parts = [], floating = [], isUnlocked = false, selected = null;
        let state = [['r','n','b','q','k','b','n','r'],['p','p','p','p','p','p','p','p'],['','','','','','','',''],['','','','','','','',''],['','','','','','','',''],['','','','','','','',''],['P','P','P','P','P','P','P','P'],['R','N','B','Q','K','B','N','R']];
        const icons = { 'r':'♜','n':'♞','b':'♝','q':'♛','k':'♚','p':'♟','R':'♖','N':'♘','B':'♗','Q':'♕','K':'♔','P':'♙' };

        function initBG() {
            pCanvas.width = window.innerWidth; pCanvas.height = window.innerHeight;
            for(let i=0; i<100; i++) parts.push({ x:Math.random()*pCanvas.width, y:Math.random()*pCanvas.height, s:Math.random()*2, v:Math.random()*0.5 });
        }

        function draw() {
            pCtx.clearRect(0,0,pCanvas.width,pCanvas.height);
            pCtx.fillStyle = 'rgba(255,255,255,0.4)';
            parts.forEach(p => { p.y -= p.v; if(p.y<0) p.y=pCanvas.height; pCtx.fillRect(p.x,p.y,p.s,p.s); });
            requestAnimationFrame(draw);
        }

        function render() {
            const el = document.getElementById('board'); el.innerHTML = '';
            state.forEach((row,r)=>row.forEach((p,c)=>{
                const sq = document.createElement('div'); sq.className = `sq ${(r+c)%2===0?'w':'b'}`;
                if(p) {
                    const span = document.createElement('span'); span.className='piece'; 
                    if(isUnlocked) span.classList.add('unlocked');
                    span.innerText=icons[p]; span.style.color = p===p.toUpperCase()?'#fff':'var(--n-blue)';
                    sq.appendChild(span);
                }
                sq.onclick = ()=>handleClick(r,c); el.appendChild(sq);
            }));
        }

        function handleClick(r,c) {
            if(!isUnlocked) return;
            if(selected) { state[r][c]=state[selected[0]][selected[1]]; state[selected[0]][selected[1]]=''; selected=null; render(); }
            else if(state[r][c]) { selected=[r,c]; render(); }
        }

        function unlockPieces() { isUnlocked = true; toggleSettings(); render(); }
        function toggleSettings() { 
            document.getElementById('settings-panel').classList.toggle('open'); 
            document.getElementById('gear-btn').classList.toggle('active');
        }
        function toggleHelp() { document.getElementById('help-menu').classList.toggle('active'); }

        window.onload = () => {
            initBG(); draw();
            const lb = document.getElementById('loading-board');
            for(let i=0; i<64; i++){ let d=document.createElement('div'); d.style.background=(Math.floor(i/8)+i)%2===0?'#111':'#080808'; lb.appendChild(d); }
            setTimeout(() => { document.getElementById('boot').style.display='none'; document.getElementById('assets').style.display='flex'; document.getElementById('assets').style.opacity='1'; launch(); }, 4000);
        };

        function launch() { 
            let p=0; let iv=setInterval(()=>{ p+=5; document.getElementById('fill').style.width=p+'%'; document.getElementById('perc').innerText=p+'%'; if(p>=100){ clearInterval(iv); document.getElementById('assets').style.display='none'; document.getElementById('game').style.display='flex'; document.getElementById('game').style.opacity='1'; render(); } },50);
        }
    </script>
</body>
</html>
