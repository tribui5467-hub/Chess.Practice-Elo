<!DOCTYPE html>
<html lang="en-AU">
<head>
    <meta charset="UTF-8">
    <title>Equinox Games | Chess Practice</title>
    <style>
        :root {
            --n-blue: #00f2ff; --n-green: #39FF14; --n-red: #fa412d;
            --n-orange: #f4943c; --n-yellow: #f1c40f;
            --smooth: cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        body, html { margin: 0; padding: 0; background: #000; color: white; font-family: 'Segoe UI', Tahoma, sans-serif; overflow: hidden; height: 100vh; width: 100vw; }
        /* Boot */
        #boot { position: fixed; inset: 0; background: black; z-index: 100000; display: flex; justify-content: center; align-items: center; }
        .equinox-text { font-size: 32px; letter-spacing: 12px; font-weight: 200; color: #fff; }
        /* Settings Panel */
        #settings-panel {
            position: fixed; top: 0; right: -400px; width: 400px; height: 100vh;
            background: #050505; border-left: 2px solid var(--n-blue);
            z-index: 45000; transition: right 0.6s var(--smooth);
            display: flex; flex-direction: column; padding: 60px 30px; box-sizing: border-box;
        }
        #settings-panel.open { right: 0; }
        #gear-handle {
            position: absolute; left: -72px; top: 50%; transform: translateY(-50%);
            width: 70px; height: 70px; display: flex; align-items: center; justify-content: center;
            cursor: pointer; z-index: 46000; background: #050505; border: 2px solid var(--n-blue);
            border-right: none; border-radius: 15px 0 0 15px;
        }
        #gear-icon { font-size: 45px; color: var(--n-blue); transition: transform 0.6s var(--smooth); }
        #settings-panel.open #gear-icon { transform: rotate(180deg); color: var(--n-green); }
        .ai-config { margin-top: 20px; border: 1px solid #222; padding: 20px; border-radius: 10px; }
        select { background: #111; color: var(--n-blue); border: 1px solid var(--n-blue); padding: 10px; width: 100%; margin-top: 10px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        #difficulty-box, #time-box {
            margin-top: 15px; padding: 15px; background: #0a0a0a; border: 1px solid #333;
            border-radius: 8px; display: none; flex-direction: column; gap: 8px;
            opacity: 0; transform: translateY(-15px); transition: all 0.45s var(--smooth);
        }
        #difficulty-box.show, #time-box.show { display: flex; opacity: 1; transform: translateY(0); }
        .diff-option, .time-option { padding: 10px 12px; border-radius: 6px; cursor: pointer; font-weight: bold; transition: all 0.2s; }
        #play-btn {
            background: var(--n-green); color: #000; border: none; padding: 15px;
            font-weight: 900; cursor: pointer; border-radius: 10px; width: 100%;
            text-transform: uppercase; margin-bottom: 20px; position: relative;
        }
        #play-btn.locked { filter: grayscale(1) brightness(0.7); cursor: not-allowed; }
        #play-btn::after { content: '⋮'; font-size: 28px; position: absolute; right: 20px; top: 50%; transform: translateY(-50%); }
        /* 3 dots dropdown */
        #play-menu {
            position: absolute; top: 100%; right: 20px; background: #111; border: 2px solid var(--n-blue);
            border-radius: 8px; padding: 8px 0; width: 220px; display: none; z-index: 46000;
            box-shadow: 0 0 20px var(--n-blue);
        }
        .menu-item { padding: 12px 20px; cursor: pointer; transition: 0.2s; }
        .menu-item:hover { background: #222; color: var(--n-green); }
        /* Board */
        #game { display: flex; width: 100vw; height: 100vh; justify-content: center; align-items: center; background: radial-gradient(circle, #0d0d0d 0%, #000 100%); }
        .board { width: 600px; height: 600px; display: grid; grid-template: repeat(8, 1fr) / repeat(8, 1fr); border: 4px solid #1a1a1a; background: #000; position: relative; }
        .sq { width: 75px; height: 75px; display: flex; justify-content: center; align-items: center; cursor: pointer; position: relative; overflow: hidden; }
        .w { background: #2a2a2e; } .b { background: #1a1a1c; }
        .locked .piece { filter: grayscale(1) brightness(0.6); pointer-events: none; }
        .hl-king, .hl-queen { box-shadow: inset 0 0 25px var(--n-red) !important; border: 1px solid var(--n-red) !important; }
        .hl-rook, .hl-bishop { box-shadow: inset 0 0 25px var(--n-orange) !important; border: 1px solid var(--n-orange) !important; }
        .hl-knight { box-shadow: inset 0 0 25px var(--n-yellow) !important; border: 1px solid var(--n-yellow) !important; }
        .hl-pawn { box-shadow: inset 0 0 25px var(--n-green) !important; border: 1px solid var(--n-green) !important; }
        .hl-pawn-blue { box-shadow: inset 0 0 25px var(--n-blue) !important; border: 1px solid var(--n-blue) !important; }
        .selected { background: rgba(0, 242, 255, 0.25) !important; outline: 3px solid var(--n-blue); }
        .ctrl-dot::after { content: ''; position: absolute; width: 22px; height: 22px; border: 3px solid var(--n-blue); border-radius: 50%; box-shadow: 0 0 15px var(--n-blue); pointer-events: none; z-index: 50; }
        .piece {
            font-size: 50px; user-select: none; z-index: 10; pointer-events: none;
            transition: transform 0.48s var(--smooth);
            position: relative;
        }
        .white-p { color: #fff; text-shadow: 0 0 10px #fff; }
        .black-p { color: #666; text-shadow: 0 0 10px #000; }
        /* Engine Icons */
        .engine-icon {
            position: absolute; top: -12px; right: -12px; font-size: 34px; z-index: 100;
            animation: videoIconPop 0.65s cubic-bezier(0.68, -0.55, 0.27, 1.55) forwards;
            pointer-events: none;
        }
        @keyframes videoIconPop {
            0% { transform: scale(0) rotate(-180deg); opacity: 0; }
            50% { transform: scale(1.6) rotate(20deg); }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }
        .engine-icon.fade-out { animation: iconFade 0.9s forwards; }
        @keyframes iconFade { to { transform: scale(0.4) rotate(90deg); opacity: 0; } }
        /* VFX */
        .shockwave { position: absolute; border: 2px solid white; border-radius: 50%; pointer-events: none; z-index: 99; animation: wave 0.6s ease-out forwards; transform: translate(-50%, -50%); }
        @keyframes wave { 0% { width: 0; height: 0; opacity: 1; } 100% { width: 200px; height: 200px; opacity: 0; } }
        .p-white { position: absolute; width: 4px; height: 4px; background: white; pointer-events: none; z-index: 101; border-radius: 50%; }
        /* Help Menu - FULL ORIGINAL */
        #help-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(15px); z-index: 55000; display: none; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.5s var(--smooth); }
        #help-overlay.active { opacity: 1; display: flex; }
        #help-container { width: 850px; height: 650px; background: #050505; border: 2px solid var(--n-green); border-radius: 20px; display: flex; flex-direction: column; overflow: hidden; transform: scale(0.9); transition: transform 0.5s var(--smooth); }
        #help-overlay.active #help-container { transform: scale(1); }
        .help-header { display: flex; justify-content: space-between; padding: 25px; border-bottom: 1px solid #222; background: #000; }
        .tab-btn { background: none; border: 1px solid #333; color: white; padding: 10px 18px; cursor: pointer; border-radius: 6px; font-weight: bold; text-transform: uppercase; font-size: 11px; margin-right: 8px; }
        .help-content { flex: 1; overflow-y: auto; padding: 30px; }
        .group-label { color: var(--n-blue); font-size: 11px; letter-spacing: 2px; text-transform: uppercase; margin: 30px 0 15px 0; border-bottom: 1px solid #222; display: block; padding-bottom: 5px; font-weight: bold; }
        .asset-card { border-left: 3px solid var(--n-blue); background: #0f0f0f; padding: 20px; margin-bottom: 15px; cursor: pointer; transition: 0.3s; border-radius: 0 10px 10px 0; }
        .asset-card:hover { transform: scale(1.02); background: #151515; box-shadow: 0 0 25px var(--n-blue); }
        .asset-card b { color: var(--n-yellow); display: block; margin-bottom: 8px; font-size: 16px; }
        #expansion-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(25px); z-index: 70000; display: none; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.4s var(--smooth); }
        #expansion-overlay.active { opacity: 1; display: flex; }
        #expansion-box { width: 85%; max-width: 950px; background: #050505; border: 3px solid var(--n-blue); border-radius: 30px; padding: 60px; position: relative; box-shadow: 0 0 80px var(--n-blue); transform: scale(0.8); transition: transform 0.4s var(--smooth); }
        .close-expanded { position: absolute; top: 25px; right: 25px; width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; border: 2px solid var(--n-red); color: var(--n-red); border-radius: 50%; font-size: 24px; cursor: pointer; transition: 0.3s; background: none; }
        .close-expanded:hover { background: var(--n-red); color: white; }
        /* Epic End Screen */
        #end-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.96); backdrop-filter: blur(25px);
            z-index: 90000; display: none; align-items: center; justify-content: center; flex-direction: column; gap: 20px;
        }
        #end-title { font-size: 78px; font-weight: 900; letter-spacing: 8px; text-shadow: 0 0 40px var(--n-red); }
        #end-subtitle { font-size: 32px; color: #ddd; }
        #end-btn {
            background: var(--n-green); color: #000; padding: 18px 70px; font-size: 26px; font-weight: 900;
            border: none; border-radius: 15px; cursor: pointer; transition: all 0.4s var(--smooth);
        }
        #end-btn:hover { transform: scale(1.12); box-shadow: 0 0 40px var(--n-green); }
        #turn-info { position: fixed; top: 40px; left: 50%; transform: translateX(-50%); letter-spacing: 5px; color: var(--n-blue); font-weight: bold; border: 2px solid var(--n-blue); padding: 10px 35px; border-radius: 30px; z-index: 100; }
    </style>
</head>
<body>
    <div id="boot"><div class="equinox-text">EQUINOX SYSTEM</div></div>
    <div id="turn-info">WHITE'S TURN</div>
    <div id="settings-panel">
        <div id="gear-handle" onclick="toggleSettings()">
            <span id="gear-icon">⚙</span>
        </div>
        <h2 style="color: var(--n-blue); margin-top: 0; letter-spacing: 5px; text-align:center;">SETTINGS</h2>
        <button id="play-btn" onclick="startGame()">PLAY</button>
        <div class="ai-config">
            <label style="font-size: 10px; color: var(--n-blue); letter-spacing: 2px;">OPPONENT TYPE</label>
            <select id="ai-toggle" onchange="toggleAI()">
                <option value="manual">MANUAL PRACTICE</option>
                <option value="ai">EQUINOX AI</option>
            </select>
            <div id="difficulty-box">
                <label style="font-size: 10px; color: var(--n-blue); letter-spacing: 2px;">DIFFICULTY TIER</label>
                <div class="diff-option" data-diff="0" style="background:#333;color:#aaa;" onclick="setDifficulty(0)">DEMONSTRATION</div>
                <div class="diff-option" data-diff="1" style="background:#006400;color:#39ff14;" onclick="setDifficulty(1)">BEGINNER</div>
                <div class="diff-option" data-diff="2" style="background:#b8860b;color:#ffd700;" onclick="setDifficulty(2)">MODERATE</div>
                <div class="diff-option" data-diff="3" style="background:#cc5500;color:#ff8c00;" onclick="setDifficulty(3)">PROFESSIONAL</div>
                <div class="diff-option" data-diff="4" style="background:#8b0000;color:#ff2d55;" onclick="setDifficulty(4)">MASTER</div>
                <div class="diff-option" data-diff="5" style="background:#4b0082;color:#c026d3;" onclick="setDifficulty(5)">GRANDMASTER</div>
            </div>
            <div id="time-box">
                <label style="font-size: 10px; color: var(--n-blue); letter-spacing: 2px;">SESSION PERIOD</label>
                <div class="time-option" data-time="0" onclick="setTime(0)">UNLIMITED</div>
                <div class="time-option" data-time="300" onclick="setTime(300)">5 MINUTES</div>
                <div class="time-option" data-time="600" onclick="setTime(600)">10 MINUTES</div>
                <div class="time-option" data-time="900" onclick="setTime(900)">15 MINUTES</div>
            </div>
        </div>
    </div>
    <!-- 3 dots menu with Archived Help -->
    <div id="play-menu">
        <div class="menu-item" onclick="resignGame()">Resign</div>
        <div class="menu-item" onclick="openHelp()">Archived Help</div>
        <div class="menu-item" onclick="resetBoard()">Reset</div>
    </div>
    <!-- Full Help Menu -->
    <div id="help-overlay">
        <div id="help-container">
            <div class="help-header">
                <div>
                    <button class="tab-btn" onclick="showTab('pieces', this)">Pieces</button>
                    <button class="tab-btn" onclick="showTab('icons', this)">Icons</button>
                    <button class="tab-btn" onclick="showTab('mechanics', this)">Mechanics</button>
                </div>
                <button onclick="closeHelp()" style="background:none; border:none; color:var(--n-red); cursor:pointer; font-size: 24px;">✕</button>
            </div>
            <div id="help-text" class="help-content"></div>
        </div>
    </div>
    <!-- Expansion -->
    <div id="expansion-overlay">
        <div id="expansion-box">
            <button class="close-expanded" onclick="closeExpansion()">✕</button>
            <div id="expansion-text" style="font-size: 22px; line-height: 1.8; color: #eee;"></div>
        </div>
    </div>
    <!-- Epic End Screen -->
    <div id="end-overlay">
        <div id="end-title"></div>
        <div id="end-subtitle"></div>
        <button id="end-btn" onclick="restartGame()">ANOTHER SESSION</button>
    </div>
    <div id="game"><div class="board" id="board"></div></div>
<script>
    const boardEl = document.getElementById('board');
    let boardState = Array(64).fill(null);
    let currentTurn = 'W';
    let selectedSq = null;
    let ctrlLocked = false;
    let isAIActive = false;
    let currentDifficulty = 3;
    let gameStarted = false;
    const glyphs = { 'r':'♜','n':'♞','b':'♝','q':'♛','k':'♚','p':'♟','R':'♖','N':'♘','B':'♗','Q':'♕','K':'♔','P':'♙' };
    const hlMap = { 'k':'hl-king','q':'hl-queen','r':'hl-rook','b':'hl-bishop','n':'hl-knight','p':'hl-pawn' };
    const pieceValue = { 'p':1, 'n':3, 'b':3.5, 'r':5, 'q':9, 'k':100 };
    const helpData = {
        pieces: `<div class="asset-card" onclick="expandDef(this)"><b>The Pawn</b> The fundamental infantry unit of chess. It possesses a restricted forward movement of one square, yet captures diagonally. Upon its initial move, it may advance two squares. Reaching the terminal rank allows for promotion into a Queen, Rook, Bishop, or Knight, granting the piece immense late-game utility.</div><div class="asset-card" onclick="expandDef(this)"><b>The Knight</b> A specialized tactical unit that navigates the board in a unique 'L' pattern—two squares in one cardinal direction followed by one square perpendicular. It maintains the singular ability to leap over intervening pieces, making it an invaluable asset in congested board states where other pieces are obstructed.</div><div class="asset-card" onclick="expandDef(this)"><b>The Bishop</b> A sophisticated long-range operative that slides any distance along diagonal trajectories. Each Bishop is permanently confined to the square colour it begins on, requiring them to work in coordinated pairs to control both light and dark regions of the board effectively throughout the middle and end game.</div><div class="asset-card" onclick="expandDef(this)"><b>The Rook</b> A formidable heavy piece moving in straight horizontal or vertical lines across any number of unoccupied squares. It plays a critical role in king safety through the castling maneuver and is often the primary force behind powerful ladder checkmates during the final stages of the match.</div><div class="asset-card" onclick="expandDef(this)"><b>The Queen</b> The most versatile and powerful asset on the board. She combines the movement capabilities of both the Rook and the Bishop, sliding any distance in any straight or diagonal direction. Her presence dictates the tempo and pressure of the match, serving as both a primary attacker and a central defender.</div><div class="asset-card" onclick="expandDef(this)"><b>The King</b> The pivotal figure around which the entire game revolves. While moving only one square in any direction, his preservation is absolute. If the King is placed under attack and cannot find a safe square, the match concludes immediately, rendering his protection the player's ultimate strategic priority.</div>`,
        icons: `<span class="group-label">Positive Indicators</span><div class="asset-card" onclick="expandDef(this)"><b>The Best Move (Star)</b> This designation signifies the absolute strongest continuation identified by the engine analysis. Playing this move optimizes your winning probability and represents the highest level of technical accuracy possible in the current position, often finding the only path to a victory.</div><div class="asset-card" onclick="expandDef(this)"><b>Good Move (Tick)</b> Indicates a solid, fundamentally sound choice that maintains the current evaluation of the position. While it may not be the engine's primary preference, it adheres to sound chess principles and ensures the player does not concede any unnecessary tactical advantages.</div><span class="group-label">Negative Indicators</span><div class="asset-card" onclick="expandDef(this)"><b>Inaccuracy (Exclamation)</b> Marks a sub-optimal move that noticeably weakens your standing. It suggests a missed opportunity to apply pressure or a minor positional concession that allows the opponent to improve their pieces more easily than the optimal continuation would have permitted.</div><div class="asset-card" onclick="expandDef(this)"><b>Blunder (Death Emoji)</b> A catastrophic error that tangibly reduces your advantage or directly allows the opponent to achieve a winning position. This usually results from an overlooked tactical sequence or a serious misunderstanding of the immediate requirements of the board position.</div><div class="asset-card" onclick="expandDef(this)"><b>Fatal Blunder (Death)</b> Reserved for moves that lead to an immediate loss of the game or the loss of a major piece without compensation. This classification represents a total collapse of strategy and typically shifts the game evaluation into a forced win for the opponent.</div>`,
        mechanics: `<span class="group-label">Core Mechanics</span><div class="asset-card" onclick="expandDef(this)"><b>Capturing Methodology</b> To capture an opponent's unit, you must move your piece onto the square it currently occupies. The displaced piece is permanently removed from the field. You cannot capture your own units or occupy a square already held by your own color, requiring careful navigation of space.</div><div class="asset-card" onclick="expandDef(this)"><b>En Passant</b> A specialized pawn capture occurring when an opponent moves their pawn two squares forward from its starting position and lands adjacent to your pawn. You may capture that pawn as if it had only moved one square, provided you do so on the very next turn.</div><span class="group-label">Ending Conditions</span><div class="asset-card" onclick="expandDef(this)"><b>Checkmate (Absolute Victory)</b> The definitive conclusion of a chess match. This occurs when a King is under direct threat of capture and possesses no legal moves to relocate, block the line of attack, or eliminate the attacking piece entirely. The game ends immediately in a win for the attacker.</div><div class="asset-card" onclick="expandDef(this)"><b>Stalemate (Technical Draw)</b> A unique situation where the player whose turn it is has no legal moves remaining, yet their King is not currently in check. Because the player cannot move but is not defeated, the game ends in a draw, often occurring as a defensive 'swindle'.</div><div class="asset-card" onclick="expandDef(this)"><b>Resignation (Concession)</b> A formal acknowledgement of defeat. A player may choose to resign at any moment if they determine the position is strategically hopeless. This is considered professional courtesy when a loss is mathematically certain, immediately awarding the full victory to the opponent.</div><div class="asset-card" onclick="expandDef(this)"><b>Timeout (Temporal Loss)</b> In timed competitive play, if a player's clock expires before they complete their required moves, they lose the game immediately. This emphasizes the importance of time management as a critical strategic resource, where speed is as vital as tactical precision.</div>`
    };
    function init() {
        const map = "rnbqkbnrpppppppp................................PPPPPPPPRNBQKBNR";
        for(let i=0; i<64; i++) boardState[i] = map[i] === '.' ? null : map[i];
        render();
    }
    function render() {
        boardEl.innerHTML = '';
        for (let i = 0; i < 64; i++) {
            const sq = document.createElement('div');
            sq.className = `sq ${(Math.floor(i/8) + i%8) % 2 === 0 ? 'w' : 'b'}`;
            sq.dataset.idx = i;
            if (boardState[i]) {
                const p = document.createElement('div');
                p.className = `piece ${boardState[i] === boardState[i].toUpperCase() ? 'white-p' : 'black-p'}`;
                p.innerHTML = glyphs[boardState[i].toLowerCase()];
                sq.appendChild(p);
            }
            sq.onclick = () => handleSquare(i);
            boardEl.appendChild(sq);
        }
        document.getElementById('turn-info').innerText = currentTurn === 'W' ? "WHITE'S TURN" : "BLACK'S TURN";
    }
    function movePieceWithAnimation(from, to) {
        if (!gameStarted) return;
        const fromSq = document.querySelector(`[data-idx="${from}"]`);
        const toSq = document.querySelector(`[data-idx="${to}"]`);
        const pieceEl = fromSq ? fromSq.querySelector('.piece') : null;
        const wasCapture = !!boardState[to];

        if (!pieceEl) {
            // Fallback (should never trigger on valid move)
            boardState[to] = boardState[from];
            boardState[from] = null;
            currentTurn = currentTurn === 'W' ? 'B' : 'W';
            render();
            if (wasCapture) spawnVFX(to, true);
            checkGameEnd();
            if (isAIActive && currentTurn === 'B') setTimeout(aiLogic, 700);
            return;
        }

        // === SMOOTH GLIDE ANIMATION ===
        const rectFrom = fromSq.getBoundingClientRect();
        const rectTo = toSq.getBoundingClientRect();
        const dx = rectTo.left - rectFrom.left;
        const dy = rectTo.top - rectFrom.top;

        // Force starting position
        pieceEl.style.transition = 'none';
        pieceEl.style.transform = 'translate(0px, 0px)';
        void pieceEl.offsetWidth; // Trigger reflow

        // Animate glide with the exact same smooth curve you already defined
        pieceEl.style.transition = 'transform 0.48s var(--smooth)';
        pieceEl.style.transform = `translate(${dx}px, ${dy}px)`;

        // After glide finishes, commit the move
        setTimeout(() => {
            boardState[to] = boardState[from];
            boardState[from] = null;
            currentTurn = currentTurn === 'W' ? 'B' : 'W';
            render();
            if (wasCapture) spawnVFX(to, true);
            checkGameEnd();
            if (isAIActive && currentTurn === 'B') setTimeout(aiLogic, 700);
        }, 490);
    }
    function spawnVFX(idx, isCapture) {
        const sq = document.querySelector(`[data-idx="${idx}"]`);
        if (!sq) return;
        const icon = document.createElement('div');
        icon.className = 'engine-icon';
        icon.innerHTML = isCapture ? '‼️' : '✔️';
        icon.style.color = isCapture ? '#ff2d55' : '#39ff14';
        sq.appendChild(icon);
        setTimeout(() => {
            icon.classList.add('fade-out');
            setTimeout(() => icon.remove(), 900);
        }, 1400);
    }
    function isPathClear(f, t) {
        const r1 = Math.floor(f/8), c1 = f%8, r2 = Math.floor(t/8), c2 = t%8;
        const dr = Math.sign(r2-r1), dc = Math.sign(c2-c1);
        let cr = r1 + dr, cc = c1 + dc;
        while (cr !== r2 || cc !== c2) {
            if (boardState[cr*8 + cc]) return false;
            cr += dr; cc += dc;
        }
        return true;
    }
    function isValid(f, t) {
        if (f === t) return false;
        const p = boardState[f], tar = boardState[t];
        if (tar && (p === p.toUpperCase()) === (tar === tar.toUpperCase())) return false;
        const r1 = Math.floor(f/8), c1 = f%8, r2 = Math.floor(t/8), c2 = t%8;
        const dr = Math.abs(r2-r1), dc = Math.abs(c2-c1), type = p.toLowerCase();
        switch (type) {
            case 'p': const d = p === 'P' ? -1 : 1; return (dc === 0 && r2-r1 === d && !tar) || (dc === 0 && r2-r1 === 2*d && r1 === (p==='P'?6:1) && !tar) || (dc === 1 && r2-r1 === d && tar);
            case 'r': return (r1 === r2 || c1 === c2) && isPathClear(f, t);
            case 'n': return dr*dc === 2;
            case 'b': return dr === dc && isPathClear(f, t);
            case 'q': return (r1 === r2 || c1 === c2 || dr === dc) && isPathClear(f, t);
            case 'k': return dr <= 1 && dc <= 1;
        }
        return false;
    }
    function handleSquare(i) {
        if (!gameStarted || (currentTurn === 'B' && isAIActive)) return;
        const p = boardState[i], isW = p ? p === p.toUpperCase() : null;

        if (selectedSq === null) {
            if (p && ((currentTurn === 'W' && isW) || (currentTurn === 'B' && !isW))) {
                selectedSq = i;
                render();
                document.querySelector(`[data-idx="${i}"]`).classList.add('selected');
                if (ctrlLocked) updateDots(i);
            }
        } else {
            if (isValid(selectedSq, i)) {
                // VALID MOVE → glide smoothly, then commit
                movePieceWithAnimation(selectedSq, i);
                selectedSq = null;
                // IMPORTANT: do NOT call render() here — the animation will handle it at the end
            } else {
                // Invalid click → just deselect
                selectedSq = null;
                render();
            }
        }
    }
    function aiLogic() {
        let moves = [];
        for(let f=0; f<64; f++) {
            if(boardState[f] && boardState[f] === boardState[f].toLowerCase()) {
                for(let t=0; t<64; t++) {
                    if(isValid(f, t)) {
                        const captured = boardState[t];
                        const movingPiece = boardState[f].toLowerCase();
                        const captureValue = captured ? pieceValue[captured.toLowerCase()] : 0;
                        const myValue = pieceValue[movingPiece];
                        let score = captureValue * 1.2 - myValue * 0.3;
                        if (captureValue > 0 && captureValue < myValue && currentDifficulty >= 3) score -= (myValue - captureValue) * 2;
                        moves.push({f, t, capture: !!captured, score});
                    }
                }
            }
        }
        if (moves.length === 0) { checkGameEnd(); return; }
        if (currentDifficulty >= 5) moves.sort((a,b) => b.score - a.score);
        else if (currentDifficulty >= 3) moves.sort((a,b) => b.score - a.score);
        else if (currentDifficulty >= 1) moves.sort((a,b) => (b.capture ? 1 : 0) - (a.capture ? 1 : 0));
        else moves.sort(() => Math.random() - 0.5);
        const chosen = moves[0];
        movePieceWithAnimation(chosen.f, chosen.t);
        // NO manual turn flip here — movePieceWithAnimation now handles it cleanly after the glide
    }
    function updateDots(idx) {
        document.querySelectorAll('.ctrl-dot').forEach(d => d.classList.remove('ctrl-dot'));
        for (let i = 0; i < 64; i++) {
            if (isValid(idx, i)) {
                const sq = document.querySelector(`[data-idx="${i}"]`);
                if (sq) sq.classList.add('ctrl-dot');
            }
        }
    }
    document.addEventListener('mouseover', (e) => {
        const sq = e.target.closest('.sq'); if (!sq) return;
        const p = boardState[sq.dataset.idx]; if (!p) return;
        let hl = hlMap[p.toLowerCase()];
        if (p.toLowerCase() === 'p') {
            const row = Math.floor(sq.dataset.idx / 8), dist = (p === 'P') ? row : (7 - row);
            if (dist >= 1 && dist <= 5) hl = 'hl-pawn-blue';
        }
        sq.classList.add(hl);
    });
    document.addEventListener('mouseout', (e) => {
        const sq = e.target.closest('.sq');
        if (sq) sq.className = sq.className.split(' ').filter(c => !c.startsWith('hl-')).join(' ');
    });
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Control') {
            ctrlLocked = !ctrlLocked;
            if (!ctrlLocked) document.querySelectorAll('.ctrl-dot').forEach(d => d.classList.remove('ctrl-dot'));
            else if (selectedSq !== null) updateDots(selectedSq);
        }
    });
    function checkGameEnd() {
        const kingPos = findKing(currentTurn);
        if (kingPos === -1) return;
        const inCheck = isSquareAttacked(kingPos, currentTurn === 'W' ? 'B' : 'W');
        const hasMoves = hasAnyLegalMoves(currentTurn);
        if (!hasMoves) {
            gameStarted = false;
            if (inCheck) {
                showEndScreen(currentTurn === 'W' ? "BLACK WINS" : "WHITE WINS", "CHECKMATE");
            } else {
                showEndScreen("DRAW", "STALEMATE");
            }
        }
    }
    function findKing(color) {
        const king = color === 'W' ? 'K' : 'k';
        for(let i=0; i<64; i++) if(boardState[i] === king) return i;
        return -1;
    }
    function isSquareAttacked(pos, byColor) {
        for(let f=0; f<64; f++) {
            if(boardState[f] && ((boardState[f] === boardState[f].toUpperCase()) === (byColor === 'W'))) {
                if(isValid(f, pos)) return true;
            }
        }
        return false;
    }
    function hasAnyLegalMoves(color) {
        for(let f=0; f<64; f++) {
            if(boardState[f] && ((boardState[f] === boardState[f].toUpperCase()) === (color === 'W'))) {
                for(let t=0; t<64; t++) if(isValid(f, t)) return true;
            }
        }
        return false;
    }
    function showEndScreen(title, subtitle) {
        document.getElementById('end-title').innerText = title;
        document.getElementById('end-subtitle').innerText = subtitle;
        document.getElementById('end-overlay').style.display = 'flex';
    }
    function restartGame() {
        document.getElementById('end-overlay').style.display = 'none';
        init();
        gameStarted = false;
        document.getElementById('play-btn').classList.remove('locked');
    }
    function toggleSettings() { document.getElementById('settings-panel').classList.toggle('open'); }
    function toggleAI() {
        isAIActive = document.getElementById('ai-toggle').value === 'ai';
        const box = document.getElementById('difficulty-box');
        if (isAIActive) { box.style.display = 'flex'; setTimeout(() => box.classList.add('show'), 10); }
        else { box.classList.remove('show'); setTimeout(() => box.style.display = 'none', 400); }
    }
    function setDifficulty(lvl) {
        currentDifficulty = lvl;
        document.querySelectorAll('.diff-option').forEach(el => el.style.border = parseInt(el.dataset.diff) === lvl ? '2px solid var(--n-blue)' : 'none');
    }
    function startGame() {
        gameStarted = true;
        document.getElementById('play-btn').classList.add('locked');
        render();
    }
    function resignGame() {
        document.getElementById('play-menu').style.display = 'none';
        showEndScreen("I SURRENDER", "You resigned");
    }
    function resetBoard() {
        document.getElementById('play-menu').style.display = 'none';
        init();
        gameStarted = false;
        document.getElementById('play-btn').classList.remove('locked');
    }
    function openHelp() {
        const overlay = document.getElementById('help-overlay');
        overlay.style.display = 'flex';
        setTimeout(() => overlay.classList.add('active'), 10);
        showTab('pieces', document.querySelector('.tab-btn'));
    }
    function closeHelp() {
        const overlay = document.getElementById('help-overlay');
        overlay.classList.remove('active');
        setTimeout(() => overlay.style.display = 'none', 500);
    }
    function showTab(t, b) {
        document.querySelectorAll('.tab-btn').forEach(x => x.style.borderColor = '#333');
        b.style.borderColor = 'var(--n-green)';
        document.getElementById('help-text').innerHTML = helpData[t];
    }
    function expandDef(card) {
        document.getElementById('expansion-text').innerHTML = card.innerHTML;
        document.getElementById('expansion-overlay').style.display = 'flex';
        setTimeout(() => document.getElementById('expansion-overlay').classList.add('active'), 10);
    }
    function closeExpansion() {
        const overlay = document.getElementById('expansion-overlay');
        overlay.classList.remove('active');
        setTimeout(() => overlay.style.display = 'none', 400);
    }
    // 3 dots trigger
    document.getElementById('play-btn').addEventListener('click', (e) => {
        if (!gameStarted) return;
        const menu = document.getElementById('play-menu');
        menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
        e.stopImmediatePropagation();
    });
    document.addEventListener('click', (e) => {
        if (!e.target.closest('#play-btn')) document.getElementById('play-menu').style.display = 'none';
    });
    setTimeout(() => { document.getElementById('boot').style.display = 'none'; }, 3000);
    init();
</script>
</body>
