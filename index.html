<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess Practice | Elo</title>
    <link id="favicon" rel="icon" type="image/webp" href="noFilter.webp">
    <link href="https://fonts.googleapis.com/css2?family=Chewy&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
   
    <style>
        :root { --primary: #a855f7; --accent: #22c55e; --bg: #020617; --text: #ffffff; --card: rgba(30, 41, 59, 0.5); }
        body {
            background-color: var(--bg); color: var(--text); font-family: 'Chewy', cursive;
            transition: all 0.3s ease; overflow-x: hidden; min-height: 100vh;
            background-size: cover; background-position: center; background-attachment: fixed;
        }
        #particle-canvas { position: fixed; top: 0; left: 0; z-index: -1; pointer-events: none; }
       
        .main-logo-container { display: flex; justify-content: center; padding-top: 40px; margin-bottom: -10px; }
        .main-logo { width: 350px; height: auto; filter: drop-shadow(0 0 15px var(--primary)); cursor: pointer; transition: transform 0.3s ease, filter 0.3s ease; }
        .main-logo:hover { transform: scale(1.05); }

        .island-header { /* your original header styles */ 
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 99px;
            padding: 10px 28px; display: flex; align-items: center; gap: 20px;
            margin: 20px auto 40px; width: fit-content; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .game-card {
            position: relative; aspect-ratio: 1/1; overflow: hidden; border-radius: 1.2rem;
            border: 2px solid transparent; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background: var(--card); cursor: pointer;
        }
        .game-card:hover { border-color: var(--primary); transform: scale(1.03); box-shadow: 0 0 15px var(--primary); }
        .game-card img { width: 100%; height: 100%; object-fit: cover; }

        .card-title {
            position: absolute; bottom: -100%; left: 0; width: 100%;
            background: linear-gradient(transparent, rgba(0,0,0,0.9));
            padding: 20px 5px 10px; text-align: center; transition: bottom 0.3s ease;
            display: flex; align-items: center; justify-content: space-between; padding: 20px 12px 10px;
        }
        .game-card:hover .card-title { bottom: 0; }

        .more-btn {
            opacity: 0; transition: all 0.3s;
            background: rgba(0,0,0,0.7); width: 32px; height: 32px;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 1.3rem; color: white;
        }
        .game-card:hover .more-btn { opacity: 1; }

        .category-tabs { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin: 25px 0 35px; }
        .cat-tab {
            padding: 10px 24px; border-radius: 9999px; background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1); cursor: pointer; transition: all 0.3s;
        }
        .cat-tab.active { background: var(--primary); color: black; box-shadow: 0 0 20px var(--primary); }

        .group-header {
            grid-column: 1 / -1; color: var(--primary); font-size: 2rem; 
            margin: 35px 0 15px 10px; text-shadow: 0 0 12px var(--primary);
        }
    </style>
</head>
<body class="p-4">
    <canvas id="particle-canvas"></canvas>

    <div class="main-logo-container">
        <img id="mainLogoImg" src="" alt="Logo" class="main-logo" onclick="location.reload()">
    </div>

    <header class="island-header">
        <!-- Your original nav icons -->
        <img id="penguinHeadImg" src="" onclick="location.reload()" class="penguin-nav-btn" title="Home">
        <div class="h-6 w-[1px] bg-white/20"></div>
        <i class="fas fa-gamepad nav-icon" onclick="renderGames('games')" title="Games"></i>
        <i class="fas fa-th-large nav-icon" onclick="renderGames('apps')" title="Apps"></i>
        <i class="fas fa-dice nav-icon" onclick="openRandomGame()" title="Random Game"></i>
        <i class="fas fa-link nav-icon" onclick="renderGames('backups')" title="Backups"></i>
        <i class="fas fa-circle-info nav-icon" onclick="toggleInfo()" title="Info"></i>
        
        <div class="relative">
            <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-sm opacity-50"></i>
            <input type="text" id="searchInput" placeholder="Search games or genres..."
                   class="bg-white/5 border border-white/10 py-1 pl-9 pr-4 rounded-full focus:outline-none focus:ring-1 focus:ring-primary text-sm w-64">
        </div>
        <i class="fas fa-sliders nav-icon" onclick="toggleSettings()"></i>
    </header>

    <main class="max-w-7xl mx-auto">
        <div id="categoryTabs" class="category-tabs"></div>
        <div id="gameGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-5"></div>
    </main>

    <!-- Game Details Modal -->
    <div id="gameDetailsModal" class="fixed inset-0 bg-black/90 backdrop-blur-md hidden flex items-center justify-center z-[150]">
        <div class="bg-slate-900 border border-white/10 rounded-3xl max-w-lg w-full mx-4 p-8">
            <div class="flex justify-between mb-6">
                <h2 id="detailsTitle" class="text-3xl" style="color: var(--primary);"></h2>
                <button onclick="closeDetailsModal()" class="text-4xl text-gray-400 hover:text-white">×</button>
            </div>
            <img id="detailsThumb" class="w-full rounded-2xl mb-6" style="max-height: 280px; object-fit: cover;">
            <p><strong>Genre:</strong> <span id="detailsGenre" class="text-lg"></span></p>
            <p class="mt-4"><strong>Description:</strong></p>
            <p id="detailsDesc" class="text-gray-300 leading-relaxed"></p>
            <button onclick="closeDetailsModal()" class="mt-6 w-full py-3 bg-white/10 rounded-2xl hover:bg-white/20">Close</button>
        </div>
    </div>

    <!-- Paste your original infoTab, settingsPanel, gameModal here (unchanged) -->

<script>
    const repoOwner = "hazzatazza";
    const repoName = "algebruh-practise";
    const cdnBase = `https://cdn.jsdelivr.net/gh/${repoOwner}/${repoName}@main/`;
   
    let games = [];
    let backups = [];
    let currentFilter = 'games';
    let currentCategory = 'All';

    async function loadData() {
        try {
            document.getElementById('mainLogoImg').src = cdnBase + 'logo.png';
            document.getElementById('penguinHeadImg').src = cdnBase + 'penguinhead.png';
           
            const shaResponse = await fetch(`https://api.github.com/repos/${repoOwner}/${repoName}/commits?t=${Date.now()}`);
            const commits = await shaResponse.json();
            const sha = commits[0].sha;

            const gamesResponse = await fetch(`https://cdn.jsdelivr.net/gh/${repoOwner}/${repoName}@${sha}/games.json`);
            games = await gamesResponse.json();

            const linksResponse = await fetch(`https://cdn.jsdelivr.net/gh/${repoOwner}/${repoName}@${sha}/links.json`);
            backups = await linksResponse.json();

            renderCategoryTabs();
            renderGames('games');
        } catch (error) { console.error("Error loading data:", error); }
    }

    function renderCategoryTabs() {
        const container = document.getElementById('categoryTabs');
        container.innerHTML = '';
        const cats = ['All', ...new Set(games.map(g => g.category || 'Uncategorized'))];
        cats.forEach(cat => {
            const tab = document.createElement('div');
            tab.className = `cat-tab ${cat === currentCategory ? 'active' : ''}`;
            tab.textContent = cat;
            tab.onclick = () => { currentCategory = cat; renderCategoryTabs(); renderGames(currentFilter); };
            container.appendChild(tab);
        });
    }

    function renderGames(filter = 'games', search = '') {
        currentFilter = filter;
        const grid = document.getElementById('gameGrid');
        grid.innerHTML = '';

        let items = filter === 'backups' ? backups : games;

        items = items.filter(item => {
            if (filter === 'apps' && item.type !== 'app') return false;
            if (filter === 'games' && item.type === 'app') return false;

            const term = search.toLowerCase();
            const matchesSearch = !term || 
                item.title.toLowerCase().includes(term) || 
                (item.genre && item.genre.toLowerCase().includes(term));

            const matchesCategory = currentCategory === 'All' || (item.category || 'Uncategorized') === currentCategory;

            return matchesSearch && matchesCategory;
        });

        if (filter === 'backups') {
            // backup rendering (your original)
            items.forEach(item => {
                const card = document.createElement('div');
                card.className = 'backup-card';
                card.onclick = () => window.open(item.url, '_blank');
                card.innerHTML = `<i class="fas ${item.icon}"></i><div class="backup-label">${item.title}</div>`;
                grid.appendChild(card);
            });
            return;
        }

        // Group headers when All is selected
        if (currentCategory === 'All') {
            const grouped = {};
            items.forEach(item => {
                const cat = item.category || 'Uncategorized';
                if (!grouped[cat]) grouped[cat] = [];
                grouped[cat].push(item);
            });

            Object.keys(grouped).sort().forEach(cat => {
                const header = document.createElement('div');
                header.className = 'group-header';
                header.textContent = cat.toUpperCase();
                grid.appendChild(header);

                grouped[cat].forEach(game => createGameCard(game, grid));
            });
        } else {
            items.forEach(game => createGameCard(game, grid));
        }
    }

    function createGameCard(game, grid) {
        const card = document.createElement('div');
        card.className = 'game-card';
        card.innerHTML = `
            <img src="${cdnBase}${game.thumb}" loading="lazy">
            <div class="card-title">
                <span>${game.title}</span>
                <div onclick="event.stopImmediatePropagation(); showGameDetails('${game.id}')" class="more-btn">⋯</div>
            </div>
        `;
        card.onclick = (e) => {
            if (!e.target.closest('.more-btn')) openGame(game.id);
        };
        grid.appendChild(card);
    }

    function openGame(id) {
        const game = games.find(g => g.id === id);
        if (!game) return alert("Game not found!");
        
        document.getElementById('modalTitle').textContent = game.title;
        document.getElementById('modalIcon').src = cdnBase + game.thumb;
        document.getElementById('iframeContainer').innerHTML = `<iframe id="gameIframe" src="${game.url}" class="w-full h-full border-none" allowfullscreen></iframe>`;
        document.getElementById('gameModal').classList.remove('hidden');
    }

    function showGameDetails(id) {
        const game = games.find(g => g.id === id);
        if (!game) return;
        document.getElementById('detailsTitle').textContent = game.title;
        document.getElementById('detailsThumb').src = cdnBase + game.thumb;
        document.getElementById('detailsGenre').textContent = game.genre || "Unknown";
        document.getElementById('detailsDesc').textContent = game.description || "No description available.";
        document.getElementById('gameDetailsModal').classList.remove('hidden');
    }

    function closeDetailsModal() {
        document.getElementById('gameDetailsModal').classList.add('hidden');
    }

    // Keep all your other functions (closeGame, toggleSettings, etc.) from your original code

    document.getElementById('searchInput').oninput = (e) => renderGames(currentFilter, e.target.value);

    window.onload = () => {
        // your original onload code...
        loadData();
    };
</script>
</body>
</html>
