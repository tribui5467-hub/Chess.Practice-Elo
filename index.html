<!DOCTYPE html>
<html lang="en-AU">
<head>
    <meta charset="UTF-8">
    <title>Chess-Practice | Elo</title>
    <!-- INTERNAL CHESS ENGINE (Bypasses School Blocks) -->
    <script src="https://cdnjs.cloudflare.com"></script>
    <style>
        :root { --n-blue: #00f2ff; --n-green: #00ff00; --n-red: #ff4757; --n-orange: #ffa502; --n-yellow: #eccc68; --bg: #0a0b10; }
        body { margin: 0; background: var(--bg); overflow: hidden; font-family: 'Segoe UI', sans-serif; color: white; user-select: none; display: flex; justify-content: center; align-items: center; height: 100vh; }

        /* 1. BOOT SCREEN */
        #boot-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 5000; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: 0.8s cubic-bezier(0.19, 1, 0.22, 1); }
        #boot-screen.loaded { transform: scale(0.78); border: 2px solid var(--n-blue); border-radius: 15px; box-shadow: 0 0 35px rgba(0, 242, 255, 0.2); background: rgba(10, 11, 16, 0.98); }
        #boot-screen.panic { transform: scale(0.78, 0) translateY(1200px); opacity: 0; }
        .progress-bar { width: 250px; height: 2px; background: rgba(255,255,255,0.1); margin-top: 20px; position: relative; }
        .progress-fill { height: 100%; background: var(--n-blue); width: 0%; transition: width 2s linear; }

        /* 2. GAME UI */
        #game-layer { display: none; width: 100vw; height: 100vh; opacity: 0; transition: 1s; }
        #game-layer.visible { display: flex; opacity: 1; }
        #board-area { flex: 1; display: flex; justify-content: center; align-items: center; transition: 0.7s cubic-bezier(0.65, 0, 0.35, 1); position: relative; }

        .board { width: 560px; height: 560px; display: grid; grid-template: repeat(8, 1fr) / repeat(8, 1fr); border: 4px solid rgba(0, 242, 255, 0.2); background: rgba(10, 11, 16, 0.8); }
        .sq { width: 70px; height: 70px; display: flex; justify-content: center; align-items: center; position: relative; transition: 0.3s; }
        .w { background: rgba(255, 255, 255, 0.04); } .b { background: rgba(0, 0, 0, 0.3); }

        /* FOCUS & SUSPENSE EFFECTS */
        .board.focus .sq:not(.valid-move):not(.selected) { opacity: 0.2; filter: grayscale(1); }
        .sq.selected { box-shadow: inset 0 0 20px var(--n-blue); background: rgba(0, 242, 255, 0.1) !important; }
        .sq.valid-move::after { content: ''; width: 20px; height: 20px; background: var(--n-blue); border-radius: 50%; opacity: 0.6; box-shadow: 0 0 10px var(--n-blue); }
        
        /* DEATH TRAP (CHECKMATE) */
        .sq.death-zone { background: rgba(255, 71, 87, 0.2) !important; }
        .sq.death-zone::after { content: '☠'; font-size: 30px; color: var(--n-red); opacity: 0.8; text-shadow: 0 0 10px var(--n-red); }

        /* 3. PIECES (ELASTIC) */
        .piece { font-size: 55px; z-index: 10; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); cursor: pointer; }
        .piece:hover { transform: scale(1.2); }
        .white-p { color: #fff; filter: drop-shadow(0 0 8px #fff); }
        .black-p { color: #555; filter: drop-shadow(0 0 8px #000); }

        /* 4. SIDEBAR */
        #sidebar { width: 25vw; height: 100vh; background: rgba(10, 11, 16, 0.98); border-left: 2px solid var(--n-green); padding: 40px; display: flex; flex-direction: column; transition: 0.7s; }
        #sidebar.collapsed { transform: translateX(100%); margin-right: -25vw; }

        .btn-e { background: none; border: 2px solid var(--n-blue); color: var(--n-blue); font-weight: bold; padding: 15px; cursor: pointer; transition: 0.4s; border-radius: 5px; margin-bottom: 20px; }
        .btn-e:hover { transform: scale(1.05); border-color: var(--n-green); color: var(--n-green); }

        #particle-canvas { position: fixed; top: 0; left: 0; z-index: -1; pointer-events: none; }
    </style>
</head>
<body>
    <canvas id="particle-canvas"></canvas>

    <div id="boot-screen">
        <div id="boot-content" style="text-align:center;">
            <div style="letter-spacing: 5px; color: var(--n-blue);">INITIALIZING TACTICAL HUD...</div>
            <div class="progress-bar"><div id="bar" class="progress-fill"></div></div>
        </div>
        <div id="hud-container" style="display:none; text-align:center; padding:0 60px;">
            <h1 style="letter-spacing:5px;">Chess.Practice | Elo</h1>
            <p style="color:#bbb; max-width:600px;">Analytical development engine for strategic masters.</p>
            <button class="btn-e" onclick="handleLaunch()">START ENGINE</button>
        </div>
    </div>

    <div id="game-layer">
        <div id="board-area"><div class="board" id="chess-board"></div></div>
        <div id="sidebar">
            <h2 style="color:var(--n-green); border-bottom:1px solid var(--n-green); padding-bottom:10px;">SYSTEM</h2>
            <button class="btn-e" id="play-btn" onclick="togglePlay()">Play</button>
            <div style="font-size:12px; color:#666; margin-top:auto;">Hold <b>CTRL</b> on select for Focus Hud</div>
        </div>
    </div>

    <script>
        const game = new Chess();
        const pChars = { 'r':'♜','n':'♞','b':'♝','q':'♛','k':'♚','p':'♟','R':'♖','N':'♘','B':'♗','Q':'♕','K':'♔','P':'♙' };
        let sourceSq = null;
        let ctrlDown = false;

        window.onload = () => {
            const bar = document.getElementById('bar');
            bar.style.width = '100%';
            setTimeout(() => {
                document.getElementById('boot-screen').classList.add('loaded');
                document.getElementById('boot-content').style.display = 'none';
                document.getElementById('hud-container').style.display = 'flex';
                initParticles(); 
                renderBoard();
            }, 2200);
        };

        function handleLaunch() {
            document.getElementById('boot-screen').classList.add('panic');
            setTimeout(() => {
                document.getElementById('boot-screen').style.display = 'none';
                document.getElementById('game-layer').classList.add('visible');
            }, 600);
        }

        function togglePlay() {
            document.getElementById('play-btn').innerText = "Surrender";
            document.getElementById('play-btn').style.borderColor = "var(--n-red)";
            document.getElementById('play-btn').style.color = "var(--n-red)";
        }

        // HUD CONTROL LISTENERS
        window.addEventListener('keydown', e => { if(e.ctrlKey) { ctrlDown = true; updateFocus(); } });
        window.addEventListener('keyup', e => { if(!e.ctrlKey) { ctrlDown = false; updateFocus(); } });

        function updateFocus() {
            const board = document.getElementById('chess-board');
            if(ctrlDown && sourceSq) board.classList.add('focus');
            else board.classList.remove('focus');
        }

        function renderBoard() {
            const boardEl = document.getElementById('chess-board');
            boardEl.innerHTML = '';
            const history = game.history({verbose: true});
            const lastMove = history[history.length - 1];
            const inCheckmate = game.in_checkmate();

            game.board().forEach((row, rIdx) => {
                row.forEach((piece, cIdx) => {
                    const sqId = String.fromCharCode(97 + cIdx) + (8 - rIdx);
                    const sq = document.createElement('div');
                    sq.className = 'sq ' + ((rIdx + cIdx) % 2 === 0 ? 'w' : 'b');
                    sq.id = sqId;

                    // SUSPENSE: Checkmate highlight
                    if(inCheckmate) {
                        const moves = game.moves({square: sqId, verbose: true});
                        if(piece && piece.type === 'k' && piece.color === game.turn()) {
                            sq.classList.add('death-zone');
                        }
                    }

                    if (piece) {
                        const pEl = document.createElement('div');
                        pEl.className = `piece ${piece.color === 'w' ? 'white-p' : 'black-p'}`;
                        pEl.innerHTML = pChars[piece.color === 'w' ? piece.type.toUpperCase() : piece.type.toLowerCase()];
                        pEl.onclick = (e) => {
                            e.stopPropagation();
                            selectSquare(sqId);
                        };
                        sq.appendChild(pEl);
                    } else {
                        sq.onclick = () => selectSquare(sqId);
                    }
                    boardEl.appendChild(sq);
                });
            });
        }

        function selectSquare(sqId) {
            const validMoves = game.moves({ square: sourceSq, verbose: true }).map(m => m.to);
            
            if (sourceSq === sqId) {
                sourceSq = null;
            } else if (sourceSq && validMoves.includes(sqId)) {
                game.move({ from: sourceSq, to: sqId, promotion: 'q' });
                sourceSq = null;
            } else {
                const piece = game.get(sqId);
                if(piece && piece.color === game.turn()) sourceSq = sqId;
            }
            
            refreshVisuals();
        }

        function refreshVisuals() {
            renderBoard();
            const squares = document.querySelectorAll('.sq');
            const validMoves = sourceSq ? game.moves({ square: sourceSq, verbose: true }).map(m => m.to) : [];
            
            squares.forEach(s => {
                s.classList.remove('selected', 'valid-move');
                if(s.id === sourceSq) s.classList.add('selected');
                if(validMoves.includes(s.id)) s.classList.add('valid-move');
            });
            updateFocus();
        }

        function initParticles() {
            const canvas = document.getElementById('particle-canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            let parts = Array.from({length:100}, () => ({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, v: Math.random()*0.4+0.2 }));
            function loop() {
                ctx.clearRect(0,0,canvas.width, canvas.height);
                ctx.fillStyle = "rgba(255,255,255,0.4)";
                parts.forEach(p => { p.y += p.v; if(p.y > canvas.height) p.y = -5; ctx.beginPath(); ctx.arc(p.x, p.y, 1.5, 0, Math.PI*2); ctx.fill(); });
                requestAnimationFrame(loop);
            }
            loop();
        }

        document.addEventListener('keydown', e => { if (e.key === '=') window.location.href = "https://schools.compass.education"; });
    </script>
</body>
</html>
