<!DOCTYPE html>
<html lang="en-AU">
<head>
    <meta charset="UTF-8">
    <title>Equinox Games | Chess Practice</title>
    <style>
       /* 1. Define the colors first */
:root { 
    --n-blue: #00f2ff; --n-green: #39FF14; --n-red: #fa412d; 
    --n-orange: #f4943c; --n-yellow: #f1c40f; 
    --smooth: cubic-bezier(0.4, 0, 0.2, 1);
}

/* 2. Then define the particles OUTSIDE the :root */
.particle { position: absolute; pointer-events: none; border-radius: 50%; z-index: 1000; }
.death-particle { background: var(--n-red); box-shadow: 0 0 10px var(--n-red); }
.white-particle { background: #fff; box-shadow: 0 0 5px #fff; opacity: 0.4; pointer-events: none; }

/* 3. Then define the animation */
@keyframes bgFloat {
    0% { transform: translateY(110vh) scale(0); opacity: 0; }
    50% { opacity: 0.5; }
    100% { transform: translateY(-10vh) scale(1.2); opacity: 0; }
}

}

            --n-blue: #00f2ff; --n-green: #39FF14; --n-red: #fa412d; 
            --n-orange: #f4943c; --n-yellow: #f1c40f; 
            --smooth: cubic-bezier(0.4, 0, 0.2, 1);
        }
        body, html { margin: 0; padding: 0; background: #000; color: white; font-family: 'Segoe UI', Tahoma, sans-serif; overflow: hidden; height: 100vh; width: 100vw; }

        /* --- 1. BOOT --- */
        #boot { position: fixed; inset: 0; background: black; z-index: 100000; display: flex; justify-content: center; align-items: center; transition: 1s; pointer-events: none; }
        .equinox-text { font-size: 32px; letter-spacing: 12px; font-weight: 200; color: #fff; clip-path: inset(0 100% 0 0); animation: reveal 2s forwards; }
        @keyframes reveal { to { clip-path: inset(0 0 0 0); } }

        /* --- 2. SLIDING SETTINGS & 3-DOTS --- */
        #settings-panel {
            position: fixed; top: 0; right: -400px; width: 400px; height: 100vh;
            background: #050505; border-left: 2px solid var(--n-blue);
            z-index: 45000; transition: right 0.6s var(--smooth);
            display: flex; flex-direction: column; padding: 60px 30px; box-sizing: border-box;
        }
        #settings-panel.open { right: 0; }
        #gear-handle { position: absolute; left: -72px; top: 50%; transform: translateY(-50%); width: 70px; height: 70px; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 46000; background: #050505; border: 2px solid var(--n-blue); border-right: none; border-radius: 15px 0 0 15px; }
        #gear-icon { font-size: 45px; color: var(--n-blue); transition: transform 0.6s var(--smooth); }
        #settings-panel.open #gear-icon { transform: rotate(180deg); color: var(--n-green); }

        .btn-flex { display: flex; align-items: center; gap: 15px; margin-top: 25px; position: relative; }
        #play-btn { background: var(--n-green); color: #000; border: none; padding: 15px; font-weight: 900; cursor: pointer; border-radius: 10px; flex-grow: 1; text-transform: uppercase; transition: 0.3s; }
        #play-btn.ongoing { background: transparent; border: 2px solid var(--n-blue); color: var(--n-blue); box-shadow: 0 0 15px var(--n-blue); }
        .dots-v { cursor: pointer; font-size: 30px; color: #666; transition: 0.3s; }
        #dots-menu { display: none; position: absolute; background: #0a0a0a; border: 1px solid var(--n-green); width: 180px; right: 0; top: 60px; z-index: 100; border-radius: 12px; overflow: hidden; box-shadow: 0 10px 30px #000; }
        #dots-menu div { padding: 15px; cursor: pointer; font-size: 12px; text-align: left; color: #aaa; border-bottom: 1px solid #1a1a1a; }
        #dots-menu div:hover { background: #111; color: var(--n-green); }

        /* --- 3. BOARD & SMOOTH PIECES --- */
        #game { display: flex; width: 100vw; height: 100vh; justify-content: center; align-items: center; background: radial-gradient(circle, #0d0d0d 0%, #000 100%); }
        .board { width: 600px; height: 600px; display: grid; grid-template: repeat(8, 1fr) / repeat(8, 1fr); border: 4px solid #1a1a1a; background: #000; position: relative; }
        .sq { width: 75px; height: 75px; display: flex; justify-content: center; align-items: center; cursor: pointer; position: relative; }
        .w { background: #2a2a2e; } .b { background: #1a1a1c; }
        
        .piece { font-size: 50px; user-select: none; z-index: 10; pointer-events: none; transition: transform 0.5s var(--smooth), opacity 0.3s; position: absolute; width: 75px; height: 75px; display: flex; align-items: center; justify-content: center; }
        .white-p { color: #fff; text-shadow: 0 0 10px #fff; }
        .black-p { color: #666; text-shadow: 0 0 10px #000; }
        .selected { background: rgba(0, 242, 255, 0.2) !important; outline: 2px solid var(--n-blue); }

        /* --- 4. ENGINE ICONS & SHOCKWAVE --- */
        .engine-icon { position: absolute; top: -10px; right: -10px; font-size: 30px; z-index: 100; animation: iconPop 0.5s var(--smooth) forwards; pointer-events: none; }
        @keyframes iconPop { 0% { transform: scale(0) rotate(-45deg); opacity: 0; } 70% { transform: scale(1.4) rotate(10deg); } 100% { transform: scale(1) rotate(0deg); opacity: 1; } }
        .shockwave { position: absolute; border: 2px solid white; border-radius: 50%; pointer-events: none; z-index: 99; animation: wave 0.6s ease-out forwards; transform: translate(-50%, -50%); }
        @keyframes wave { 0% { width: 0; height: 0; opacity: 1; } 100% { width: 180px; height: 180px; opacity: 0; } }
        .p-white { position: absolute; width: 4px; height: 4px; background: white; pointer-events: none; z-index: 101; border-radius: 50%; }

        /* --- 5. HELP & EXPANSION --- */
        #help-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(15px); z-index: 55000; display: none; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.5s var(--smooth); }
        #help-overlay.active { opacity: 1; display: flex; }
        #help-container { width: 850px; height: 650px; background: #050505; border: 2px solid var(--n-green); border-radius: 20px; display: flex; flex-direction: column; overflow: hidden; transform: scale(0.9); transition: transform 0.5s var(--smooth); }
        #help-overlay.active #help-container { transform: scale(1); }
        .help-content { flex: 1; overflow-y: auto; padding: 30px; }
        .group-label { color: var(--n-blue); font-size: 11px; letter-spacing: 2px; text-transform: uppercase; margin: 30px 0 15px 0; border-bottom: 1px solid #222; display: block; padding-bottom: 5px; font-weight: bold; }
        .asset-card { border-left: 3px solid var(--n-blue); background: #0f0f0f; padding: 20px; margin-bottom: 15px; cursor: pointer; transition: 0.3s; border-radius: 0 10px 10px 0; }
        .asset-card:hover { transform: scale(1.02); background: #151515; box-shadow: 0 0 25px var(--n-blue); }
        .asset-card b { color: var(--n-yellow); display: block; margin-bottom: 8px; font-size: 16px; }

        #expansion-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(25px); z-index: 70000; display: none; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.4s var(--smooth); }
        #expansion-overlay.active { opacity: 1; display: flex; }
        #expansion-box { width: 85%; max-width: 950px; background: #050505; border: 3px solid var(--n-blue); border-radius: 30px; padding: 60px; position: relative; box-shadow: 0 0 80px var(--n-blue); transform: scale(0.8); transition: transform 0.4s var(--smooth); }
        .close-expanded { position: absolute; top: 25px; right: 25px; width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; border: 2px solid var(--n-red); color: var(--n-red); border-radius: 50%; font-size: 24px; cursor: pointer; transition: 0.3s; background: none; }
        .close-expanded:hover { background: var(--n-red); color: white; }

        #turn-info { position: fixed; top: 40px; left: 50%; transform: translateX(-50%); letter-spacing: 5px; color: var(--n-blue); font-weight: bold; border: 2px solid var(--n-blue); padding: 10px 35px; border-radius: 30px; z-index: 100; }
    </style>
</head>
<body>

    <div id="boot"><div class="equinox-text">Eqinox Games</div></div>
    <div id="turn-info">WHITE'S TURN</div>

    <div id="settings-panel">
        <div id="gear-handle" onclick="toggleSettings()">
            <span id="gear-icon">⚙</span>
        </div>
        <h2 style="color: var(--n-blue); margin-top: 0; letter-spacing: 5px; text-align:center;">SETTINGS</h2>
        <div class="btn-flex">
            <button id="play-btn">PLAY</button>
            <div class="dots-v" onclick="toggleDots(event)">⋮</div>
            <div id="dots-menu">
                <div onclick="location.reload()">Reboot System</div>
                <div onclick="resetBoard()">Reset Practice</div>
                <div onclick="openHelp()">Archived Help</div>
            </div>
        </div>
        
        <div style="margin-top: 30px; border: 1px solid #222; padding: 20px; border-radius: 10px;">
            <label style="font-size: 10px; color: var(--n-blue); letter-spacing: 2px;">OPPONENT TYPE</label>
            <select id="ai-toggle" onchange="isAIActive = this.value === 'ai'" style="background:#111; color:var(--n-blue); width:100%; margin-top:10px; border:1px solid var(--n-blue); padding:10px;">
                <option value="manual">MANUAL PRACTICE</option>
                <option value="ai">EQUINOX AI</option>
            </select>
        </div>
    </div>

    <div id="help-overlay">
        <div id="help-container">
            <div style="display:flex; justify-content:space-between; padding:25px; border-bottom:1px solid #222; background:#000;">
                <div id="tabs">
                    <button class="tab-btn active" onclick="showTab('pieces', this)" style="border:1px solid #333; color:white; padding:10px; cursor:pointer; background:none; font-weight:bold;">Pieces</button>
                    <button class="tab-btn" onclick="showTab('icons', this)" style="border:1px solid #333; color:white; padding:10px; cursor:pointer; background:none; margin-left:10px; font-weight:bold;">Icons</button>
                    <button class="tab-btn" onclick="showTab('mechanics', this)" style="border:1px solid #333; color:white; padding:10px; cursor:pointer; background:none; margin-left:10px; font-weight:bold;">Mechanics</button>
                </div>
                <button onclick="closeHelp()" style="background:none; border:none; color:var(--n-red); cursor:pointer; font-size:24px;">✕</button>
            </div>
            <div id="help-text" class="help-content"></div>
        </div>
    </div>

    <div id="expansion-overlay">
        <div id="expansion-box">
            <button class="close-expanded" onclick="closeExpansion()">✕</button>
            <div id="expansion-text" style="font-size: 22px; line-height: 1.8; color: #eee;"></div>
        </div>
    </div>

    <div id="game"><div class="board" id="board"></div></div>

<script>
    const settingsPanel = document.getElementById('settings-panel'), dotsMenu = document.getElementById('dots-menu'), helpOverlay = document.getElementById('help-overlay'), expansionOverlay = document.getElementById('expansion-overlay'), expansionText = document.getElementById('expansion-text'), boardEl = document.getElementById('board');
    let boardState = Array(64).fill(null), currentTurn = 'W', selectedSq = null, ctrlToggle = false, isAIActive = false;

    const helpData = {
        pieces: `<div class="asset-card" onclick="expandDef(this)"><b>The Pawn</b> The fundamental infantry unit of chess. It possesses a restricted forward movement of one square, yet captures diagonally. Upon its initial move, it may advance two squares. Reaching the terminal rank allows for promotion into a Queen, Rook, Bishop, or Knight, granting the piece immense late-game utility.</div><div class="asset-card" onclick="expandDef(this)"><b>The Knight</b> A specialized tactical unit that navigates the board in a unique 'L' pattern—two squares in one cardinal direction followed by one square perpendicular. It maintains the singular ability to leap over intervening pieces, making it an invaluable asset in congested board states where other pieces are obstructed.</div><div class="asset-card" onclick="expandDef(this)"><b>The Bishop</b> A sophisticated long-range operative that slides any distance along diagonal trajectories. Each Bishop is permanently confined to the square colour it begins on, requiring them to work in coordinated pairs to control both light and dark regions of the board effectively throughout the middle and end game.</div><div class="asset-card" onclick="expandDef(this)"><b>The Rook</b> A formidable heavy piece moving in straight horizontal or vertical lines across any number of unoccupied squares. It plays a critical role in king safety through the castling maneuver and is often the primary force behind powerful ladder checkmates during the final stages of the match.</div><div class="asset-card" onclick="expandDef(this)"><b>The Queen</b> The most versatile and powerful asset on the board. She combines the movement capabilities of both the Rook and the Bishop, sliding any distance in any straight or diagonal direction. Her presence dictates the tempo and pressure of the match, serving as both a primary attacker and a central defender.</div><div class="asset-card" onclick="expandDef(this)"><b>The King</b> The pivotal figure around which the entire game revolves. While moving only one square in any direction, his preservation is absolute. If the King is placed under attack and cannot find a safe square, the match concludes immediately, rendering his protection the player's ultimate strategic priority.</div>`,
        icons: `<span class="group-label">Positive Indicators</span><div class="asset-card" onclick="expandDef(this)"><b>The Best Move (Star)</b> This designation signifies the absolute strongest continuation identified by the engine analysis. Playing this move optimizes your winning probability and represents the highest level of technical accuracy possible in the current position, often finding the only path to a victory.</div><div class="asset-card" onclick="expandDef(this)"><b>Good Move (Tick)</b> Indicates a solid, fundamentally sound choice that maintains the current evaluation of the position. While it may not be the engine's primary preference, it adheres to sound chess principles and ensures the player does not concede any unnecessary tactical advantages.</div><span class="group-label">Negative Indicators</span><div class="asset-card" onclick="expandDef(this)"><b>Inaccuracy (Exclamation)</b> Marks a sub-optimal move that noticeably weakens your standing. It suggests a missed opportunity to apply pressure or a minor positional concession that allows the opponent to improve their pieces more easily than the optimal continuation would have permitted.</div><div class="asset-card" onclick="expandDef(this)"><b>Blunder (Death Emoji)</b> A catastrophic error that tangibly reduces your advantage or directly allows the opponent to achieve a winning position. This usually results from an overlooked tactical sequence or a serious misunderstanding of the immediate requirements of the board position.</div><div class="asset-card" onclick="expandDef(this)"><b>Fatal Blunder (Death)</b> Reserved for moves that lead to an immediate loss of the game or the loss of a major piece without compensation. This classification represents a total collapse of strategy and typically shifts the game evaluation into a forced win for the opponent.</div><span class="group-label">Exotic Classifications</span><div class="asset-card" onclick="expandDef(this)"><b>Mystery Move (Question)</b> Used to denote moves that complicate the position in ways the engine cannot immediately resolve. It signifies a high-variance choice that creates a chaotic environment where both players have equal chances to succeed or fail based on subsequent precision.</div><div class="asset-card" onclick="expandDef(this)"><b>The Brilliant Move (Double Question)</b> Although visually appearing similar to a blunder, this highlights a high-level sacrifice that appears as an error but leads to a forced winning advantage. It signifies a move that is difficult for humans to calculate but mathematically sound under deep analysis.</div><div class="asset-card" onclick="expandDef(this)"><b>The Book Move (Manual)</b> Indicates that the move belongs to the established library of opening theory. This confirms the player is following paths analyzed by grandmasters for centuries to reach a balanced and playable middle-game position with known strategic goals.</div>`,
        mechanics: `<span class="group-label">Core Mechanics</span><div class="asset-card" onclick="expandDef(this)"><b>Capturing Methodology</b> To capture an opponent's unit, you must move your piece onto the square it currently occupies. The displaced piece is permanently removed from the field. You cannot capture your own units or occupy a square already held by your own color, requiring careful navigation of space.</div><div class="asset-card" onclick="expandDef(this)"><b>En Passant</b> A specialized pawn capture occurring when an opponent moves their pawn two squares forward from its starting position and lands adjacent to your pawn. You may capture that pawn as if it had only moved one square, provided you do so on the very next turn.</div><span class="group-label">Ending Conditions</span><div class="asset-card" onclick="expandDef(this)"><b>Checkmate (Absolute Victory)</b> The definitive conclusion of a chess match. This occurs when a King is under direct threat of capture and possesses no legal moves to relocate, block the line of attack, or eliminate the attacking piece entirely. The game ends immediately in a win for the attacker.</div><div class="asset-card" onclick="expandDef(this)"><b>Stalemate (Technical Draw)</b> A unique situation where the player whose turn it is has no legal moves remaining, yet their King is not currently in check. Because the player cannot move but is not defeated, the game ends in a draw, often occurring as a defensive 'swindle'.</div><div class="asset-card" onclick="expandDef(this)"><b>Resignation (Concession)</b> A formal acknowledgement of defeat. A player may choose to resign at any moment if they determine the position is strategically hopeless. This is considered professional courtesy when a loss is mathematically certain, immediately awarding the full victory to the opponent.</div><div class="asset-card" onclick="expandDef(this)"><b>Timeout (Temporal Loss)</b> In timed competitive play, if a player's clock expires before they complete their required moves, they lose the game immediately. This emphasizes the importance of time management as a critical strategic resource, where speed is as vital as tactical precision.</div>`
    };

    function toggleSettings() { settingsPanel.classList.toggle('open'); dotsMenu.style.display = 'none'; }
    function toggleDots(e) { e.stopPropagation(); dotsMenu.style.display = dotsMenu.style.display === 'block' ? 'none' : 'block'; }
    function openHelp() { helpOverlay.style.display = 'flex'; setTimeout(() => helpOverlay.classList.add('active'), 10); showTab('pieces', document.querySelector('.tab-btn')); }
    function closeHelp() { helpOverlay.classList.remove('active'); setTimeout(() => helpOverlay.style.display = 'none', 500); }
    function showTab(t, b) { document.querySelectorAll('.tab-btn').forEach(x => x.style.borderColor = '#333'); b.style.borderColor = 'var(--n-green)'; document.getElementById('help-text').innerHTML = helpData[t]; }
    function expandDef(card) { expansionText.innerHTML = card.innerHTML; expansionOverlay.style.display = 'flex'; setTimeout(() => expansionOverlay.classList.add('active'), 10); }
    function closeExpansion() { expansionOverlay.classList.remove('active'); setTimeout(() => expansionOverlay.style.display = 'none', 400); }

    function spawnVFX(idx, iconType) {
        const sq = document.querySelector(`[data-idx="${idx}"]`);
        const rect = sq.getBoundingClientRect();
        const wave = document.createElement('div');
        wave.className = 'shockwave'; wave.style.left = `${rect.left + 37}px`; wave.style.top = `${rect.top + 37}px`;
        document.body.appendChild(wave); setTimeout(() => wave.remove(), 600);
        for(let i=0; i<12; i++) {
            const p = document.createElement('div'); p.className = 'p-white';
            p.style.left = `${rect.left + 37}px`; p.style.top = `${rect.top + 37}px`;
            document.body.appendChild(p);
            const angle = Math.random() * Math.PI * 2, vel = 3 + Math.random() * 5;
            let x=0, y=0, op=1;
            const anim = setInterval(() => {
                x += Math.cos(angle)*vel; y += Math.sin(angle)*vel; op -= 0.05;
                p.style.transform = `translate(${x}px, ${y}px)`; p.style.opacity = op;
                if(op <= 0) { clearInterval(anim); p.remove(); }
            }, 16);
        }
        const icoMap = { star: '⭐', tick: '✔️', blunder: '!!', fatal: '💀' };
        const icon = document.createElement('div'); icon.className = 'engine-icon';
        icon.innerText = icoMap[iconType]; sq.appendChild(icon);
    }

    function initBoard() {
        const map = "rnbqkbnrpppppppp................................PPPPPPPPRNBQKBNR";
        for(let i=0; i<64; i++) boardState[i] = map[i] === '.' ? null : map[i];
        renderBoard(true);
    }

    function renderBoard(full) {
        if(full) boardEl.innerHTML = '';
        for (let i = 0; i < 64; i++) {
            let sq = document.querySelector(`[data-idx="${i}"]`);
            if(!sq) {
                sq = document.createElement('div');
                sq.className = `sq ${(Math.floor(i/8) + i%8) % 2 === 0 ? 'w' : 'b'}`;
                sq.dataset.idx = i;
                sq.onclick = () => handleSquare(i);
                boardEl.appendChild(sq);
            }
            const existingPiece = sq.querySelector('.piece');
            if(boardState[i]) {
                if(!existingPiece) {
                    const p = document.createElement('div');
                    p.className = `piece ${boardState[i] === boardState[i].toUpperCase() ? 'white-p' : 'black-p'}`;
                    p.id = `p-${i}`;
                    p.innerHTML = glyphs[boardState[i].toLowerCase()];
                    sq.appendChild(p);
                }
            } else if(existingPiece) existingPiece.remove();
        }
        document.getElementById('turn-info').innerText = currentTurn === 'W' ? "WHITE'S TURN" : "BLACK'S TURN";
    }

    function movePieceSmooth(f, t) {
        const p = document.querySelector(`[data-idx="${f}"] .piece`);
        const targetSq = document.querySelector(`[data-idx="${t}"]`);
        const targetRect = targetSq.getBoundingClientRect();
        const startRect = p.parentElement.getBoundingClientRect();
        const dx = targetRect.left - startRect.left;
        const dy = targetRect.top - startRect.top;
        p.style.transform = `translate(${dx}px, ${dy}px)`;
        setTimeout(() => {
            p.style.transform = '';
            boardState[t] = boardState[f];
            boardState[f] = null;
            renderBoard(false);
            spawnVFX(t, boardState[t] ? 'star' : 'tick');
        }, 500);
    }

    function handleSquare(i) {
        const p = boardState[i], isW = p ? p === p.toUpperCase() : null;
        if (selectedSq === null) {
            if (p && ((currentTurn === 'W' && isW) || (currentTurn === 'B' && !isW))) {
                selectedSq = i;
                document.querySelectorAll('.sq').forEach(s => s.classList.remove('selected'));
                document.querySelector(`[data-idx="${i}"]`).classList.add('selected');
                if(ctrlToggle) showTargets(i);
            }
        } else {
            if (isValid(selectedSq, i)) {
                movePieceSmooth(selectedSq, i);
                currentTurn = currentTurn === 'W' ? 'B' : 'W';
                document.getElementById('play-btn').classList.add('ongoing');
                document.getElementById('play-btn').innerText = "Game Ongoing";
            }
            selectedSq = null;
            document.querySelectorAll('.sq').forEach(s => s.classList.remove('selected'));
        }
    }

    function showTargets(idx) {
        document.querySelectorAll('.ctrl-dot').forEach(el => el.classList.remove('ctrl-dot'));
        for (let i = 0; i < 64; i++) if (isValid(idx, i)) document.querySelector(`[data-idx="${i}"]`)?.classList.add('ctrl-dot');
    }

    document.addEventListener('keydown', (e) => { if (e.key === 'Control') { ctrlToggle = !ctrlToggle; if(!ctrlToggle) document.querySelectorAll('.ctrl-dot').forEach(d => d.classList.remove('ctrl-dot')); else if(selectedSq !== null) showTargets(selectedSq); } });

    // (Add shared isValid/isPathClear functions here as in previous versions)
    function isPathClear(f, t) { const r1 = Math.floor(f/8), c1 = f%8, r2 = Math.floor(t/8), c2 = t%8, dr = Math.sign(r2-r1), dc = Math.sign(c2-c1); let cr = r1 + dr, cc = c1 + dc; while (cr !== r2 || cc !== c2) { if (boardState[cr * 8 + cc]) return false; cr += dr; cc += dc; } return true; }
    function isValid(f, t) { if (f === t) return false; const p = boardState[f], tar = boardState[t]; if (tar && (p === p.toUpperCase()) === (tar === tar.toUpperCase())) return false; const r1 = Math.floor(f/8), c1 = f%8, r2 = Math.floor(t/8), c2 = t%8, dr = Math.abs(r2-r1), dc = Math.abs(c2-c1), type = p.toLowerCase(); switch (type) { case 'p': const d = p === 'P' ? -1 : 1; return dc === 0 && r2-r1 === d && !tar || dc === 0 && r2-r1 === 2*d && r1 === (p === 'P' ? 6 : 1) && !tar && isPathClear(f, t) || dc === 1 && r2-r1 === d && tar; case 'r': return (r1 === r2 || c1 === c2) && isPathClear(f, t); case 'n': return dr*dc === 2; case 'b': return dr === dc && isPathClear(f, t); case 'q': return (r1 === r2 || c1 === c2 || dr === dc) && isPathClear(f, t); case 'k': return dr <= 1 && dc <= 1; } return false; }

    const glyphs = { 'r':'♜','n':'♞','b':'♝','q':'♛','k':'♚','p':'♟','R':'♖','N':'♘','B':'♗','Q':'♕','K':'♔','P':'♙' };
    setTimeout(() => { document.getElementById('boot').style.display='none'; }, 3000);
    initBoard();
</script>
  </body>
</html>
