<!DOCTYPE html>
<html lang="en-AU">
<head>
    <meta charset="UTF-8">
    <title>Equinox Games</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body, html { height: 100vh; width: 100vw; background: #000; overflow: hidden; }

        #chess-cloak, #games-embed {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            border: none;
        }
        #games-embed { display: none; z-index: 20; }

        #auth-overlay {
            position: fixed;
            bottom: -100%;
            left: 50%;
            transform: translateX(-50%);
            width: 520px;
            background: rgba(8, 8, 28, 0.98);
            border: 3px solid #00d4cc;
            border-radius: 28px;
            box-shadow: 0 0 60px #00d4cc, 0 0 130px rgba(0, 212, 204, 0.6);
            padding: 40px 35px;
            text-align: center;
            z-index: 99999;
            transition: all 0.8s cubic-bezier(0.23, 1, 0.32, 1);
            display: none;
        }
        #auth-overlay.show {
            bottom: 50%;
            transform: translate(-50%, 50%);
            display: block;
        }

        .neon-title {
            color: #00d4cc;
            text-shadow: 0 0 15px #00d4cc, 0 0 30px #00d4cc;
            font-size: 1.35rem;
            font-weight: bold;
            letter-spacing: 4px;
            margin-bottom: 25px;
        }

        #password-input {
            width: 100%;
            padding: 20px 24px;
            font-size: 1.3rem;
            background: #0a0a1f;
            border: 3px solid #00d4cc;
            border-radius: 16px;
            color: white;
            outline: none;
            box-shadow: 0 0 25px rgba(0, 212, 204, 0.6), inset 0 0 15px rgba(0, 212, 204, 0.3);
        }
        #password-input:focus {
            box-shadow: 0 0 35px rgba(0, 212, 204, 0.9), inset 0 0 20px rgba(0, 212, 204, 0.5);
        }
        #password-input.error {
            border-color: #ff3366;
            box-shadow: 0 0 30px #ff3366, inset 0 0 15px rgba(255, 51, 102, 0.4);
        }
        #status { margin-top: 20px; min-height: 32px; font-size: 1.05rem; }
    </style>
</head>
<body>

    <iframe id="chess-cloak" src="https://tribui5467-hub.github.io/Chess_Practice-Elo/" allowfullscreen></iframe>
    <iframe id="games-embed" src="https://tribui5467-hub.github.io/Chess.Practice-Elo/" allowfullscreen></iframe>

    <div id="auth-overlay">
        <div class="neon-title">STATE AUTHENTICATION KEY</div>
        <input type="password" id="password-input" placeholder="Enter key..." autocomplete="off">
        <div id="status"></div>
    </div>

    <div id="blocked-screen" style="display:none;position:fixed;inset:0;background:#110000;flex-direction:column;align-items:center;justify-content:center;z-index:100000;color:#ff3366;">
        <div class="blocked-title">ACCESS BLOCKED</div>
        <p style="font-size:1.6rem;margin:20px 0;">You have been permanently restricted.</p>
    </div>

<script>
    let keySequence = [];
    let lastKeyTime = 0;
    const SEQUENCE_TIMEOUT = 2000;
    let attempts = 3;
    let isBlocked = false;

    // Passwords hardcoded here
    const dailyPasswords = {
        monday: "kP7$mQ2!xN",
        tuesday: "vR4#mT9!zX",
        wednesday: "bJ5&wK2$qP",
        thursday: "tN8#fG3$mK",
        friday: "cX4!mY9#vR",
        saturday: "hK2$wQ7!zN",
        sunday: "jL8#fP3$vB"
    };

    function getDailyPassword() {
        const days = ['sunday','monday','tuesday','wednesday','thursday','friday','saturday'];
        const today = days[new Date().getDay()];
        return dailyPasswords[today] || "";
    }

    function checkBlocked() {
        if (localStorage.getItem('equinoxBlocked') === 'true') {
            isBlocked = true;
            document.getElementById('blocked-screen').style.display = 'flex';
        }
    }

    function showAuthBox() {
        const overlay = document.getElementById('auth-overlay');
        overlay.style.display = 'block';
        setTimeout(() => overlay.classList.add('show'), 10);
        document.getElementById('password-input').focus();
    }

    function hideAuthBox() {
        const overlay = document.getElementById('auth-overlay');
        overlay.classList.remove('show');
        setTimeout(() => {
            overlay.style.display = 'none';
        }, 800);
    }

    function handleFailedAttempt() {
        attempts--;
        const input = document.getElementById('password-input');
        const status = document.getElementById('status');
        input.classList.add('error');

        if (attempts > 0) {
            status.innerHTML = `<span style="color:#ff3366;">Incorrect. ${attempts} attempt${attempts > 1 ? 's' : ''} remaining.</span>`;
        } else {
            status.innerHTML = `<span style="color:#ff3366;">All attempts exhausted.</span>`;
            setTimeout(() => {
                isBlocked = true;
                localStorage.setItem('equinoxBlocked', 'true');
                document.getElementById('blocked-screen').style.display = 'flex';
                hideAuthBox();
            }, 1400);
        }
        setTimeout(() => input.classList.remove('error'), 800);
    }

    function checkPassword() {
        const entered = document.getElementById('password-input').value.trim();
        const correct = getDailyPassword();

        if (entered === correct && correct !== "") {
            const overlay = document.getElementById('auth-overlay');
            overlay.style.bottom = '-100%';
            setTimeout(() => {
                overlay.style.display = 'none';
                document.getElementById('chess-cloak').style.display = 'none';
                document.getElementById('games-embed').style.display = 'block';
            }, 700);
        } else {
            handleFailedAttempt();
        }
    }

    // Secret code: 4367
    document.addEventListener('keydown', (e) => {
        if (isBlocked) return;
        const now = Date.now();
        if (now - lastKeyTime > SEQUENCE_TIMEOUT) keySequence = [];
        lastKeyTime = now;

        keySequence.push(e.key);
        if (keySequence.length > 4) keySequence.shift();

        if (keySequence.length === 4 &&
            keySequence[0] === '4' &&
            keySequence[1] === '3' &&
            keySequence[2] === '6' &&
            keySequence[3] === '7') {
            
            showAuthBox();
            keySequence = [];
        }
    });

    // Click outside to close
    document.addEventListener('click', (e) => {
        const overlay = document.getElementById('auth-overlay');
        if (overlay.style.display === 'block' && !overlay.contains(e.target)) {
            hideAuthBox();
        }
    });

    document.getElementById('password-input').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') checkPassword();
    });

    window.onload = () => {
        checkBlocked();
    };
</script>
</body>
</html>
