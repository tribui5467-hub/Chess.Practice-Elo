<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tactical Analysis Engine | System Boot</title>
    <style>
        body { margin: 0; background: #0a0b10; overflow: hidden; font-family: 'Segoe UI', sans-serif; color: white; user-select: none; }
        
        /* 1. NEON HUD BOOT SCREEN */
        #boot-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #0a0b10; z-index: 1000; display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            transition: all 0.8s cubic-bezier(0.19, 1, 0.22, 1);
        }
        
        /* The Edged Box Effect */
        #boot-screen.loaded { 
            transform: scale(0.65); 
            border: 2px solid #00f2ff;
            border-radius: 5px;
            box-shadow: 0 0 20px #00f2ff, inset 0 0 15px rgba(0, 242, 255, 0.2);
            background: rgba(10, 11, 16, 0.95);
        }

        /* Panic Transition (Down Baseline) */
        #boot-screen.panic { 
            transform: scaleX(1) scaleY(0) translateY(500px); 
            opacity: 0; 
        }

        .load-text { letter-spacing: 5px; color: #00f2ff; margin-bottom: 20px; text-shadow: 0 0 10px #00f2ff; }
        .progress-bar { width: 250px; height: 2px; background: rgba(0, 242, 255, 0.1); position: relative; }
        .progress-fill { position: absolute; height: 100%; background: #00f2ff; width: 0%; box-shadow: 0 0 15px #00f2ff; transition: width 2s linear; }

        .panic-x { position: absolute; top: 20px; right: 25px; font-size: 22px; color: #00f2ff; cursor: pointer; opacity: 0; transition: opacity 0.5s; z-index: 1100; }

        /* 2. NEON CHESS INTERFACE */
        #game-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.6s; visibility: hidden; }
        #game-layer.visible { opacity: 1; visibility: visible; }

        .board { width: 480px; height: 480px; display: grid; grid-template: repeat(8, 1fr) / repeat(8, 1fr); border: 4px solid #1e2530; box-shadow: 0 0 40px rgba(0, 242, 255, 0.1); }
        .sq { width: 60px; height: 60px; display: flex; justify-content: center; align-items: center; position: relative; }
        .w { background: #16212e; } .b { background: #0d1117; }
        
        /* Neon Move Highlight */
        .sq.highlight { box-shadow: inset 0 0 15px #00f2ff; border: 1px solid #00f2ff; }

        .piece { font-size: 45px; color: white; cursor: grab; z-index: 10; transition: transform 0.2s; }
        .piece:active { cursor: grabbing; transform: scale(1.1); filter: drop-shadow(0 0 10px #00f2ff); }

        .description { max-width: 800px; text-align: center; color: #aaa; line-height: 1.6; margin-bottom: 20px; }
        #particle-canvas { position: absolute; top: 0; left: 0; z-index: -1; }
    </style>
</head>
<body>

    <div id="boot-screen">
        <div id="x-btn" class="panic-x" onclick="triggerPanic()">✕</div>
        <div id="load-content">
            <h1 id="title" style="margin:0; opacity:0; transition: 0.5s;">Chess.Practice-Elo</h1>
            <div id="bar-container">
                <div class="load-text">SYSTEM BOOTING...</div>
                <div class="progress-bar"><div id="bar" class="progress-fill"></div></div>
            </div>
            <p id="desc" class="description" style="opacity:0; transition: 0.5s; margin-top:20px;">
                Regular chess practice boosts your Elo rating by improving strategic understanding and mental agility.
            </p>
        </div>
    </div>

    <canvas id="particle-canvas"></canvas>

    <div id="game-layer">
        <div class="board" id="chess-board"></div>
    </div>

    <script>
        // --- 1. BOOT SEQUENCE ---
        window.onload = () => {
            const bar = document.getElementById('bar');
            setTimeout(() => { bar.style.width = '100%'; }, 200);
            
            setTimeout(() => {
                document.getElementById('boot-screen').classList.add('loaded');
                document.getElementById('bar-container').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('title').style.opacity = '1';
                    document.getElementById('desc').style.opacity = '1';
                    document.getElementById('x-btn').style.opacity = '1';
                }, 600);
            }, 2300);
        };

        // --- 2. PANIC SHUTDOWN ---
        function triggerPanic() {
            const boot = document.getElementById('boot-screen');
            boot.classList.add('panic'); // Transitions out to baseline
            setTimeout(() => {
                window.location.href = "https://schools.compass.education";
            }, 800);
        }

        // --- 3. PIECE MOVEMENT & NEON HIGHLIGHTS ---
        const board = document.getElementById('chess-board');
        const pChars = { 'r': '♜', 'n': '♞', 'b': '♝', 'q': '♛', 'k': '♚', 'p': '♟', 'R': '♖', 'N': '♘', 'B': '♗', 'Q': '♕', 'K': '♔', 'P': '♙' };
        const setup = ['r','n','b','q','k','b','n','r','p','p','p','p','p','p','p','p','','','','','','','','','','','','','','','','','','','','','','','','','','','','','','','','','P','P','P','P','P','P','P','P','R','N','B','Q','K','B','N','R'];

        let draggedPiece = null;

        setup.forEach((p, i) => {
            const sq = document.createElement('div');
            sq.className = 'sq ' + ((Math.floor(i / 8) + i) % 2 === 0 ? 'w' : 'b');
            
            if (p) {
                const piece = document.createElement('div');
                piece.className = 'piece';
                piece.innerHTML = pChars[p];
                piece.draggable = true;
                piece.addEventListener('dragstart', () => { 
                    draggedPiece = piece;
                    // Add neon highlight effect
                    document.querySelectorAll('.sq').forEach(s => s.classList.add('highlight'));
                });
                piece.addEventListener('dragend', () => {
                    document.querySelectorAll('.sq').forEach(s => s.classList.remove('highlight'));
                });
                sq.appendChild(piece);
            }

            sq.addEventListener('dragover', (e) => e.preventDefault());
            sq.addEventListener('drop', () => {
                if (draggedPiece) {
                    const existing = sq.querySelector('.piece');
                    if (existing) sq.removeChild(existing);
                    sq.appendChild(draggedPiece);
                    draggedPiece = null;
                }
            });
            board.appendChild(sq);
        });

        // --- 4. PARTICLES ---
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.onresize = resize; resize();
        class Particle {
            constructor() { this.x = Math.random() * canvas.width; this.y = Math.random() * canvas.height; this.size = Math.random() * 1.5; this.speed = Math.random() * 0.4 + 0.1; }
            update() { this.y += this.speed; if (this.y > canvas.height) this.y = -5; }
            draw() { ctx.fillStyle = 'rgba(0, 242, 255, 0.3)'; ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill(); }
        }
        for(let i=0; i<100; i++) particles.push(new Particle());
        function animate() { ctx.clearRect(0,0,canvas.width, canvas.height); particles.forEach(p => { p.update(); p.draw(); }); requestAnimationFrame(animate); }
        animate();

        // Keyboard Panic
        document.addEventListener('keydown', (e) => { if (e.key === '=') triggerPanic(); });
    </script>
</body>
</html>
