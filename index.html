<!DOCTYPE html>
<html lang="en-AU">
<head>
    <meta charset="UTF-8">
    <title>Tactical Analysis Engine | System Boot</title>
    <script src="https://cdnjs.cloudflare.com"></script>
    <style>
        body { margin: 0; background: #0a0b10; overflow: hidden; font-family: 'Segoe UI', sans-serif; color: white; user-select: none; display: flex; justify-content: center; align-items: center; height: 100vh; }
        
        /* 1. NEON HUD BOX */
        #boot-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #0a0b10; z-index: 2000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: all 0.8s cubic-bezier(0.19, 1, 0.22, 1);
        }
        
        /* The Edged Box Effect */
        #boot-screen.loaded { 
            transform: scale(0.75); 
            border: 2px solid #00f2ff;
            border-radius: 15px;
            box-shadow: 0 0 35px rgba(0, 242, 255, 0.3), inset 0 0 20px rgba(0, 242, 255, 0.1);
            background: rgba(10, 11, 16, 0.98);
        }

        /* Panic Shutdown (Shrink to Baseline) */
        #boot-screen.panic { transform: scale(0.75, 0) translateY(1200px); opacity: 0; }

        .load-text { letter-spacing: 5px; color: #00f2ff; margin-bottom: 20px; text-shadow: 0 0 10px #00f2ff; font-size: 14px; }
        .progress-bar { width: 250px; height: 2px; background: rgba(0, 242, 255, 0.1); position: relative; }
        .progress-fill { position: absolute; height: 100%; background: #00f2ff; width: 0%; box-shadow: 0 0 15px #00f2ff; transition: width 2s linear; }

        .panic-x { position: absolute; top: 25px; right: 30px; font-size: 24px; color: #00f2ff; cursor: pointer; opacity: 0; transition: opacity 0.5s; z-index: 2100; padding: 10px; }

        /* 2. INTERNAL CONTENT (Title, Desc, Board) */
        #content-container { display: none; flex-direction: column; align-items: center; text-align: center; padding: 0 40px; width: 100%; }
        
        h1 { font-size: 2rem; margin: 10px 0; color: #fff; letter-spacing: 3px; }
        .description { font-size: 0.9rem; line-height: 1.5; color: #bbb; max-width: 750px; margin-bottom: 15px; }

        .board { width: 400px; height: 400px; display: grid; grid-template: repeat(8, 1fr) / repeat(8, 1fr); border: 5px solid #1e2530; }
        .sq { width: 50px; height: 50px; display: flex; justify-content: center; align-items: center; position: relative; }
        .w { background: #16212e; } .b { background: #0d1117; }
        
        .sq.highlight { box-shadow: inset 0 0 12px #00f2ff; }
        .piece { font-size: 38px; color: white; cursor: grab; z-index: 10; }

        #particle-canvas { position: absolute; top: 0; left: 0; z-index: -1; }
    </style>
</head>
<body>

    <div id="boot-screen">
        <div id="x-btn" class="panic-x" onclick="triggerPanic()">тЬХ</div>
        
        <!-- INITIAL LOADING -->
        <div id="boot-content">
            <div class="load-text">SYSTEM CALIBRATION...</div>
            <div class="progress-bar"><div id="bar" class="progress-fill"></div></div>
        </div>

        <!-- FULL INTERFACE (Fills the box) -->
        <div id="content-container">
            <h1>Chess.Practice-Elo</h1>
            <p class="description">Regular chess practice boosts your <strong>Elo rating</strong> by improving strategic understanding and tactical abilities. Consistency is key to mastering the art of chess.</p>
            <div class="board" id="chess-board"></div>
        </div>
    </div>

    <canvas id="particle-canvas"></canvas>

    <script>
        // --- 1. BOOT SEQUENCE ---
        window.onload = () => {
            const bar = document.getElementById('bar');
            setTimeout(() => { bar.style.width = '100%'; }, 200);
            
            setTimeout(() => {
                document.getElementById('boot-screen').classList.add('loaded');
                document.getElementById('boot-content').style.display = 'none';
                document.getElementById('content-container').style.display = 'flex';
                document.getElementById('x-btn').style.opacity = '1';
                createBoard(); // Draw the board inside the box
            }, 2300);
        };

        function triggerPanic() {
            const boot = document.getElementById('boot-screen');
            boot.classList.add('panic');
            setTimeout(() => { window.location.href = "https://schools.compass.education"; }, 650);
        }

        // --- 2. CHESS LOGIC ---
        const game = new Chess();
        const pChars = { 'r': 'тЩЬ', 'n': 'тЩЮ', 'b': 'тЩЭ', 'q': 'тЩЫ', 'k': 'тЩЪ', 'p': 'тЩЯ', 'R': 'тЩЦ', 'N': 'тЩШ', 'B': 'тЩЧ', 'Q': 'тЩХ', 'K': 'тЩФ', 'P': 'тЩЩ' };
        let sourceSq = null;

        function createBoard() {
            const boardEl = document.getElementById('chess-board');
            boardEl.innerHTML = '';
            const position = game.board();
            
            position.forEach((row, rowIndex) => {
                row.forEach((piece, colIndex) => {
                    const sqId = String.fromCharCode(97 + colIndex) + (8 - rowIndex);
                    const sq = document.createElement('div');
                    sq.className = 'sq ' + ((rowIndex + colIndex) % 2 === 0 ? 'w' : 'b');
                    sq.id = sqId;

                    if (piece) {
                        const pEl = document.createElement('div');
                        pEl.className = 'piece';
                        const pChar = piece.color === 'w' ? piece.type.toUpperCase() : piece.type.toLowerCase();
                        pEl.innerHTML = pChars[pChar];
                        pEl.draggable = true;

                        pEl.addEventListener('dragstart', () => { 
                            sourceSq = sqId; 
                            document.querySelectorAll('.sq').forEach(s => s.classList.add('highlight'));
                        });
                        sq.appendChild(pEl);
                    }

                    sq.addEventListener('dragover', (e) => e.preventDefault());
                    sq.addEventListener('drop', (e) => {
                        e.preventDefault();
                        const move = game.move({ from: sourceSq, to: sq.id, promotion: 'q' });
                        if (move) createBoard();
                        document.querySelectorAll('.sq').forEach(s => s.classList.remove('highlight'));
                    });
                    boardEl.appendChild(sq);
                });
            });
        }

        // --- 3. PARTICLES ---
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.onresize = resize; resize();
        class Particle {
            constructor() { this.x = Math.random() * canvas.width; this.y = Math.random() * canvas.height; this.size = Math.random() * 1.5; this.speed = Math.random() * 0.4 + 0.1; }
            update() { this.y += this.speed; if (this.y > canvas.height) this.y = -5; }
            draw() { ctx.fillStyle = 'rgba(0, 242, 255, 0.2)'; ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill(); }
        }
        for(let i=0; i<100; i++) particles.push(new Particle());
        function animate() { ctx.clearRect(0,0,canvas.width, canvas.height); particles.forEach(p => { p.update(); p.draw(); }); requestAnimationFrame(animate); }
        animate();

        document.addEventListener('keydown', (e) => { if (e.key === '=') triggerPanic(); });
    </script>
</body>
</html>
