<!DOCTYPE html>
<html lang="en-AU">
<head>
    <meta charset="UTF-8">
    <title>Equinox Games | Chess Practice</title>
    <style>
        :root { 
            --n-blue: #00f2ff; --n-green: #39FF14; --n-red: #fa412d; 
            --n-orange: #f4943c; --n-yellow: #f1c40f; --n-grey: #888; --n-purple: #bc13fe;
            --smooth: cubic-bezier(0.4, 0, 0.2, 1);
        }
        body, html { margin: 0; padding: 0; background: #000; color: white; font-family: 'Segoe UI', Tahoma, sans-serif; overflow: hidden; height: 100vh; width: 100vw; }

        /* --- 1. BOOT --- */
        #boot { position: fixed; inset: 0; background: black; z-index: 100000; display: flex; justify-content: center; align-items: center; }
        .equinox-text { font-size: 32px; letter-spacing: 12px; font-weight: 200; color: #fff; clip-path: inset(0 100% 0 0); animation: reveal 2s forwards; }
        @keyframes reveal { to { clip-path: inset(0 0 0 0); } }

        /* --- 2. SETTINGS PANEL & DYNAMIC AI --- */
        #settings-panel { position: fixed; top: 0; right: -400px; width: 400px; height: 100vh; background: #050505; border-left: 2px solid var(--n-blue); z-index: 45000; transition: right 0.6s var(--smooth); padding: 60px 30px; box-sizing: border-box; }
        #settings-panel.open { right: 0; }
        #gear-handle { position: absolute; left: -72px; top: 50%; transform: translateY(-50%); width: 70px; height: 70px; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 46000; background: #050505; border: 2px solid var(--n-blue); border-right: none; border-radius: 15px 0 0 15px; }
        #gear-icon { font-size: 45px; color: var(--n-blue); transition: transform 0.6s var(--smooth); }
        #settings-panel.open #gear-icon { transform: rotate(180deg); color: var(--n-green); }

        .ai-box { margin-top: 20px; border: 1px solid #222; padding: 15px; border-radius: 10px; }
        #diff-dropdown-container { max-height: 0; overflow: hidden; transition: max-height 0.5s var(--smooth); }
        #diff-dropdown-container.show { max-height: 300px; margin-top: 15px; }
        
        select { background: #111; color: white; border: 1px solid #333; padding: 12px; width: 100%; border-radius: 5px; cursor: pointer; font-size: 12px; font-weight: bold; }
        option[value="demo"] { color: var(--n-grey); }
        option[value="beg"] { color: var(--n-green); }
        option[value="mod"] { color: var(--n-yellow); }
        option[value="pro"] { color: var(--n-orange); }
        option[value="mas"] { color: var(--n-red); }
        option[value="gm"] { color: var(--n-purple); }

        /* --- 3. BOARD & SMOOTH PIECES --- */
        #game { display: flex; width: 100vw; height: 100vh; justify-content: center; align-items: center; background: radial-gradient(circle, #0d0d0d 0%, #000 100%); }
        .board { width: 600px; height: 600px; display: grid; grid-template: repeat(8, 1fr) / repeat(8, 1fr); border: 4px solid #1a1a1a; position: relative; }
        .sq { width: 75px; height: 75px; display: flex; justify-content: center; align-items: center; cursor: pointer; position: relative; }
        .w { background: #2a2a2e; } .b { background: #1a1a1c; }
        
        .piece { font-size: 50px; user-select: none; z-index: 10; pointer-events: none; transition: transform 0.5s var(--smooth); position: absolute; }
        .white-p { color: #fff; text-shadow: 0 0 10px #fff; }
        .black-p { color: #666; text-shadow: 0 0 10px #000; }
        .selected { background: rgba(0, 242, 255, 0.2) !important; outline: 2px solid var(--n-blue); }

        /* --- 4. ENGINE ICONS (VIDEO STYLE) --- */
        .engine-icon { position: absolute; top: -10px; right: -10px; font-size: 30px; z-index: 100; pointer-events: none; animation: iconLife 1.5s var(--smooth) forwards; }
        @keyframes iconLife { 
            0% { transform: scale(0) rotate(-45deg); opacity: 0; } 
            20% { transform: scale(1.4) rotate(10deg); opacity: 1; }
            80% { transform: scale(1) rotate(0deg); opacity: 1; }
            100% { transform: scale(0.5); opacity: 0; }
        }
        .shockwave { position: absolute; border: 2px solid white; border-radius: 50%; pointer-events: none; z-index: 99; animation: wave 0.6s ease-out forwards; transform: translate(-50%, -50%); }
        @keyframes wave { 0% { width: 0; height: 0; opacity: 1; } 100% { width: 200px; height: 200px; opacity: 0; } }
        .p-white { position: absolute; width: 4px; height: 4px; background: white; pointer-events: none; z-index: 101; border-radius: 50%; }
        .ctrl-dot::after { content: ''; position: absolute; width: 22px; height: 22px; border: 3px solid var(--n-blue); border-radius: 50%; box-shadow: 0 0 15px var(--n-blue); pointer-events: none; z-index: 50; }

        /* --- 5. HELP & SMOOTH EXPANSION --- */
        #help-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(15px); z-index: 55000; display: none; align-items: center; justify-content: center; }
        #expansion-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(25px); z-index: 70000; display: none; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.4s var(--smooth); }
        #expansion-overlay.active { opacity: 1; display: flex; }
        #expansion-box { width: 85%; max-width: 950px; background: #050505; border: 3px solid var(--n-blue); border-radius: 30px; padding: 60px; position: relative; box-shadow: 0 0 80px var(--n-blue); transform: scale(0.7); transition: transform 0.5s var(--smooth); }
        #expansion-overlay.active #expansion-box { transform: scale(1); }
        .close-expanded { position: absolute; top: 25px; right: 25px; width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; border: 2px solid var(--n-red); color: var(--n-red); border-radius: 50%; font-size: 24px; cursor: pointer; transition: 0.3s; background: none; }
        .close-expanded:hover { background: var(--n-red); color: white; }
    </style>
</head>
<body>

    <div id="boot"><div class="equinox-text">EQUINOX SYSTEM</div></div>

    <div id="settings-panel">
        <div id="gear-handle" onclick="settingsPanel.classList.toggle('open')">
            <span id="gear-icon">⚙</span>
        </div>
        <h2 style="color: var(--n-blue); margin-top: 0; letter-spacing: 5px; text-align:center;">SETTINGS</h2>
        <button id="play-btn" style="background:var(--n-green); color:#000; border:none; padding:15px; font-weight:bold; border-radius:8px; width:100%;">PLAY</button>
        
        <div class="ai-box">
            <label style="font-size: 10px; color: var(--n-blue); letter-spacing: 2px;">OPPONENT TYPE</label>
            <select id="ai-toggle" onchange="updateAIUI()">
                <option value="manual">MANUAL PRACTICE</option>
                <option value="ai">EQUINOX AI</option>
            </select>
            
            <div id="diff-dropdown-container">
                <label style="font-size: 10px; color: var(--n-blue); letter-spacing: 2px;">DIFFICULTY TIER</label>
                <select id="ai-diff" onchange="this.style.borderColor = getComputedStyle(this.options[this.selectedIndex]).color">
                    <option value="demo" style="color:var(--n-grey)">DEMONSTRATION</option>
                    <option value="beg" style="color:var(--n-green)">BEGINNER</option>
                    <option value="mod" style="color:var(--n-yellow)">MODERATE</option>
                    <option value="pro" style="color:var(--n-orange)">PROFESSIONAL</option>
                    <option value="mas" style="color:var(--n-red)">MASTER</option>
                    <option value="gm" style="color:var(--n-purple)">GRANDMASTER</option>
                </select>
            </div>
        </div>
        
        <div style="margin-top: 20px; cursor:pointer; color:#666; text-align:center; padding:15px; border:1px solid #333; border-radius:10px;" onclick="openHelp()">ARCHIVED HELP</div>
    </div>

    <div id="expansion-overlay"><div id="expansion-box"><button class="close-expanded" onclick="closeExpansion()">✕</button><div id="expansion-text"></div></div></div>

    <div id="game"><div id="turn-info" style="position:fixed; top:40px; border:2px solid var(--n-blue); padding:10px 30px; border-radius:30px; color:var(--n-blue); font-weight:bold; letter-spacing:3px;">WHITE'S TURN</div><div class="board" id="board"></div></div>

<script>
    const boardEl = document.getElementById('board'), expansionOverlay = document.getElementById('expansion-overlay'), expansionText = document.getElementById('expansion-text'), settingsPanel = document.getElementById('settings-panel');
    let boardState = Array(64).fill(null), currentTurn = 'W', selectedSq = null, ctrlLocked = false;

    const glyphs = { 'r':'♜','n':'♞','b':'♝','q':'♛','k':'♚','p':'♟','R':'♖','N':'♘','B':'♗','Q':'♕','K':'♔','P':'♙' };

    function init() {
        const map = "rnbqkbnrpppppppp................................PPPPPPPPRNBQKBNR";
        for(let i=0; i<64; i++) boardState[i] = map[i] === '.' ? null : map[i];
        renderBoard(true);
    }

    function renderBoard(full) {
        if(full) boardEl.innerHTML = '';
        for (let i = 0; i < 64; i++) {
            let sq = document.querySelector(`[data-idx="${i}"]`);
            if(!sq) {
                sq = document.createElement('div');
                sq.className = `sq ${(Math.floor(i/8) + i%8) % 2 === 0 ? 'w' : 'b'}`;
                sq.dataset.idx = i;
                sq.onclick = () => handleSquare(i);
                boardEl.appendChild(sq);
            }
            const pChar = boardState[i];
            let pDom = sq.querySelector('.piece');
            if(pChar) {
                if(!pDom) {
                    pDom = document.createElement('div');
                    pDom.className = `piece ${pChar === pChar.toUpperCase() ? 'white-p' : 'black-p'}`;
                    pDom.innerHTML = glyphs[pChar.toLowerCase()];
                    sq.appendChild(pDom);
                }
            } else if(pDom) pDom.remove();
        }
        document.getElementById('turn-info').innerText = currentTurn === 'W' ? "WHITE'S TURN" : "BLACK'S TURN";
    }

    function handleSquare(i) {
        const p = boardState[i];
        if (selectedSq === null) {
            if (p && ((currentTurn === 'W' && p === p.toUpperCase()) || (currentTurn === 'B' && p === p.toLowerCase()))) {
                selectedSq = i;
                document.querySelectorAll('.sq').forEach(s => s.classList.remove('selected'));
                document.querySelector(`[data-idx="${i}"]`).classList.add('selected');
                if(ctrlLocked) showTargets(i);
            }
        } else {
            if (isValid(selectedSq, i)) {
                const startSq = document.querySelector(`[data-idx="${selectedSq}"]`);
                const endSq = document.querySelector(`[data-idx="${i}"]`);
                const pieceDom = startSq.querySelector('.piece');
                
                const dx = endSq.offsetLeft - startSq.offsetLeft;
                const dy = endSq.offsetTop - startSq.offsetTop;
                
                pieceDom.style.transform = `translate(${dx}px, ${dy}px)`;
                
                setTimeout(() => {
                    pieceDom.style.transform = '';
                    const moveType = boardState[i] ? 'star' : 'tick';
                    boardState[i] = boardState[selectedSq];
                    boardState[selectedSq] = null;
                    currentTurn = currentTurn === 'W' ? 'B' : 'W';
                    renderBoard(false);
                    spawnVFX(i, moveType);
                }, 500);
            }
            selectedSq = null;
            document.querySelectorAll('.sq').forEach(s => s.classList.remove('selected'));
        }
    }

    function spawnVFX(idx, type) {
        const sq = document.querySelector(`[data-idx="${idx}"]`);
        const rect = sq.getBoundingClientRect();
        const wave = document.createElement('div');
        wave.className = 'shockwave'; wave.style.left = `${rect.left + 37}px`; wave.style.top = `${rect.top + 37}px`;
        document.body.appendChild(wave); setTimeout(() => wave.remove(), 600);

        for(let i=0; i<15; i++) {
            const p = document.createElement('div'); p.className = 'p-white';
            p.style.left = `${rect.left + 37}px`; p.style.top = `${rect.top + 37}px`;
            document.body.appendChild(p);
            const angle = Math.random() * Math.PI * 2, vel = 3 + Math.random() * 6;
            let x=0, y=0, op=1;
            const anim = setInterval(() => {
                x += Math.cos(angle)*vel; y += Math.sin(angle)*vel; op -= 0.03;
                p.style.transform = `translate(${x}px, ${y}px)`; p.style.opacity = op;
                if(op <= 0) { clearInterval(anim); p.remove(); }
            }, 16);
        }
        const icon = document.createElement('div'); icon.className = 'engine-icon';
        icon.innerText = type === 'star' ? '⭐' : '✔️'; 
        sq.appendChild(icon);
        setTimeout(() => icon.remove(), 1500);
    }

    function showTargets(idx) {
        document.querySelectorAll('.ctrl-dot').forEach(el => el.classList.remove('ctrl-dot'));
        if(idx !== null) for (let i = 0; i < 64; i++) if (isValid(idx, i)) document.querySelector(`[data-idx="${i}"]`)?.classList.add('ctrl-dot');
    }

    document.addEventListener('keydown', (e) => {
        if (e.key === 'Control') {
            ctrlLocked = !ctrlLocked;
            const hovered = document.querySelector('.sq:hover');
            const idx = selectedSq !== null ? selectedSq : (hovered ? hovered.dataset.idx : null);
            if(!ctrlLocked) document.querySelectorAll('.ctrl-dot').forEach(d => d.classList.remove('ctrl-dot'));
            else if(idx) showTargets(idx);
        }
    });

    function updateAIUI() {
        const container = document.getElementById('diff-dropdown-container');
        if(document.getElementById('ai-toggle').value === 'ai') container.classList.add('show');
        else container.classList.remove('show');
    }

    function openHelp() { expansionText.innerHTML = "<b>ARCHIVED HELP LOADING...</b><br>Click any definition in the menu to scale it up."; expansionOverlay.classList.add('active'); }
    function closeExpansion() { expansionOverlay.classList.remove('active'); }

    function isValid(f, t) {
        if (f === t) return false;
        const p = boardState[f], tar = boardState[t];
        if (tar && (p === p.toUpperCase()) === (tar === tar.toUpperCase())) return false;
        const r1 = Math.floor(f/8), c1 = f%8, r2 = Math.floor(t/8), c2 = t%8, dr = Math.abs(r2-r1), dc = Math.abs(c2-c1);
        switch (p.toLowerCase()) {
            case 'p': const d = p === 'P' ? -1 : 1; return dc === 0 && r2-r1 === d && !tar || dc === 1 && r2-r1 === d && tar;
            case 'r': return r1 === r2 || c1 === c2;
            case 'n': return dr*dc === 2;
            case 'b': return dr === dc;
            case 'q': return r1 === r2 || c1 === c2 || dr === dc;
            case 'k': return dr <= 1 && dc <= 1;
        }
        return false;
    }

    setTimeout(() => { document.getElementById('boot').style.display='none'; }, 2000);
    init();
</script>
</body>
</html>
