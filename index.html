<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tactical Analysis Engine | System Boot</title>
    <style>
        body { margin: 0; background: #0a0b10; overflow: hidden; font-family: 'Segoe UI', sans-serif; color: white; user-select: none; }
        
        /* 1. THE BOOT SCREEN (Optimized) */
        #boot-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #0a0b10; z-index: 1000; display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            transition: transform 1s cubic-bezier(0.19, 1, 0.22, 1), opacity 0.5s;
        }
        
        /* The "Special Effect" Inward Shrink */
        #boot-screen.loaded { 
            transform: scale(0.6); /* Shrinks inward */
            border: 2px solid #3498db;
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(52, 152, 219, 0.4);
        }

        .load-text { letter-spacing: 5px; font-weight: 200; color: #3498db; margin-bottom: 20px; }
        .progress-bar { width: 250px; height: 2px; background: rgba(255,255,255,0.1); position: relative; }
        .progress-fill { position: absolute; height: 100%; background: #3498db; width: 0%; box-shadow: 0 0 15px #3498db; transition: width 2s linear; }

        /* 2. THE X BUTTON */
        .panic-x {
            position: absolute; top: 20px; right: 25px;
            font-size: 22px; color: #3498db; cursor: pointer;
            opacity: 0; transition: opacity 0.5s; z-index: 1100;
        }

        /* 3. THE CHESS GAME (Revealed underneath) */
        #game-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            opacity: 0; transform: scale(0.8); transition: all 0.6s ease-out;
            visibility: hidden;
        }
        #game-layer.visible { opacity: 1; transform: scale(1); visibility: visible; }

        .board { 
            width: 440px; height: 440px; display: grid; grid-template: repeat(8, 1fr) / repeat(8, 1fr); 
            border: 8px solid #1e2530; box-shadow: 0 0 50px rgba(52, 152, 219, 0.2);
        }
        .sq { width: 55px; height: 55px; display: flex; justify-content: center; align-items: center; }
        .w { background: #2c3e50; } .b { background: #1a1a1a; }
        .piece { font-size: 40px; color: white; }

        /* 4. SIDE MENU (The "Start" Options) */
        .side-menu { margin-left: 40px; display: flex; flex-direction: column; gap: 12px; border-left: 2px solid #3498db; padding-left: 20px; }
        .menu-opt { font-size: 13px; letter-spacing: 2px; color: #3498db; opacity: 0.7; font-weight: bold; }

        #particle-canvas { position: absolute; top: 0; left: 0; z-index: -1; }
    </style>
</head>
<body>

    <div id="boot-screen">
        <!-- Clicking X now launches the game -->
        <div id="x-btn" class="panic-x" onclick="launchGame()">✕</div>
        <div id="load-content">
            <div class="load-text">SYSTEM BOOTING...</div>
            <div class="progress-bar"><div id="bar" class="progress-fill"></div></div>
        </div>
    </div>

    <canvas id="particle-canvas"></canvas>

    <div id="game-layer">
        <div class="board" id="chess-board"></div>
        <div class="side-menu">
            <div class="menu-opt">01 START ANALYSIS</div>
            <div class="menu-opt">02 STOCKFISH CLOUD</div>
            <div class="menu-opt">03 ELO PREDICTION</div>
            <div class="menu-opt">04 SETTINGS</div>
        </div>
    </div>

    <script>
        // --- 1. BOOT SEQUENCE ---
        window.onload = () => {
            const bar = document.getElementById('bar');
            setTimeout(() => { bar.style.width = '100%'; }, 200);

            setTimeout(() => {
                // Shrink the window inward
                document.getElementById('boot-screen').classList.add('loaded');
                document.getElementById('load-content').style.opacity = '0';
                // Make the X button appear
                document.getElementById('x-btn').style.opacity = '1';
            }, 2300);
        };

        // --- 2. LAUNCH LOGIC ---
        function launchGame() {
            // Hide the boot screen and show the board
            document.getElementById('boot-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('boot-screen').style.display = 'none';
                document.getElementById('game-layer').classList.add('visible');
            }, 500);
        }

        // --- 3. PARTICLES (Constant) ---
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.onresize = resize; resize();
        class Particle {
            constructor() { this.x = Math.random() * canvas.width; this.y = Math.random() * canvas.height; this.size = Math.random() * 1.5; this.speed = Math.random() * 0.4 + 0.1; }
            update() { this.y += this.speed; if (this.y > canvas.height) this.y = -5; }
            draw() { ctx.fillStyle = 'rgba(255, 255, 255, 0.3)'; ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill(); }
        }
        for(let i=0; i<100; i++) particles.push(new Particle());
        function animate() { ctx.clearRect(0,0,canvas.width, canvas.height); particles.forEach(p => { p.update(); p.draw(); }); requestAnimationFrame(animate); }
        animate();

        // --- 4. BOARD SETUP ---
        const board = document.getElementById('chess-board');
        const pChars = { 'r': '♜', 'n': '♞', 'b': '♝', 'q': '♛', 'k': '♚', 'p': '♟', 'R': '♖', 'N': '♘', 'B': '♗', 'Q': '♕', 'K': '♔', 'P': '♙' };
        const setup = ['r','n','b','q','k','b','n','r','p','p','p','p','p','p','p','p','','','','','','','','','','','','','','','','','','','','','','','','','','','','','','','','','P','P','P','P','P','P','P','P','R','N','B','Q','K','B','N','R'];

        setup.forEach((p, i) => {
            const sq = document.createElement('div');
            sq.className = `sq ${(Math.floor(i / 8) + i) % 2 === 0 ? 'w' : 'b'}`;
            if (p) {
                const piece = document.createElement('div');
                piece.className = 'piece'; piece.innerHTML = pChars[p]; sq.appendChild(piece);
            }
            board.appendChild(sq);
        });

        // Keyboard Panic Shortcut
        document.addEventListener('keydown', (e) => { if (e.key === '=') window.location.href = "https://schools.compass.education"; });
    </script>
</body>
</html>
