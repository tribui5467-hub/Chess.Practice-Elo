<!DOCTYPE html>
<html lang="en-AU">
<head>
    <meta charset="UTF-8">
    <title>Equinox Games | Chess Practice</title>
    <style>
        :root { 
            --n-blue: #00f2ff; --n-green: #39FF14; --n-red: #fa412d; 
            --n-orange: #f4943c; --n-yellow: #f1c40f; 
            --smooth: cubic-bezier(0.4, 0, 0.2, 1);
        }
        body, html { margin: 0; padding: 0; background: #000; color: white; font-family: 'Segoe UI', Tahoma, sans-serif; overflow: hidden; height: 100vh; width: 100vw; }

        /* --- 1. BOOT SEQUENCE --- */
        #boot { position: fixed; inset: 0; background: black; z-index: 100000; display: flex; justify-content: center; align-items: center; transition: 1s; pointer-events: none; }
        .equinox-text { font-size: 32px; letter-spacing: 12px; font-weight: 200; color: #fff; clip-path: inset(0 100% 0 0); animation: reveal 2s forwards; }
        @keyframes reveal { to { clip-path: inset(0 0 0 0); } }

        /* --- 2. SLIDING SETTINGS & SYNCED GEAR --- */
        #settings-panel {
            position: fixed; top: 0; right: -400px; width: 400px; height: 100vh;
            background: #050505; border-left: 2px solid var(--n-blue);
            z-index: 45000; transition: right 0.6s var(--smooth);
            display: flex; flex-direction: column; padding: 60px 30px; box-sizing: border-box;
        }
        #settings-panel.open { right: 0; }

        #gear-handle {
            position: absolute; left: -72px; top: 50%; transform: translateY(-50%);
            width: 70px; height: 70px; display: flex; align-items: center; justify-content: center;
            cursor: pointer; z-index: 46000; background: #050505; border: 2px solid var(--n-blue);
            border-right: none; border-radius: 15px 0 0 15px;
        }
        #gear-icon { font-size: 45px; color: var(--n-blue); transition: transform 0.6s var(--smooth); }
        #settings-panel.open #gear-icon { transform: rotate(180deg); color: var(--n-green); }

        /* --- 3. SETTINGS CONTENT & 3-DOTS --- */
        .btn-flex { display: flex; align-items: center; gap: 15px; margin-top: 25px; position: relative; }
        #play-btn { background: var(--n-green); color: #000; border: none; padding: 15px; font-weight: 900; cursor: pointer; border-radius: 10px; flex-grow: 1; text-transform: uppercase; transition: 0.3s; }
        #play-btn.ongoing { background: transparent; border: 2px solid var(--n-blue); color: var(--n-blue); box-shadow: 0 0 15px var(--n-blue); }
        
        .dots-v { cursor: pointer; font-size: 30px; color: #666; transition: 0.3s; padding: 0 10px; }
        .dots-v:hover { color: white; }
        
        #dots-menu { 
            display: none; position: absolute; background: #0a0a0a; border: 1px solid var(--n-green); 
            width: 180px; right: 0; top: 60px; z-index: 100; border-radius: 12px; overflow: hidden;
            box-shadow: 0 10px 30px #000;
        }
        #dots-menu div { padding: 15px; cursor: pointer; font-size: 12px; text-align: left; color: #aaa; border-bottom: 1px solid #1a1a1a; transition: 0.2s; }
        #dots-menu div:hover { background: #111; color: var(--n-green); }

        /* --- 4. HELP SYSTEM & SMOOTH EXPANSION --- */
        #help-overlay { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(15px); 
            z-index: 55000; display: none; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.5s var(--smooth);
        }
        #help-overlay.active { opacity: 1; display: flex; }

        #help-container { 
            width: 850px; height: 650px; background: #050505; border: 2px solid var(--n-green); 
            border-radius: 20px; display: flex; flex-direction: column; overflow: hidden;
            transform: scale(0.9); transition: transform 0.5s var(--smooth);
        }
        #help-overlay.active #help-container { transform: scale(1); }

        .help-header { display: flex; justify-content: space-between; padding: 25px; border-bottom: 1px solid #222; background: #000; }
        .tab-btn { background: none; border: 1px solid #333; color: #555; padding: 10px 20px; cursor: pointer; border-radius: 6px; font-weight: bold; text-transform: uppercase; font-size: 11px; margin-right: 8px; }
        .tab-btn.active { border-color: var(--n-green); color: var(--n-green); background: rgba(57, 255, 20, 0.05); }
        .help-content { flex: 1; overflow-y: auto; padding: 30px; }

        .group-label { color: var(--n-blue); font-size: 11px; letter-spacing: 2px; text-transform: uppercase; margin: 30px 0 15px 0; border-bottom: 1px solid #222; display: block; padding-bottom: 5px; font-weight: bold; }
        .asset-card { border-left: 3px solid var(--n-blue); background: #0f0f0f; padding: 20px; margin-bottom: 15px; cursor: pointer; transition: 0.3s; border-radius: 0 10px 10px 0; }
        .asset-card:hover { transform: scale(1.02); background: #151515; }
        .asset-card b { color: var(--n-yellow); display: block; margin-bottom: 8px; font-size: 16px; }

        /* FULL SCREEN DEFINITION BOX */
        #expansion-overlay { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(25px); 
            z-index: 70000; display: none; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.4s var(--smooth);
        }
        #expansion-overlay.active { opacity: 1; display: flex; }

        #expansion-box { 
            width: 85%; max-width: 950px; background: #050505; border: 3px solid var(--n-blue); 
            border-radius: 30px; padding: 60px; position: relative; box-shadow: 0 0 80px var(--n-blue);
            transform: scale(0.8); transition: transform 0.4s var(--smooth);
        }
        #expansion-overlay.active #expansion-box { transform: scale(1); }

        .close-expanded { 
            position: absolute; top: 25px; right: 25px; width: 45px; height: 45px; 
            display: flex; align-items: center; justify-content: center; border: 2px solid var(--n-red); 
            color: var(--n-red); border-radius: 50%; font-size: 24px; cursor: pointer; transition: 0.3s; background: none;
        }
        .close-expanded:hover { background: var(--n-red); color: white; }
        #expansion-text { font-size: 22px; line-height: 1.8; color: #eee; }

        /* --- GAME BOARD --- */
        #game { display: flex; width: 100vw; height: 100vh; justify-content: center; align-items: center; background: radial-gradient(circle, #0d0d0d 0%, #000 100%); }
        .board { width: 600px; height: 600px; display: grid; grid-template: repeat(8, 1fr) / repeat(8, 1fr); border: 4px solid #1a1a1a; background: #000; position: relative; }
        .sq { width: 75px; height: 75px; display: flex; justify-content: center; align-items: center; cursor: pointer; }
        .w { background: #2a2a2e; } .b { background: #1a1a1c; }
        .piece { font-size: 50px; user-select: none; z-index: 10; pointer-events: none; transition: 0.2s; }
        .white-p { color: #fff; text-shadow: 0 0 10px #fff; }
        .black-p { color: #666; text-shadow: 0 0 10px #000; }
        .selected { background: rgba(0, 242, 255, 0.2) !important; outline: 2px solid var(--n-blue); }
    </style>
</head>
<body>

    <div id="boot"><div class="equinox-text">EQUINOX SYSTEM</div></div>

    <!-- SETTINGS SLIDER -->
    <div id="settings-panel">
        <div id="gear-handle" onclick="toggleSettings()">
            <span id="gear-icon">⚙</span>
        </div>
        <h2 style="color: var(--n-blue); margin-top: 0; letter-spacing: 5px; text-align:center;">SETTINGS</h2>
        <div class="btn-flex">
            <button id="play-btn">PLAY</button>
            <div class="dots-v" onclick="toggleDots(event)">⋮</div>
            <div id="dots-menu">
                <div onclick="location.reload()">Reboot System</div>
                <div onclick="resetBoard()">Reset Practice</div>
                <div onclick="openHelp()">Archived Help</div>
            </div>
        </div>
    </div>

    <!-- HELP OVERLAY -->
    <div id="help-overlay">
        <div id="help-container">
            <div class="help-header">
                <div id="tabs">
                    <button class="tab-btn active" onclick="showTab('pieces', this)">Pieces</button>
                    <button class="tab-btn" onclick="showTab('icons', this)">Icons</button>
                    <button class="tab-btn" onclick="showTab('mechanics', this)">Mechanics</button>
                </div>
                <button onclick="closeHelp()" style="background:none; border:none; color:var(--n-red); cursor:pointer; font-size: 24px;">✕</button>
            </div>
            <div id="help-text" class="help-content"></div>
        </div>
    </div>

    <!-- SMOOTH EXPANSION MODAL -->
    <div id="expansion-overlay">
        <div id="expansion-box">
            <button class="close-expanded" onclick="closeExpansion()">✕</button>
            <div id="expansion-text"></div>
        </div>
    </div>

    <div id="game"><div class="board" id="board"></div></div>

<script>
    const settingsPanel = document.getElementById('settings-panel');
    const dotsMenu = document.getElementById('dots-menu');
    const helpOverlay = document.getElementById('help-overlay');
    const expansionOverlay = document.getElementById('expansion-overlay');
    const expansionText = document.getElementById('expansion-text');
    const boardEl = document.getElementById('board');
    let boardState = Array(64).fill(null);
    let selectedSq = null;

    const helpData = {
        pieces: `
            <div class="asset-card" onclick="expandDef(this)"><b>The Pawn</b> The fundamental infantry unit of chess. It possesses a restricted forward movement of one square, yet captures diagonally. Upon its initial move, it may advance two squares. Reaching the terminal rank allows for promotion into a Queen, Rook, Bishop, or Knight, granting the piece immense late-game utility.</div>
            <div class="asset-card" onclick="expandDef(this)"><b>The Knight</b> A specialized tactical unit that navigates the board in a unique 'L' pattern—two squares in one cardinal direction followed by one square perpendicular. It maintains the singular ability to leap over intervening pieces, making it an invaluable asset in congested board states where other pieces are obstructed.</div>
            <div class="asset-card" onclick="expandDef(this)"><b>The Bishop</b> A sophisticated long-range operative that slides any distance along diagonal trajectories. Each Bishop is permanently confined to the square colour it begins on, requiring them to work in coordinated pairs to control both light and dark regions of the board effectively throughout the middle and end game.</div>
            <div class="asset-card" onclick="expandDef(this)"><b>The Rook</b> A formidable heavy piece moving in straight horizontal or vertical lines across any number of unoccupied squares. It plays a critical role in king safety through the castling maneuver and is often the primary force behind powerful ladder checkmates during the final stages of the match.</div>
            <div class="asset-card" onclick="expandDef(this)"><b>The Queen</b> The most versatile and powerful asset on the board. She combines the movement capabilities of both the Rook and the Bishop, sliding any distance in any straight or diagonal direction. Her presence dictates the tempo and pressure of the match, serving as both a primary attacker and a central defender.</div>
            <div class="asset-card" onclick="expandDef(this)"><b>The King</b> The pivotal figure around which the entire game revolves. While moving only one square in any direction, his preservation is absolute. If the King is placed under attack and cannot find a safe square, the match concludes immediately, rendering his protection the player's ultimate strategic priority.</div>
        `,
        icons: `
            <span class="group-label">Positive Indicators</span>
            <div class="asset-card" onclick="expandDef(this)"><b>The Best Move (Star)</b> This designation signifies the absolute strongest continuation identified by the engine analysis. Playing this move optimizes your winning probability and represents the highest level of technical accuracy possible in the current position, often finding the only path to a victory.</div>
            <div class="asset-card" onclick="expandDef(this)"><b>Good Move (Tick)</b> Indicates a solid, fundamentally sound choice that maintains the current evaluation of the position. While it may not be the engine's primary preference, it adheres to sound chess principles and ensures the player does not concede any unnecessary tactical advantages.</div>
            <span class="group-label">Negative Indicators</span>
            <div class="asset-card" onclick="expandDef(this)"><b>Inaccuracy (Exclamation)</b> Marks a sub-optimal move that noticeably weakens your standing. It suggests a missed opportunity to apply pressure or a minor positional concession that allows the opponent to improve their pieces more easily than the optimal continuation would have permitted.</div>
            <div class="asset-card" onclick="expandDef(this)"><b>Blunder (Exclamation Double)</b> A catastrophic error that tangibly reduces your advantage or directly allows the opponent to achieve a winning position. This usually results from an overlooked tactical sequence or a serious misunderstanding of the immediate requirements of the board position.</div>
            <div class="asset-card" onclick="expandDef(this)"><b>Fatal Blunder (Death Emoji)</b> Reserved for moves that lead to an immediate loss of the game or the loss of a major piece without compensation. This classification represents a total collapse of strategy and typically shifts the game evaluation into a forced win for the opponent.</div>
        `,
        mechanics: `
            <span class="group-label">Core Mechanics</span>
            <div class="asset-card" onclick="expandDef(this)"><b>Capturing Methodology</b> To capture an opponent's unit, you must move your piece onto the square it currently occupies. The displaced piece is permanently removed from the field. You cannot capture your own units or occupy a square already held by your own color, requiring careful navigation of space.</div>
            <div class="asset-card" onclick="expandDef(this)"><b>En Passant</b> A specialized pawn capture occurring when an opponent moves their pawn two squares forward from its starting position and lands adjacent to your pawn. You may capture that pawn as if it had only moved one square, provided you do so on the very next turn.</div>
            <span class="group-label">Ending Conditions</span>
            <div class="asset-card" onclick="expandDef(this)"><b>Checkmate (Absolute Victory)</b> The definitive conclusion of a chess match. This occurs when a King is under direct threat of capture and possesses no legal moves to relocate, block the line of attack, or eliminate the attacking piece entirely. The game ends immediately in a win for the attacker.</div>
            <div class="asset-card" onclick="expandDef(this)"><b>Stalemate (Technical Draw)</b> A unique situation where the player whose turn it is has no legal moves remaining, yet their King is not currently in check. Because the player cannot move but is not defeated, the game ends in a draw, often occurring as a defensive 'swindle'.</div>
        `
    };

    function toggleSettings() { settingsPanel.classList.toggle('open'); dotsMenu.style.display = 'none'; }
    function toggleDots(e) { e.stopPropagation(); dotsMenu.style.display = dotsMenu.style.display === 'block' ? 'none' : 'block'; }
    function openHelp() { helpOverlay.style.display = 'flex'; setTimeout(() => helpOverlay.classList.add('active'), 10); showTab('pieces', document.querySelector('.tab-btn')); }
    function closeHelp() { helpOverlay.classList.remove('active'); setTimeout(() => helpOverlay.style.display = 'none', 500); }
    function showTab(t, b) { document.querySelectorAll('.tab-btn').forEach(x => x.classList.remove('active')); b.classList.add('active'); document.getElementById('help-text').innerHTML = helpData[t]; }
    
    function expandDef(card) {
        expansionText.innerHTML = card.innerHTML;
        expansionOverlay.style.display = 'flex';
        setTimeout(() => expansionOverlay.classList.add('active'), 10);
    }
    function closeExpansion() { expansionOverlay.classList.remove('active'); setTimeout(() => expansionOverlay.style.display = 'none', 400); }

    function resetBoard() { location.reload(); }

    // --- GAME RENDER ---
    const glyphs = { 'r':'♜','n':'♞','b':'♝','q':'♛','k':'♚','p':'♟','R':'♖','N':'♘','B':'♗','Q':'♕','K':'♔','P':'♙' };
    function init() {
        const map = "rnbqkbnrpppppppp................................PPPPPPPPRNBQKBNR";
        for(let i=0; i<64; i++) boardState[i] = map[i] === '.' ? null : map[i];
        render();
    }
    function render() {
        boardEl.innerHTML = '';
        for (let i = 0; i < 64; i++) {
            const sq = document.createElement('div');
            sq.className = `sq ${(Math.floor(i/8) + i%8) % 2 === 0 ? 'w' : 'b'}`;
            if (boardState[i]) {
                const p = document.createElement('div');
                p.className = `piece ${boardState[i] === boardState[i].toUpperCase() ? 'white-p' : 'black-p'}`;
                p.innerHTML = glyphs[boardState[i].toLowerCase()];
                sq.appendChild(p);
            }
            boardEl.appendChild(sq);
        }
    }
    
    setTimeout(() => document.getElementById('boot').style.display='none', 2000);
    init();
</script>
</body>
</html>
