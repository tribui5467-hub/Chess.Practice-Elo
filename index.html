<!DOCTYPE html>
<html lang="en-AU">
<head>
    <meta charset="UTF-8">
    <title>Equinox Games | Chess Practice</title>
    <style>
        :root { 
            --n-blue: #00f2ff; --n-green: #39FF14; --n-red: #fa412d; 
            --n-orange: #f4943c; --n-yellow: #f1c40f; --n-pink: #ff00ff;
            --smooth: cubic-bezier(0.4, 0, 0.2, 1);
        }
        body, html { margin: 0; padding: 0; background: #000; color: white; font-family: 'Segoe UI', Tahoma, sans-serif; overflow: hidden; height: 100vh; width: 100vw; }
        
        #boot { position: fixed; inset: 0; background: black; z-index: 60000; display: flex; justify-content: center; align-items: center; transition: 1s; }
        .equinox-text { font-size: 32px; letter-spacing: 12px; font-weight: 200; color: #fff; clip-path: inset(0 100% 0 0); animation: reveal 2s forwards; }
        @keyframes reveal { to { clip-path: inset(0 0 0 0); } }

        #game { display: flex; width: 100vw; height: 100vh; justify-content: center; align-items: center; background: radial-gradient(circle, #0d0d0d 0%, #000 100%); }
        .board { width: 600px; height: 600px; display: grid; grid-template: repeat(8, 1fr) / repeat(8, 1fr); border: 4px solid #1a1a1a; background: #000; position: relative; }
        .sq { width: 75px; height: 75px; display: flex; justify-content: center; align-items: center; cursor: pointer; position: relative; }
        .w { background: #2a2a2e; } .b { background: #1a1a1c; }
        
        /* Neon Signatures */
        .hl-king, .hl-queen { box-shadow: inset 0 0 20px var(--n-red) !important; border: 1px solid var(--n-red) !important; }
        .hl-rook, .hl-bishop { box-shadow: inset 0 0 20px var(--n-orange) !important; border: 1px solid var(--n-orange) !important; }
        .hl-knight { box-shadow: inset 0 0 20px var(--n-yellow) !important; border: 1px solid var(--n-yellow) !important; }
        .hl-pawn { box-shadow: inset 0 0 20px var(--n-green) !important; border: 1px solid var(--n-green) !important; }
        .hl-pawn-blue { box-shadow: inset 0 0 20px var(--n-blue) !important; border: 1px solid var(--n-blue) !important; }
        .selected { background: rgba(0, 242, 255, 0.2) !important; outline: 2px solid var(--n-blue); }
        .ctrl-dot::after { content: ''; position: absolute; width: 15px; height: 15px; border: 2px solid var(--n-blue); border-radius: 50%; box-shadow: 0 0 10px var(--n-blue); pointer-events: none; }

        .piece { font-size: 50px; user-select: none; z-index: 10; pointer-events: none; transition: 0.2s; }
        .white-p { color: #fff; text-shadow: 0 0 10px #fff; }
        .black-p { color: #666; text-shadow: 0 0 10px #000; }

        #turn-info { position: fixed; top: 30px; left: 50%; transform: translateX(-50%); letter-spacing: 4px; color: var(--n-blue); font-weight: bold; border: 1px solid var(--n-blue); padding: 8px 25px; border-radius: 20px; z-index: 100; }
        #gear-btn { position: fixed; right: 30px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--n-blue); font-size: 50px; cursor: pointer; z-index: 40000; transition: 0.5s; }
        #gear-btn:hover { transform: translateY(-50%) rotate(90deg); color: var(--n-green); }

        #settings-menu { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 320px; background: #080808; border: 2px solid var(--n-blue); border-radius: 15px; z-index: 45000; padding: 30px; display: none; text-align: center; }
        .btn-flex { display: flex; align-items: center; gap: 10px; margin-top: 20px; position: relative; }
        #play-btn { background: var(--n-green); color: #000; border: none; padding: 12px; font-weight: bold; cursor: pointer; border-radius: 5px; flex-grow: 1; text-transform: uppercase; }
        #play-btn.ongoing { background: transparent; border: 1px solid var(--n-blue); color: var(--n-blue); }
        .dots-v { cursor: pointer; font-size: 25px; color: #555; }
        #dots-menu { display: none; position: absolute; background: #000; border: 1px solid var(--n-green); width: 160px; right: 0; top: 50px; z-index: 100; border-radius: 8px; overflow: hidden; }
        #dots-menu div { padding: 12px; cursor: pointer; font-size: 12px; text-align: left; color: #888; border-bottom: 1px solid #111; }
        #dots-menu div:hover { background: #111; color: var(--n-green); }

        /* Help Menu Styles */
        #help-menu { position: fixed; left: 50%; top: 50%; transform: translate(-50%, -50%); width: 800px; height: 550px; background: #050505; border: 2px solid var(--n-green); border-radius: 15px; z-index: 55000; padding: 35px; display: none; box-shadow: 0 0 50px rgba(57, 255, 20, 0.2); }
        .help-header { display: flex; justify-content: space-between; border-bottom: 1px solid #222; padding-bottom: 15px; margin-bottom: 20px; }
        .tab-btn { background: none; border: 1px solid #333; color: #555; padding: 10px 18px; cursor: pointer; border-radius: 4px; margin-right: 10px; font-size: 11px; font-weight: bold; text-transform: uppercase; }
        .tab-btn.active { border-color: var(--n-green); color: var(--n-green); background: rgba(57, 255, 20, 0.05); }
        .help-body { color: #999; font-size: 13px; line-height: 1.6; overflow-y: auto; height: 430px; padding-right: 15px; }
        .group-label { color: var(--n-blue); font-size: 11px; letter-spacing: 2px; text-transform: uppercase; margin: 25px 0 15px 0; border-bottom: 1px solid #222; display: block; padding-bottom: 5px; font-weight: bold; }
        .asset-card { border-left: 3px solid var(--n-blue); background: #0f0f0f; padding: 15px; margin-bottom: 12px; }
        .asset-card b { color: var(--n-yellow); display: block; margin-bottom: 5px; font-size: 14px; }
        .icon-glyph { font-size: 20px; margin-right: 10px; vertical-align: middle; }
        .help-body::-webkit-scrollbar { width: 5px; }
        .help-body::-webkit-scrollbar-thumb { background: var(--n-green); border-radius: 10px; }
    </style>
</head>
<body>

    <div id="boot"><div class="equinox-text">EQUINOX SYSTEM</div></div>
    <div id="turn-info">WHITE'S TURN</div>
    <button id="gear-btn">⚙</button>

    <div id="settings-menu">
        <h3 style="color: var(--n-blue); margin: 0; letter-spacing: 2px;">SYSTEM SETTINGS</h3>
        <div class="btn-flex">
            <button id="play-btn">PLAY</button>
            <div class="dots-v" id="dots-trigger">⋮</div>
            <div id="dots-menu">
                <div onclick="location.reload()">REBOOT</div>
                <div onclick="resetBoard()">RESET PRACTICE</div>
                <div id="help-trigger">ARCHIVED HELP</div>
            </div>
        </div>
    </div>

    <!-- ARCHIVED HELP MENU -->
    <div id="help-menu">
        <div class="help-header">
            <div id="tabs">
                <button class="tab-btn active" onclick="showTab('pieces', this)">PIECES</button>
                <button class="tab-btn" onclick="showTab('icons', this)">ICONS</button>
                <button class="tab-btn" onclick="showTab('mechanics', this)">MECHANICS</button>
            </div>
            <button onclick="closeHelp()" style="background:none; border:none; color:var(--n-red); cursor:pointer; font-size: 24px;">✕</button>
        </div>
        <div id="help-text" class="help-body"></div>
    </div>

    <div id="game"><div class="board" id="board"></div></div>

<script>
    const boardEl = document.getElementById('board');
    const playBtn = document.getElementById('play-btn');
    const turnInfo = document.getElementById('turn-info');
    let boardState = Array(64).fill(null);
    let currentTurn = 'W'; 
    let selectedSq = null;

    const glyphs = { 'r':'♜','n':'♞','b':'♝','q':'♛','k':'♚','p':'♟','R':'♖','N':'♘','B':'♗','Q':'♕','K':'♔','P':'♙' };
    const typeToHL = { 'k':'hl-king','q':'hl-queen','r':'hl-rook','b':'hl-bishop','n':'hl-knight','p':'hl-pawn' };

    const helpData = {
        pieces: `
            <div class="asset-card"><b>The Pawn</b> The fundamental infantry unit of chess. It possesses a restricted forward movement of one square, yet captures diagonally. Upon its initial move, it may advance two squares. Reaching the terminal rank allows for promotion into a Queen, Rook, Bishop, or Knight, granting the piece immense late-game utility.</div>
            <div class="asset-card"><b>The Knight</b> A specialized tactical unit that navigates the board in a unique 'L' pattern—two squares in one cardinal direction followed by one square perpendicular. It maintains the singular ability to leap over intervening pieces, making it an invaluable asset in congested board states where other pieces are obstructed.</div>
            <div class="asset-card"><b>The Bishop</b> A sophisticated long-range operative that slides any distance along diagonal trajectories. Each Bishop is permanently confined to the square colour it begins on, requiring them to work in coordinated pairs to control both light and dark regions of the board effectively throughout the middle and end game.</div>
            <div class="asset-card"><b>The Rook</b> A formidable heavy piece moving in straight horizontal or vertical lines across any number of unoccupied squares. It plays a critical role in king safety through the castling maneuver and is often the primary force behind powerful ladder checkmates during the final stages of the match.</div>
            <div class="asset-card"><b>The Queen</b> The most versatile and powerful asset on the board. She combines the movement capabilities of both the Rook and the Bishop, sliding any distance in any straight or diagonal direction. Her presence dictates the tempo and pressure of the match, serving as both a primary attacker and a central defender.</div>
            <div class="asset-card"><b>The King</b> The pivotal figure around which the entire game revolves. While moving only one square in any direction, his preservation is absolute. If the King is placed under attack and cannot find a safe square, the match concludes immediately, rendering his protection the player's ultimate strategic priority.</div>
            <span class="group-label">Color Signatures</span>
            <div class="asset-card" style="border-color:var(--n-red)"><b>Red Signature</b> Assigned to Royalty (King/Queen). High-alert status.</div>
            <div class="asset-card" style="border-color:var(--n-orange)"><b>Orange Signature</b> Assigned to Tacticians (Rook/Bishop). Line-of-sight status.</div>
            <div class="asset-card" style="border-color:var(--n-yellow)"><b>Yellow Signature</b> Assigned to Cavalry (Knight). High-mobility status.</div>
            <div class="asset-card" style="border-color:var(--n-green)"><b>Green Signature</b> Assigned to Infantry (Pawn). Standard status.</div>
            <div class="asset-card" style="border-color:var(--n-blue)"><b>Blue Signature</b> Assigned to Transformation. Triggered when a Pawn is 1-5 squares from promotion.</div>
        `,
        icons: `
            <span class="group-label">Positive Indicators</span>
            <div class="asset-card"><span class="icon-glyph">⭐</span><b>The Best Move (Star)</b> This designation signifies the absolute strongest continuation identified by the engine analysis. Playing this move optimizes your winning probability and represents the highest level of technical accuracy possible in the current position, often finding the only path to a victory.</div>
            <div class="asset-card"><span class="icon-glyph">✔️</span><b>Good Move (Tick)</b> Indicates a solid, fundamentally sound choice that maintains the current evaluation of the position. While it may not be the engine's primary preference, it adheres to sound chess principles and ensures the player does not concede any unnecessary tactical advantages.</div>
            <span class="group-label">Negative Indicators</span>
            <div class="asset-card"><span class="icon-glyph">!</span><b>Inaccuracy (Exclamation)</b> Marks a sub-optimal move that noticeably weakens your standing. It suggests a missed opportunity to apply pressure or a minor positional concession that allows the opponent to improve their pieces more easily than the optimal continuation would have permitted.</div>
            <div class="asset-card"><span class="icon-glyph">!!</span><b>Blunder (Exclamation Double)</b> A catastrophic error that tangibly reduces your advantage or directly allows the opponent to achieve a winning position. This usually results from an overlooked tactical sequence or a serious misunderstanding of the immediate requirements of the board position.</div>
            <div class="asset-card"><span class="icon-glyph">💀</span><b>Fatal Blunder (Death)</b> Reserved for moves that lead to an immediate loss of the game or the loss of a major piece without compensation. This classification represents a total collapse of strategy and typically shifts the game evaluation into a forced win for the opponent.</div>
        `,
        mechanics: `
            <span class="group-label">Core Mechanics</span>
            <div class="asset-card"><b>Capturing Methodology</b> To capture an opponent's unit, you must move your piece onto the square it currently occupies. The displaced piece is permanently removed from the field. You cannot capture your own units or occupy a square already held by your own color, requiring careful navigation of space.</div>
            <div class="asset-card"><b>En Passant</b> A specialized pawn capture occurring when an opponent moves their pawn two squares forward from its starting position and lands adjacent to your pawn. You may capture that pawn as if it had only moved one square, provided you do so on the very next turn.</div>
            <span class="group-label">Ending Conditions</span>
            <div class="asset-card"><b>Checkmate (Absolute Victory)</b> The definitive conclusion of a chess match. This occurs when a King is under direct threat of capture and possesses no legal moves to relocate, block the line of attack, or eliminate the attacking piece entirely. The game ends immediately in a win for the attacker.</div>
            <div class="asset-card"><b>Stalemate (Technical Draw)</b> A unique situation where the player whose turn it is has no legal moves remaining, yet their King is not currently in check. Because the player cannot move but is not defeated, the game ends in a draw, often occurring as a defensive 'swindle'.</div>
        `
    };

    function initBoard() {
        const map = "rnbqkbnrpppppppp................................PPPPPPPPRNBQKBNR";
        for(let i=0; i<64; i++) boardState[i] = map[i] === '.' ? null : map[i];
        render();
    }

    function render() {
        boardEl.innerHTML = '';
        for (let i = 0; i < 64; i++) {
            const sq = document.createElement('div');
            sq.className = `sq ${(Math.floor(i/8) + i%8) % 2 === 0 ? 'w' : 'b'}`;
            sq.dataset.idx = i;
            if (boardState[i]) {
                const p = document.createElement('div');
                const isW = boardState[i] === boardState[i].toUpperCase();
                p.className = `piece ${isW ? 'white-p' : 'black-p'}`;
                p.innerHTML = glyphs[boardState[i].toLowerCase()];
                sq.appendChild(p);
            }
            sq.onclick = () => handleSquare(i);
            boardEl.appendChild(sq);
        }
        turnInfo.innerText = currentTurn === 'W' ? "WHITE'S TURN" : "BLACK'S TURN";
    }

    function isPathClear(f, t) {
        const r1 = Math.floor(f/8), c1 = f%8, r2 = Math.floor(t/8), c2 = t%8;
        const dr = Math.sign(r2 - r1), dc = Math.sign(c2 - c1);
        let currR = r1 + dr, currC = c1 + dc;
        while (currR !== r2 || currC !== c2) {
            if (boardState[currR * 8 + currC]) return false;
            currR += dr; currC += dc;
        }
        return true;
    }

    function isValid(f, t) {
        if (f === t) return false;
        const p = boardState[f]; const tar = boardState[t];
        if (tar && (p === p.toUpperCase()) === (tar === tar.toUpperCase())) return false;
        const r1 = Math.floor(f/8), c1 = f%8, r2 = Math.floor(t/8), c2 = t%8;
        const dr = Math.abs(r2-r1), dc = Math.abs(c2-c1), type = p.toLowerCase();
        switch (type) {
            case 'p': 
                const d = p === 'P' ? -1 : 1;
                if (dc === 0 && r2-r1 === d && !tar) return true;
                if (dc === 0 && r2-r1 === 2*d && r1 === (p === 'P' ? 6 : 1) && !tar && !boardState[(r1+d)*8+c1]) return true;
                if (dc === 1 && r2-r1 === d && tar) return true;
                return false;
            case 'r': return (r1 === r2 || c1 === c2) && isPathClear(f, t);
            case 'n': return dr*dc === 2;
            case 'b': return dr === dc && isPathClear(f, t);
            case 'q': return (r1 === r2 || c1 === c2 || dr === dc) && isPathClear(f, t);
            case 'k': return dr <= 1 && dc <= 1;
        }
        return false;
    }

    function handleSquare(i) {
        const piece = boardState[i];
        const isW = piece ? piece === piece.toUpperCase() : null;
        if (selectedSq === null) {
            if (piece && ((currentTurn === 'W' && isW) || (currentTurn === 'B' && !isW))) {
                selectedSq = i;
                render();
                document.querySelector(`[data-idx="${i}"]`).classList.add('selected');
            }
        } else {
            if (isValid(selectedSq, i)) {
                boardState[i] = boardState[selectedSq];
                boardState[selectedSq] = null;
                currentTurn = currentTurn === 'W' ? 'B' : 'W';
                playBtn.innerText = "GAME ONGOING";
                playBtn.classList.add('ongoing');
            }
            selectedSq = null;
            render();
        }
    }

    document.addEventListener('mouseover', (e) => {
        const sq = e.target.closest('.sq'); if (!sq) return;
        const p = boardState[sq.dataset.idx]; if (!p) return;
        let hl = typeToHL[p.toLowerCase()];
        if (p.toLowerCase() === 'p') {
            const row = Math.floor(sq.dataset.idx / 8);
            const dist = (p === 'P') ? row : (7 - row); 
            if (dist >= 1 && dist <= 5) hl = 'hl-pawn-blue';
        }
        sq.classList.add(hl);
    });
    document.addEventListener('mouseout', (e) => {
        const sq = e.target.closest('.sq');
        if (sq) sq.className = sq.className.split(' ').filter(c => !c.startsWith('hl-')).join(' ');
    });
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Control' && selectedSq !== null) {
            for (let i = 0; i < 64; i++) if (isValid(selectedSq, i)) document.querySelector(`[data-idx="${i}"]`)?.classList.add('ctrl-dot');
        }
    });
    document.addEventListener('keyup', (e) => { if (e.key === 'Control') document.querySelectorAll('.ctrl-dot').forEach(el => el.classList.remove('ctrl-dot')); });

    const gear = document.getElementById('gear-btn'), sm = document.getElementById('settings-menu'), dt = document.getElementById('dots-trigger'), dm = document.getElementById('dots-menu'), ht = document.getElementById('help-trigger'), hm = document.getElementById('help-menu');
    gear.onclick = () => sm.style.display = sm.style.display === 'block' ? 'none' : 'block';
    dt.onclick = (e) => { e.stopPropagation(); dm.style.display = dm.style.display === 'block' ? 'none' : 'block'; };
    ht.onclick = () => { hm.style.display = 'block'; sm.style.display = 'none'; showTab('pieces', document.querySelector('.tab-btn')); };
    function closeHelp() { hm.style.display = 'none'; }
    function showTab(t, b) { document.querySelectorAll('.tab-btn').forEach(x => x.classList.remove('active')); b.classList.add('active'); document.getElementById('help-text').innerHTML = helpData[t]; }
    function resetBoard() { currentTurn = 'W'; playBtn.innerText = "PLAY"; playBtn.classList.remove('ongoing'); initBoard(); }
    setTimeout(() => { document.getElementById('boot').style.display='none'; }, 2000);

    initBoard();
</script>
</body>
</html>
